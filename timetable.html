<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stonneplang — ian.lu</title>
<meta name="description" content="Däin Stonneplang op ian.lu — trag deng Woch eng Kéier an, gesäis ëmmer wat elo a wat duerno ass.">
<link rel="canonical" href="https://ian.lu/timetable.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ian.lu">
<meta property="og:title" content="Stonneplang — ian.lu">
<meta property="og:description" content="Trag deng Woch eng Kéier an — gesäis ëmmer wat elo a wat duerno ass.">
<meta property="og:url" content="https://ian.lu/timetable.html">
<meta property="og:image" content="https://ian.lu/apple-touch-icon.png">
<meta name="twitter:card" content="summary">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=7"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:820px;margin:0 auto;padding:16px 12px 40px;display:flex;flex-direction:column;gap:14px}
  .now{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px}
  .now b{color:var(--accent2)}
  .now .next{color:var(--muted);font-size:13px;margin-top:2px}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:14px;background:var(--card)}
  table{border-collapse:collapse;width:100%;min-width:560px}
  th,td{border:1px solid var(--border);padding:0}
  thead th{background:var(--card2);font-size:12px;font-weight:800;color:var(--muted);padding:8px 4px;text-align:center;position:sticky;top:0}
  .tcell{text-align:center;width:78px;background:var(--card2)}
  .tcell input{width:64px;border:none;background:transparent;color:var(--muted);font-size:11px;text-align:center;padding:3px 0}
  td input.cell{width:100%;min-width:88px;border:none;background:transparent;color:var(--text);font-size:13px;padding:9px 6px;text-align:center;font-weight:600}
  td input.cell::placeholder{color:#3a3a58}
  td.here{background:rgba(110,168,254,.15);outline:2px solid var(--accent);outline-offset:-2px}
  input:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}
  .hint{color:var(--muted);font-size:12px;text-align:center}
  .save{color:var(--accent2);font-size:12px;font-weight:700;min-height:16px;text-align:center}
  .gate{text-align:center;color:var(--muted);padding:14px}
  .rowbtns{display:flex;gap:8px;justify-content:center}
  .rowbtns button{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .rowbtns button:hover{border-color:var(--accent2);color:var(--accent2)}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>🗓️ Stonneplang</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap">
  <div class="now" id="now" style="display:none"></div>
  <div class="scroll"><table id="grid"></table></div>
  <div class="rowbtns">
    <button id="addRow">+ Stonn</button>
    <button id="delRow">− Stonn</button>
  </div>
  <div class="save" id="saveMsg"></div>
  <div class="hint" id="hint">Tipp op eng Zell fir d'Fach anzeginn (z.B. „Mathe · B12"). Ännerungen späichere sech automatesch.</div>
  <div class="gate" id="gate" style="display:none"></div>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
const $=(id)=>document.getElementById(id);
const LS_KEY="timetableData";
const DAYS=["Méindeg","Dënschdeg","Mëttwoch","Donneschdeg","Freideg"];
const DAYS_SHORT=["Méi","Dën","Mët","Don","Fre"];
// weekday (0=Mon..4=Fri) or -1 at the weekend
const todayCol=()=>{const d=new Date().getDay();return d===0?-1:d-1>4?-1:d-1;};
const DEFAULT_TIMES=[["08:00","08:50"],["08:50","09:40"],["10:00","10:50"],["10:50","11:40"],["11:40","12:30"],["13:30","14:20"],["14:20","15:10"],["15:10","16:00"]];

let sb=null,me=null,saveT=null;
// data = { times:[[start,end],...], cells:{ "day-period": "text" } }
let data=load();

function load(){
  try{const v=JSON.parse(localStorage.getItem(LS_KEY));if(v&&Array.isArray(v.times))return v;}catch{}
  return {times:DEFAULT_TIMES.map(t=>[...t]),cells:{}};
}
function persistLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch{}}

function render(){
  const g=$("grid");
  let h="<thead><tr><th class='tcell'>Zäit</th>"+DAYS.map((d,i)=>`<th title="${d}">${DAYS_SHORT[i]}</th>`).join("")+"</tr></thead><tbody>";
  data.times.forEach((t,p)=>{
    h+=`<tr><td class="tcell"><input data-t="${p}-0" value="${t[0]||""}" placeholder="08:00"><br><input data-t="${p}-1" value="${t[1]||""}" placeholder="08:50"></td>`;
    for(let d=0;d<5;d++){
      const key=d+"-"+p;
      h+=`<td data-cell="${key}"><input class="cell" data-c="${key}" value="${(data.cells[key]||"").replace(/"/g,"&quot;")}" placeholder="—"></td>`;
    }
    h+="</tr>";
  });
  g.innerHTML=h+"</tbody>";
  g.querySelectorAll("input[data-c]").forEach(inp=>inp.oninput=()=>{const v=inp.value.trim();if(v)data.cells[inp.dataset.c]=v;else delete data.cells[inp.dataset.c];scheduleSave();});
  g.querySelectorAll("input[data-t]").forEach(inp=>inp.oninput=()=>{const[p,i]=inp.dataset.t.split("-").map(Number);data.times[p][i]=inp.value.trim();scheduleSave();highlight();});
  highlight();
}

function toMin(hhmm){const m=/^(\d{1,2}):(\d{2})$/.exec(hhmm||"");return m?(+m[1])*60+(+m[2]):null;}
function highlight(){
  document.querySelectorAll("td.here").forEach(td=>td.classList.remove("here"));
  const col=todayCol();
  if(col<0){$("now").style.display="";$("now").innerHTML="🌴 Weekend — genéiss et!";return;}
  const now=new Date().getHours()*60+new Date().getMinutes();
  let curP=-1;
  data.times.forEach((t,p)=>{const s=toMin(t[0]),e=toMin(t[1]);if(s!=null&&e!=null&&now>=s&&now<e)curP=p;});
  const label=(p)=>data.cells[col+"-"+p]||null;
  $("now").style.display="";
  if(curP>=0){
    const td=document.querySelector(`td[data-cell="${col}-${curP}"]`);if(td)td.classList.add("here");
    const cur=label(curP);
    let nextTxt="";for(let p=curP+1;p<data.times.length;p++){if(label(p)){nextTxt=`<div class="next">Duerno: <b>${label(p)}</b> (${data.times[p][0]})</div>`;break;}}
    $("now").innerHTML=cur?`Elo: <b>${cur}</b>${nextTxt}`:`Elo keng Stonn agedroen.${nextTxt}`;
  }else{
    let nextTxt="";for(let p=0;p<data.times.length;p++){const s=toMin(data.times[p][0]);if(s!=null&&s>now&&label(p)){nextTxt=`Nächst: <b>${label(p)}</b> (${data.times[p][0]})`;break;}}
    $("now").innerHTML=nextTxt||"Haut näischt méi agedroen.";
  }
}

function scheduleSave(){
  persistLocal();
  $("saveMsg").textContent="Späicheren…";
  clearTimeout(saveT);
  saveT=setTimeout(saveRemote,800);
}
async function saveRemote(){
  if(!me){$("saveMsg").textContent="Lokal gespäichert (mell dech un fir op all Apparat).";return;}
  try{
    const {error}=await sb.from("timetables").upsert({user_id:me,data,updated_at:new Date().toISOString()});
    if(error)throw error;
    $("saveMsg").textContent="Gespäichert ✓";setTimeout(()=>{if($("saveMsg").textContent==="Gespäichert ✓")$("saveMsg").textContent="";},1500);
  }catch(e){console.warn("[timetable] save",e);$("saveMsg").textContent="Lokal gespäichert (Sync-Feeler).";}
}

$("addRow").onclick=()=>{const last=data.times[data.times.length-1];data.times.push(last?[last[1]||"",""]:["",""]);render();scheduleSave();};
$("delRow").onclick=()=>{if(data.times.length<=1)return;const p=data.times.length-1;data.times.pop();for(let d=0;d<5;d++)delete data.cells[d+"-"+p];render();scheduleSave();};

async function start(){
  sb=sb||await auth.client();
  if(auth.session()){
    me=auth.session().user.id;
    try{
      const {data:row}=await sb.from("timetables").select("data").eq("user_id",me).maybeSingle();
      if(row&&row.data&&Array.isArray(row.data.times)){data=row.data;persistLocal();render();}
    }catch(e){console.warn("[timetable] load",e);}
    $("gate").style.display="none";
  }else{
    $("gate").style.display="";
    $("gate").innerHTML='💾 Deng Ännerunge bleiwen op dësem Apparat. <a href="#" id="gb">Mell dech un</a> fir se op all Apparat ze synchroniséieren.';
    $("gb").onclick=(e)=>{e.preventDefault();auth.openAuthModal();};
  }
}

render();
auth.mountAccountButton($("acctHost"));
auth.onAuth(()=>start());
start();
setInterval(highlight,60000);
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
