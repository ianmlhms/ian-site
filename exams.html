<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prüfungen — ian.lu</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=5"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--warn:#f87171}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:640px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:14px}
  .gate{text-align:center;color:var(--muted);padding:50px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .exam{display:flex;align-items:center;gap:14px}
  .exam .subj{font-weight:800;font-size:16px}
  .exam .when{color:var(--muted);font-size:13px;margin-top:2px}
  .exam .note{color:var(--muted);font-size:13px;font-style:italic;margin-top:2px}
  .exam .cd{margin-left:auto;text-align:right;font-variant-numeric:tabular-nums}
  .exam .cd b{font-size:20px;display:block}
  .exam .cd.soon b{color:var(--warn)}
  .exam.past{opacity:.45}
  .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
  .del:hover{color:var(--warn)}
  .newx{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .newx input{padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;color-scheme:dark}
  .newx .full{grid-column:1/-1}
  .xchips{display:flex;flex-wrap:wrap;gap:7px}
  .xchip{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:18px;padding:7px 13px;font-size:12.5px;cursor:pointer;line-height:1}
  .xchip:hover{border-color:var(--accent2)}
  .xchip.on{background:var(--accent2);border-color:var(--accent2);color:#06121a;font-weight:700}
  .msg{min-height:18px;color:var(--accent2);font-weight:700;font-size:13px;grid-column:1/-1}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Home</a>
  <h1>⏳ Prüfungen</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Laden…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
import { mountPicker } from "./datetime-picker.js?v=1";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb=null,exams=[],timer=null;
const DAY=86400000;

async function boot(){
  sb=await auth.client();
  auth.mountAccountButton($("acctHost"));
  if(!auth.session()){
    $("wrap").innerHTML=`<div class="gate">Diese Seite ist privat.<br><br><button class="btn" id="signin">Anmelden</button></div>`;
    $("signin").onclick=auth.openAuthModal;
    return;
  }
  let admin=false; try{const {data}=await sb.rpc("is_admin");admin=!!data;}catch{}
  if(!admin){$("wrap").innerHTML=`<div class="gate">Diese Seite ist privat.</div>`;return;}
  $("wrap").innerHTML=`
    <div class="card newx">
      <input id="nSubj" class="full" maxlength="100" placeholder="Fach / Prüfung (z.B. Mathe-Klassenarbeit)">
      <input type="hidden" id="nDate"><input type="hidden" id="nTime" value="08:00">
      <div class="xchips full" id="nQuick"></div>
      <div class="full" id="nPicker"></div>
      <input id="nNote" class="full" maxlength="200" placeholder="Notiz (optional, z.B. Kapitel 4–6)">
      <button class="btn full" id="nAdd">Hinzufügen</button>
      <div class="msg" id="nMsg"></div>
    </div>
    <div id="list"></div>`;
  $("nAdd").onclick=addExam;
  wireQuickDate();
  await refresh();
}

async function refresh(){
  const {data,error}=await sb.from("exams").select("*").order("at");
  if(error){console.warn("[exams]",error);$("list").innerHTML='<div class="gate">Fehler beim Laden.</div>';return;}
  // hide exams more than a day in the past
  exams=(data||[]).filter(e=>new Date(e.at).getTime()>Date.now()-DAY);
  render();
  if(!timer)timer=setInterval(render,1000);
}

const pad=(n)=>String(n).padStart(2,"0");
function cdText(ms){
  if(ms<=0)return "jetzt!";
  const s=Math.floor(ms/1000);
  const d=Math.floor(s/86400);
  if(d>0)return d+"d "+pad(Math.floor(s/3600)%24)+"h "+pad(Math.floor(s/60)%60)+"m";
  return pad(Math.floor(s/3600))+":"+pad(Math.floor(s/60)%60)+":"+pad(s%60);
}
function render(){
  if(!exams.length){$("list").innerHTML='<div class="gate">Keine Prüfungen — genieß die Ruhe 😌</div>';return;}
  $("list").innerHTML=exams.map(e=>{
    const t=new Date(e.at),left=t.getTime()-Date.now();
    const when=t.toLocaleString("de-DE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    return `<div class="card exam${left<0?" past":""}" style="margin-bottom:10px">
      <div><div class="subj">${esc(e.subject)}</div><div class="when">${when}</div>${e.note?`<div class="note">${esc(e.note)}</div>`:""}</div>
      <div class="cd${left<3*DAY&&left>0?" soon":""}"><b>${cdText(left)}</b></div>
      <button class="del" data-id="${e.id}" title="Löschen">✕</button></div>`;
  }).join("");
  $("list").querySelectorAll(".del").forEach(b=>b.onclick=async()=>{
    if(!confirm("Prüfung löschen?"))return;
    await sb.from("exams").delete().eq("id",b.dataset.id);
    refresh();
  });
}

// friendlier date entry: a tappable calendar + iOS-style time wheels, defaulted
// to today 08:00, plus one-tap Heute/Morgen presets. Native inputs are hidden
// and kept in sync so addExam() reads nDate (YYYY-MM-DD) + nTime (HH:MM).
function wireQuickDate(){
  const iso=(d)=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const hm=(d)=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const sync=(d)=>{ if(d){ $("nDate").value=iso(d); $("nTime").value=hm(d); } };
  const setActive=(el)=>$("nQuick").querySelectorAll(".xchip").forEach(x=>x.classList.toggle("on",x===el));
  const def=new Date(); def.setHours(8,0,0,0);
  sync(def);
  const picker=mountPicker($("nPicker"),{ value:def, time:true, min:new Date(), lang:"de",
    onChange:(d)=>{ sync(d); setActive(null); } });
  const presets=[["Heute",0],["Morgen",1],["Übermorgen",2],["+1 Woche",7]];
  $("nQuick").innerHTML=presets.map(([l,o],i)=>`<button type="button" class="xchip${i===0?" on":""}" data-o="${o}">${l}</button>`).join("");
  $("nQuick").querySelectorAll(".xchip").forEach(b=>b.onclick=()=>{
    const d=new Date(); d.setDate(d.getDate()+ +b.dataset.o);
    const [H,M]=($("nTime").value||"08:00").split(":"); d.setHours(+H,+M,0,0);
    picker.set(d); sync(d); setActive(b);
  });
}

async function addExam(){
  const subj=$("nSubj").value.trim(),date=$("nDate").value,time=$("nTime").value||"08:00";
  if(!subj||!date){$("nMsg").textContent="Fach und Datum angeben.";return;}
  $("nMsg").textContent="…";
  try{
    const {error}=await sb.from("exams").insert({subject:subj,note:$("nNote").value.trim()||null,at:new Date(date+"T"+time).toISOString()});
    if(error)throw error;
    $("nSubj").value="";$("nNote").value="";$("nMsg").textContent="Gespeichert ✓";
    setTimeout(()=>$("nMsg").textContent="",1500);
    refresh();
  }catch(e){console.warn(e);$("nMsg").textContent="Fehler beim Speichern.";}
}

auth.onAuth(boot);
boot();
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=1"></script>
</body>
</html>
