<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tester — ian.lu</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=9"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--warn:#f87171}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:660px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:14px}
  .gate{text-align:center;color:var(--muted);padding:50px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .exam{display:flex;align-items:center;gap:14px;cursor:pointer}
  .exam .subj{font-weight:800;font-size:16px}
  .exam .when{color:var(--muted);font-size:13px;margin-top:2px}
  .exam .note{color:var(--muted);font-size:13px;font-style:italic;margin-top:2px}
  .exam .cd{margin-left:auto;text-align:right;font-variant-numeric:tabular-nums}
  .exam .cd b{font-size:20px;display:block}
  .exam .cd.soon b{color:var(--warn)}
  .exam.past{opacity:.5}
  .caret{color:var(--muted);font-size:13px;margin-left:6px}
  .detail{border-top:1px solid var(--border);margin-top:14px;padding-top:14px;display:none}
  .detail.open{display:block}
  .detail h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 8px}
  .n{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px;white-space:pre-wrap;word-break:break-word}
  .n .meta{color:var(--muted);font-size:11.5px;margin-top:5px;display:flex;gap:8px;align-items:center}
  .n a.file{color:var(--accent2);font-weight:700}
  .del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px}
  .del:hover{color:var(--warn)}
  .deck{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:7px 13px;font-size:13px;margin:0 6px 6px 0}
  .deckwrap{display:flex;flex-wrap:wrap;align-items:center}
  input,textarea{padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px;font-family:inherit;width:100%}
  textarea{min-height:60px;resize:vertical}
  .row2{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
  .ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:13px}
  .newx{display:grid;grid-template-columns:1fr;gap:8px}
  .msg{min-height:16px;color:var(--accent2);font-weight:700;font-size:13px}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>⏳ Tester</h1>
  <div class="spacer"></div>
  <span id="classTag"></span>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Lueden…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=5";
import { mountPicker } from "./datetime-picker.js?v=2";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb=null,myClass=null,me=null,exams=[],decksByExam={},openId=null,timer=null;
const DAY=86400000;

async function boot(){
  sb=await auth.client();
  auth.mountAccountButton($("acctHost"));
  if(!auth.session()){
    $("wrap").innerHTML=`<div class="gate">Mell dech un, fir d'Tester vun denger Klass ze gesinn.<br><br><button class="btn" id="si">Umellen</button></div>`;
    $("si").onclick=auth.openAuthModal;return;
  }
  me=auth.session().user.id;
  try{const {data}=await sb.from("profiles").select("class").eq("id",me).maybeSingle();myClass=data?.class||null;}catch{}
  if(!myClass){$("wrap").innerHTML=`<div class="gate">🎓 Setz zeréischt deng Klass (am <a href="profile.html">Profil</a>), da gesäis du d'Tester vun denger Klass.</div>`;return;}
  $("classTag").innerHTML=`<span class="deck" style="margin:0">${esc(myClass)}</span>`;
  $("wrap").innerHTML=`
    <div class="card newx">
      <input id="nSubj" maxlength="100" placeholder="Fach / Test (z.B. Mathe-Devoir)">
      <input type="hidden" id="nDate"><input type="hidden" id="nTime" value="08:00">
      <div id="nPicker"></div>
      <input id="nNote" maxlength="200" placeholder="Notiz (optional, z.B. Kapitel 4–6)">
      <button class="btn" id="nAdd">Test bäisetzen</button>
      <div class="msg" id="nMsg"></div>
    </div>
    <div id="list"><div class="gate">Lueden…</div></div>`;
  $("nAdd").onclick=addExam;
  wirePicker();
  await refresh();
}

function wirePicker(){
  const p=(n)=>String(n).padStart(2,"0");
  const iso=(d)=>`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  const hm=(d)=>`${p(d.getHours())}:${p(d.getMinutes())}`;
  const def=new Date();def.setHours(8,0,0,0);
  $("nDate").value=iso(def);$("nTime").value=hm(def);
  mountPicker($("nPicker"),{value:def,time:true,min:new Date(),lang:"lb",confirm:false,
    onChange:(d)=>{if(d){$("nDate").value=iso(d);$("nTime").value=hm(d);}}});
  ["nSubj","nNote"].forEach(id=>$(id).addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addExam();}}));
}

async function refresh(){
  const [{data:ex,error},{data:dk}]=await Promise.all([
    sb.from("exams").select("*").order("at"),
    sb.from("flashcard_decks").select("id,title,exam_id").not("exam_id","is",null),
  ]);
  if(error){$("list").innerHTML='<div class="gate">Feeler beim Lueden.</div>';return;}
  exams=(ex||[]).filter(e=>new Date(e.at).getTime()>Date.now()-DAY);
  decksByExam={};
  for(const d of dk||[]){(decksByExam[d.exam_id]=decksByExam[d.exam_id]||[]).push(d);}
  render();
  if(!timer)timer=setInterval(paintCountdowns,1000);
}

const pad=(n)=>String(n).padStart(2,"0");
function cdText(ms){
  if(ms<=0)return "elo!";
  const s=Math.floor(ms/1000),d=Math.floor(s/86400);
  if(d>0)return d+"d "+pad(Math.floor(s/3600)%24)+"h "+pad(Math.floor(s/60)%60)+"m";
  return pad(Math.floor(s/3600))+":"+pad(Math.floor(s/60)%60)+":"+pad(s%60);
}
function paintCountdowns(){
  for(const e of exams){
    const el=document.querySelector(`.cd[data-cd="${e.id}"] b`);
    if(!el)continue;
    const left=new Date(e.at).getTime()-Date.now();
    el.textContent=cdText(left);
    el.parentElement.classList.toggle("soon",left<3*DAY&&left>0);
  }
}
function render(){
  if(!exams.length){$("list").innerHTML='<div class="gate">Keng Tester — genéiss d\'Rou 😌</div>';return;}
  $("list").innerHTML=exams.map(e=>{
    const t=new Date(e.at),left=t.getTime()-Date.now();
    const when=t.toLocaleString("de-DE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    const nDecks=(decksByExam[e.id]||[]).length;
    return `<div class="card" style="margin-bottom:10px">
      <div class="exam${left<0?" past":""}" data-open="${e.id}">
        <div><div class="subj">${esc(e.subject)}${nDecks?` <span class="caret">🃏 ${nDecks}</span>`:""}</div>
          <div class="when">${when}</div>${e.note?`<div class="note">${esc(e.note)}</div>`:""}</div>
        <div class="cd${left<3*DAY&&left>0?" soon":""}" data-cd="${e.id}"><b>${cdText(left)}</b></div>
        <span class="caret">${openId===e.id?"▲":"▼"}</span>
      </div>
      <div class="detail${openId===e.id?" open":""}" id="det-${e.id}"></div>
    </div>`;
  }).join("");
  $("list").querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>toggle(el.dataset.open));
  if(openId)loadDetail(openId);
}

function toggle(id){ openId=(openId===id)?null:id; render(); }

async function loadDetail(id){
  const box=$("det-"+id);if(!box)return;
  const exam=exams.find(e=>e.id===id);
  const mine=exam&&exam.created_by===me;
  box.innerHTML="Lueden…";
  const [{data:notes},{data:decks}]=await Promise.all([
    sb.from("exam_notes").select("*").eq("exam_id",id).order("created_at"),
    sb.from("flashcard_decks").select("id,title").eq("exam_id",id),
  ]);
  const notesHtml=(notes||[]).map(n=>{
    const canDel=n.created_by===me;
    const file=n.file_url?`<a class="file" href="${esc(n.file_url)}" target="_blank" rel="noopener">📎 ${esc(n.file_name||"Datei")}</a>`:"";
    return `<div class="n">${n.body?esc(n.body):""}
      <div class="meta">${file}${canDel?`<button class="del" data-dn="${n.id}" title="Läschen">✕</button>`:""}</div></div>`;
  }).join("")||`<div class="n" style="color:var(--muted)">Nach keng Notizen. Setz deng Resimee oder Fotoen bäi 👇</div>`;
  const deckHtml=(decks||[]).map(d=>`<a class="deck" href="flashcards.html?deck=${d.id}">🃏 ${esc(d.title)}</a>`).join("");
  box.innerHTML=`
    <h3>Notizen & Resimee</h3>
    ${notesHtml}
    <textarea id="nb-${id}" placeholder="Schreif eng Notiz / Resimee…"></textarea>
    <div class="row2">
      <button class="btn" id="an-${id}">Notiz späicheren</button>
      <button class="ghost" id="af-${id}">📎 Datei / Foto</button>
      <input type="file" id="fi-${id}" accept="image/*,application/pdf" hidden>
      <span class="msg" id="nm-${id}"></span>
    </div>
    <h3 style="margin-top:16px">Kaartekëschten 🃏</h3>
    <div class="deckwrap">${deckHtml}
      <a class="deck" href="flashcards.html?exam=${id}&class=${encodeURIComponent(myClass)}">＋ Nei Këscht</a>
    </div>
    ${mine?`<div class="row2" style="margin-top:14px"><button class="ghost" id="dx-${id}">Test läschen</button></div>`:""}`;
  box.querySelectorAll("[data-dn]").forEach(b=>b.onclick=async()=>{
    await sb.from("exam_notes").delete().eq("id",b.dataset.dn);loadDetail(id);
  });
  $("an-"+id).onclick=()=>addNote(id,null,null);
  $("af-"+id).onclick=()=>$("fi-"+id).click();
  $("fi-"+id).onchange=(e)=>{const f=e.target.files&&e.target.files[0];e.target.value="";if(f)uploadFile(id,f);};
  if(mine)$("dx-"+id).onclick=async()=>{
    if(!confirm("Test läschen?"))return;
    await sb.from("exams").delete().eq("id",id);openId=null;refresh();
  };
}

async function addNote(id,fileUrl,fileName){
  const ta=$("nb-"+id),body=(ta?ta.value.trim():"")||null;
  if(!body&&!fileUrl){setMsg(id,"Schreif eppes oder häng eng Datei un.",true);return;}
  setMsg(id,"Späicheren…");
  try{
    const {error}=await sb.from("exam_notes").insert({exam_id:id,class:myClass,body,file_url:fileUrl,file_name:fileName});
    if(error)throw error;
    if(ta)ta.value="";
    loadDetail(id);
  }catch(e){console.warn(e);setMsg(id,"Feeler beim Späicheren.",true);}
}

async function uploadFile(id,file){
  if(file.size>8*1024*1024){setMsg(id,"Datei ze grouss (max 8 MB).",true);return;}
  setMsg(id,"Eroplueden…");
  try{
    const ext=(file.name.split(".").pop()||"bin").toLowerCase().replace(/[^a-z0-9]/g,"");
    const path=`${me}/${id}-${Date.now()}.${ext}`;
    const {error}=await sb.storage.from("exam-files").upload(path,file,{contentType:file.type||"application/octet-stream"});
    if(error)throw error;
    const url=sb.storage.from("exam-files").getPublicUrl(path).data.publicUrl;
    await addNote(id,url,file.name);
  }catch(e){console.warn(e);setMsg(id,"Upload feelgeschloen (Migratioun gelaf?).",true);}
}

function setMsg(id,t,err){
  const m=$("nm-"+id);if(!m)return;
  m.textContent=t;m.style.color=err?"#ff6b6b":"var(--accent2)";
  if(t&&!err&&/✓|gelueden|gespäichert/i.test(t))setTimeout(()=>{if(m)m.textContent="";},1500);
}

async function addExam(){
  const subj=$("nSubj").value.trim(),date=$("nDate").value,time=$("nTime").value||"08:00";
  if(!subj||!date){$("nMsg").textContent="Fach an Datum uginn.";return;}
  $("nMsg").textContent="…";
  try{
    const {error}=await sb.from("exams").insert({subject:subj,note:$("nNote").value.trim()||null,at:new Date(date+"T"+time).toISOString(),class:myClass});
    if(error)throw error;
    $("nSubj").value="";$("nNote").value="";$("nMsg").textContent="Gespäichert ✓";
    setTimeout(()=>$("nMsg").textContent="",1500);
    refresh();
  }catch(e){console.warn(e);$("nMsg").textContent="Feeler beim Späicheren.";}
}

auth.onAuth(boot);
boot();
</script>
  <script type="module" src="rtc-ring.js?v=2"></script>
  <script type="module" src="class-gate.js?v=4"></script>
</body>
</html>
