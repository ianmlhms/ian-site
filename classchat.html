<head>

<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;height:var(--vvh,100dvh);background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:calc(12px + env(safe-area-inset-top,0px)) max(16px,env(safe-area-inset-left)) 12px max(16px,env(safe-area-inset-right));border-bottom:1px solid var(--border);flex:none}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:17px;margin:0}.bar .spacer{flex:1}
  .class-tag{display:inline-block;font-size:11px;font-weight:800;color:#5cc8ff;background:rgba(92,200,255,.14);border:1px solid rgba(92,200,255,.45);border-radius:999px;padding:1px 8px;margin-left:8px;vertical-align:middle;letter-spacing:.3px}
  .admin-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#ffcf4d;background:rgba(255,207,77,.14);border:1px solid rgba(255,207,77,.45);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle}
  .vip-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#d7b3ff;background:rgba(170,110,255,.16);border:1px solid rgba(170,110,255,.5);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle}
  .ct{display:inline-block;font-size:9.5px;font-weight:800;color:#5cc8ff;background:rgba(92,200,255,.14);border:1px solid rgba(92,200,255,.45);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle}
  #chat{flex:1;overflow-y:auto;padding:14px max(12px,env(safe-area-inset-left)) 14px max(12px,env(safe-area-inset-right));display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
  .b{max-width:82%;padding:8px 12px;border-radius:14px;background:var(--card);border:1px solid var(--border);align-self:flex-start}
  .b.mine{align-self:flex-end;background:rgba(110,168,254,.16);border-color:rgba(110,168,254,.4)}
  .who{font-size:12px;font-weight:800;color:var(--accent2);margin-bottom:2px}
  .b.mine .who{display:none}
  .txt{font-size:15px;line-height:1.35;word-wrap:break-word;white-space:pre-wrap}
  .tm{font-size:10.5px;color:var(--muted);margin-top:3px;text-align:right}
  .composer{flex:none;display:flex;gap:8px;padding:10px max(12px,env(safe-area-inset-left)) calc(10px + env(safe-area-inset-bottom,0px)) max(12px,env(safe-area-inset-right));border-top:1px solid var(--border);background:var(--bg)}
  .composer input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:22px;padding:11px 16px;font-size:16px;outline:none}
  .composer button{flex:none;width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#04121f;font-size:19px;font-weight:800;cursor:pointer}
  .composer button:disabled{opacity:.5}
  .center{margin:auto;text-align:center;color:var(--muted);padding:20px;max-width:320px}
  .center a{font-weight:700}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>🗣️ Klass-Chat<span id="classTag"></span></h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div id="chat"><div class="center" id="status">Lueden…</div></div>

<div class="composer" id="composer" style="display:none">
  <input id="msg" maxlength="2000" placeholder="Message un deng Klass…" autocomplete="off">
  <button id="send" aria-label="Schécken">➤</button>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb=null,myClass=null,me=null,adminIds=new Set(),vipIds=new Set(),prof={},chan=null,seen=new Set();

const fmtTime=(t)=>{const d=new Date(t);return d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});};
const tags=(uid)=>`${prof[uid]&&prof[uid].class?`<span class="ct">${esc(prof[uid].class)}</span>`:""}${adminIds.has(uid)?` <span class="admin-tag">👑</span>`:""}${vipIds.has(uid)?` <span class="vip-tag">⭐</span>`:""}`;

function bubble(m){
  if(seen.has(m.id))return; seen.add(m.id);
  const mine=m.user_id===me;
  const el=document.createElement("div");
  el.className="b"+(mine?" mine":"");
  el.innerHTML=`<div class="who">${esc((prof[m.user_id]&&prof[m.user_id].username)||"…")}${tags(m.user_id)}</div>`+
    `<div class="txt">${esc(m.body)}</div><div class="tm">${fmtTime(m.created_at)}</div>`;
  $("chat").appendChild(el);
}
const scrollDown=()=>{const c=$("chat");c.scrollTop=c.scrollHeight;};

async function ensureNames(ids){
  const need=[...new Set(ids)].filter(id=>id&&!(id in prof));
  if(!need.length)return;
  const {data}=await sb.from("profiles").select("id,username,class").in("id",need);
  for(const p of data||[])prof[p.id]={username:p.username,class:p.class};
}

async function start(){
  sb=sb||await auth.client();
  if(!auth.session()){$("status").innerHTML='🔒 <a href="#" id="gb">Mell dech un</a> fir den Klass-Chat.';$("gb").onclick=(e)=>{e.preventDefault();auth.openAuthModal();};return;}
  me=auth.session().user.id;
  const {data:mine}=await sb.from("profiles").select("class").eq("id",me).maybeSingle();
  myClass=(mine&&mine.class)||null;
  if(!myClass){$("status").innerHTML="🎓 Setz zeréischt deng Klass, da kanns du am Klass-Chat matschreiwen.";return;}
  $("classTag").innerHTML=`<span class="class-tag">${esc(myClass)}</span>`;
  try{const{data}=await sb.rpc("admin_user_ids");adminIds=new Set((data||[]).map(r=>r.user_id));}catch{}
  try{const{data}=await sb.rpc("vip_user_ids");vipIds=new Set((data||[]).map(r=>r.user_id));}catch{}
  const {data:msgs,error}=await sb.from("class_chat").select("*").order("created_at",{ascending:true}).limit(200);
  if(error){$("status").textContent="Feeler beim Lueden.";console.warn(error);return;}
  await ensureNames((msgs||[]).map(m=>m.user_id));
  seen=new Set();$("chat").innerHTML="";   // reset dedupe when rebuilding the list
  if(!(msgs||[]).length){const d=document.createElement("div");d.className="center";d.textContent="Nach keng Messagen. Sief deen éischten! 👋";$("chat").appendChild(d);}
  for(const m of msgs||[])bubble(m);
  $("composer").style.display="";scrollDown();
  subscribe();
}

function subscribe(){
  if(chan)return;
  chan=sb.channel("classchat:"+myClass)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"class_chat"},async(p)=>{
      const m=p.new; if(!m||m.class!==myClass||seen.has(m.id))return;   // RLS already scopes; guard anyway
      await ensureNames([m.user_id]);
      const atBottom=$("chat").scrollHeight-$("chat").scrollTop-$("chat").clientHeight<80;
      bubble(m); if(atBottom||m.user_id===me)scrollDown();
    }).subscribe();
}

async function send(){
  const body=$("msg").value.trim();
  if(!body)return;
  $("msg").value="";$("send").disabled=true;
  try{const {error}=await sb.from("class_chat").insert({class:myClass,body});if(error)throw error;}
  catch(e){console.warn("[classchat] send",e);$("msg").value=body;}
  finally{$("send").disabled=false;$("msg").focus();}
}
$("send").onclick=send;
$("msg").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});

// keep the composer above the on-screen keyboard (see messenger.html)
(function(){const vv=window.visualViewport;if(!vv)return;
  const fit=()=>{document.documentElement.style.setProperty("--vvh",vv.height+"px");};
  vv.addEventListener("resize",fit);vv.addEventListener("scroll",fit);fit();
  $("msg").addEventListener("focus",()=>setTimeout(scrollDown,250));
})();

auth.mountAccountButton($("acctHost"));
auth.onAuth(()=>{if(auth.session())start();});
start();
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
