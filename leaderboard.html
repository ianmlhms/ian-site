<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leaderboard — ian.lu</title>
<meta name="description" content="Cross-game rankings.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=1"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--good:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{max-width:620px;margin:0 auto;padding:22px 16px 60px}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .tabs button{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:800;cursor:pointer;font-size:13px}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:left}
  th{color:var(--muted);font-size:12px}
  td.n{text-align:right;font-variant-numeric:tabular-nums}
  .rank{color:var(--muted);width:28px}
  .top1 .rank{color:#ffd54a}.top2 .rank{color:#cbd5e1}.top3 .rank{color:#d9a066}
  .pct{color:var(--good);font-weight:800}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:34px 10px}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="games.html">‹ Games</a>
  <h1>🏆 Leaderboard</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <button data-g="" class="on">All games</button>
    <button data-g="connect4">🔴 Connect 4</button>
    <button data-g="battleship">🚢 Battleship</button>
    <button data-g="color">🎨 Colour Dial</button>
    <button data-g="reversi">⚫ Reversi</button>
    <button data-g="dots">▦ Dots &amp; Boxes</button>
    <button data-g="tictactoe">✕ Tic-Tac-Toe</button>
  </div>
  <div id="body"><p class="muted">Loading…</p></div>
  <p class="muted" style="font-size:12.5px;margin-top:18px">Only games played while <b>signed in</b> count. Win/loss is self-reported per player.</p>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="notify-ambient.js?v=1"></script>
<script type="module">
import * as auth from "./auth.js?v=3";
const $ = (id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
let sb=null, game="";
(async()=>{ if(auth.authConfigured){ auth.mountAccountButton($("acctHost")); sb=await auth.client(); } draw(); })();

async function draw(){
  const body=$("body"); body.innerHTML=`<p class="muted">Loading…</p>`;
  try{
    if(!sb) sb=await auth.client();
    const { data, error }=await sb.rpc("game_leaderboard",{ p_game: game||null });
    if(error) throw error;
    if(!data||!data.length){ body.innerHTML=`<div class="empty">No games recorded yet — play a match while signed in!</div>`; return; }
    body.innerHTML=`<table><tr><th class="rank">#</th><th>Player</th><th class="n">W</th><th class="n">L</th><th class="n">Win%</th></tr>`+
      data.map((r,i)=>`<tr class="top${i+1}"><td class="rank">${i+1}</td><td>${esc(r.username)}</td><td class="n">${r.wins}</td><td class="n">${r.losses}</td><td class="n pct">${r.winpct==null?"—":r.winpct+"%"}</td></tr>`).join("")+
      `</table>`;
  }catch(e){ body.innerHTML=`<div class="empty">Couldn't load the leaderboard.</div>`; console.warn(e); }
}
document.querySelectorAll("[data-g]").forEach(b=> b.onclick=()=>{ game=b.dataset.g; document.querySelectorAll("[data-g]").forEach(x=>x.classList.toggle("on",x===b)); draw(); });
</script>
</body>
</html>
