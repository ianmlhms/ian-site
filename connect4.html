<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Connect 4 — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=8"></script>
<link rel="stylesheet" href="game-common.css?v=3">
<style>
  :root{--red:#ff5d6c;--yellow:#ffcc4d;--board:#1b2150}
  body{display:flex;flex-direction:column}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
  .board{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;background:var(--board);padding:12px;border-radius:16px;touch-action:manipulation}
  .cell{width:min(11vw,58px);height:min(11vw,58px);border-radius:50%;background:var(--bg);transition:background .15s}
  .cell.r{background:var(--red)} .cell.y{background:var(--yellow)}
  .col{display:contents}
  .board.mine .cell{cursor:pointer}
  .colbtns{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;width:100%;max-width:498px;padding:0 12px}
  .colbtns button{height:26px;border:none;border-radius:8px;background:var(--card2);color:var(--muted);cursor:pointer;font-size:14px}
  .colbtns button:hover:not(:disabled){background:var(--accent);color:#fff}
  .colbtns button:disabled{opacity:.3;cursor:default}
  .me{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:-2px;margin:0 4px}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="pixelbreak.html">‹ Games</a>
  <h1>🔴 Connect 4</h1>
  <div class="spacer"></div>
</header>

<div class="wrap">
  <div class="status" id="status">Connecting…</div>
  <div class="sub" id="sub"></div>
  <div class="colbtns" id="colbtns"></div>
  <div class="board" id="board"></div>
  <button class="btn" id="rematch" style="display:none">↻ Rematch</button>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game-common.js?v=1"></script>
<script type="module" src="notify-ambient.js?v=2"></script>
<script>
const COLS = 7, ROWS = 6;
const GC = window.GameCommon;
const { AI, room, role } = GC;
const me = role === "host" ? 1 : 2;          // 1 = red (host, first), 2 = yellow
const opp = me === 1 ? 2 : 1;
let board = [], turn = 1, over = false, oppHere = false, recorded = false;
const recordResult = GC.recordResult;

/* ---------- difficulty (AI mode) ---------- */
let difficulty = GC.difficultyFromUrl();
const BLUNDER = { easy: 0.55, normal: 0.18, hard: 0 };
const blunder = () => Math.random() < BLUNDER[difficulty];

const $ = (id) => document.getElementById(id);
let ch = null;   // realtime channel (multiplayer only)

function fresh() { board = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); turn = 1; over = false; recorded = false; }
function render() {
  const b = $("board"); b.className = "board" + (turn === me && !over && oppHere ? " mine" : "");
  b.innerHTML = "";
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const d = document.createElement("div");
    d.className = "cell" + (board[r][c] === 1 ? " r" : board[r][c] === 2 ? " y" : "");
    b.appendChild(d);
  }
  const cb = $("colbtns"); cb.innerHTML = "";
  for (let c = 0; c < COLS; c++) {
    const btn = document.createElement("button"); btn.textContent = "▼";
    btn.disabled = over || turn !== me || !oppHere || board[0][c] !== 0;
    btn.onclick = () => play(c, me, true);
    cb.appendChild(btn);
  }
  updateStatus();
}
function updateStatus() {
  const mineColor = me === 1 ? "var(--red)" : "var(--yellow)";
  const dot = `<span class="me" style="background:${mineColor}"></span>`;
  if (over === "draw") return setStatus("It's a draw.");
  if (over) return setStatus((over === me ? "You win! 🎉" : "You lost.") );
  if (!oppHere) return setStatus(`Waiting for opponent…`, `Share room <code>${room}</code> or invite from Friends.`);
  setStatus(turn === me ? `Your turn ${dot}` : (AI ? `Computer thinking…` : `Opponent's turn`));
}
function setStatus(h, sub = "") { $("status").innerHTML = h; $("sub").innerHTML = sub; }

function drop(col, player) {
  for (let r = ROWS - 1; r >= 0; r--) if (board[r][col] === 0) { board[r][col] = player; return r; }
  return -1;
}
function play(col, player, local) {
  if (over || board[0][col] !== 0) return;
  if (local && (turn !== me || !oppHere)) return;
  const r = drop(col, player);
  if (r < 0) return;
  if (wins(r, col, player)) over = player;
  else if (board[0].every(v => v !== 0)) over = "draw";
  else turn = player === 1 ? 2 : 1;
  render();
  if (over) $("rematch").style.display = "";
  if (over && !AI && !recorded) { recorded = true; recordResult("connect4", over === "draw" ? "draw" : over === me ? "win" : "loss"); }
  if (local && !AI) ch.send({ type: "broadcast", event: "move", payload: { col, player } });
  if (AI && !over && turn === opp) setTimeout(aiMove, 350);   // computer replies
}
function wins(r, c, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let n = 1;
    for (const s of [1, -1]) { let rr = r + dr*s, cc = c + dc*s;
      while (rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&board[rr][cc]===p){ n++; rr+=dr*s; cc+=dc*s; } }
    if (n >= 4) return true;
  }
  return false;
}

if (AI) {
  document.querySelector(".bar h1").textContent = "🔴 Connect 4 — vs Computer";
  GC.mountDifficulty(() => difficulty, (d) => { difficulty = d; });
  oppHere = true; fresh(); render();
} else {
  ch = GC.createChannel("c4");
  ch.on("broadcast", { event: "move" }, ({ payload }) => play(payload.col, payload.player, false))
    .on("broadcast", { event: "reset" }, () => { fresh(); $("rematch").style.display = "none"; render(); });
  fresh(); render();
  GC.joinRoom(ch, {
    getState: () => ({ board, turn, over }),
    setState: (p) => { board = p.board; turn = p.turn; over = p.over; render(); if (over) $("rematch").style.display = ""; },
    isStarted: () => over !== false || board.some((row) => row.some((v) => v)),
    onPeers: (here) => { oppHere = here; render(); },
    onSeatTaken: () => { over = true; render(); setStatus("Seat already taken", `This room already has a ${role} — join with the other role or start a new room.`); },
  });
}

$("rematch").onclick = () => { fresh(); $("rematch").style.display = "none"; render(); if (!AI) ch.send({ type: "broadcast", event: "reset" }); };

/* ---------- AI (minimax + alpha-beta), computer plays `opp` (=2) ---------- */
function aiMove() {
  if (over) return;
  const col = aiBestMove();
  if (col != null) play(col, opp, false);
}
const cloneB = (b) => b.map((row) => row.slice());
function colsOpen(b) { const a = []; for (let c = 0; c < COLS; c++) if (b[0][c] === 0) a.push(c); return a; }
function dropSim(b, c, p) { for (let r = ROWS - 1; r >= 0; r--) if (b[r][c] === 0) { b[r][c] = p; return r; } return -1; }
function winAt(b, r, c, p) {
  for (const [dr, dc] of [[0, 1], [1, 0], [1, 1], [1, -1]]) {
    let n = 1;
    for (const s of [1, -1]) { let rr = r + dr * s, cc = c + dc * s; while (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS && b[rr][cc] === p) { n++; rr += dr * s; cc += dc * s; } }
    if (n >= 4) return true;
  }
  return false;
}
function winScore(w) {
  const n2 = w.filter((v) => v === 2).length, n1 = w.filter((v) => v === 1).length, n0 = w.filter((v) => v === 0).length;
  if (n2 && n1) return 0;
  if (n2 === 3 && n0 === 1) return 50;
  if (n2 === 2 && n0 === 2) return 10;
  if (n1 === 3 && n0 === 1) return -80;
  if (n1 === 2 && n0 === 2) return -10;
  return 0;
}
function evalBoard(b) {
  let s = 0;
  for (let r = 0; r < ROWS; r++) { if (b[r][3] === 2) s += 3; else if (b[r][3] === 1) s -= 3; }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) for (const [dr, dc] of [[0, 1], [1, 0], [1, 1], [1, -1]]) {
    const w = []; for (let k = 0; k < 4; k++) { const rr = r + dr * k, cc = c + dc * k; if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) { w.length = 0; break; } w.push(b[rr][cc]); }
    if (w.length === 4) s += winScore(w);
  }
  return s;
}
function minimax(b, depth, alpha, beta, maxing) {
  const valid = colsOpen(b);
  if (depth === 0 || !valid.length) return valid.length ? evalBoard(b) : 0;
  if (maxing) {
    let best = -1e9;
    for (const c of valid) { const nb = cloneB(b); const r = dropSim(nb, c, 2); const v = winAt(nb, r, c, 2) ? 100000 + depth : minimax(nb, depth - 1, alpha, beta, false); best = Math.max(best, v); alpha = Math.max(alpha, v); if (alpha >= beta) break; }
    return best;
  } else {
    let best = 1e9;
    for (const c of valid) { const nb = cloneB(b); const r = dropSim(nb, c, 1); const v = winAt(nb, r, c, 1) ? -100000 - depth : minimax(nb, depth - 1, alpha, beta, true); best = Math.min(best, v); beta = Math.min(beta, v); if (alpha >= beta) break; }
    return best;
  }
}
function aiBestMove() {
  const valid = colsOpen(board);
  if (!valid.length) return null;
  if (blunder()) return valid[Math.floor(Math.random() * valid.length)];          // weaker levels play a random column
  const DEPTH = difficulty === "easy" ? 2 : difficulty === "hard" ? 5 : 4;
  for (const c of valid) { const nb = cloneB(board); const r = dropSim(nb, c, 2); if (winAt(nb, r, c, 2)) return c; }  // win now
  for (const c of valid) { const nb = cloneB(board); const r = dropSim(nb, c, 1); if (winAt(nb, r, c, 1)) return c; }  // block
  const order = valid.slice().sort((a, b) => Math.abs(3 - a) - Math.abs(3 - b));   // centre first (better pruning)
  let best = -1e9, bestCols = [];
  for (const c of order) {
    const nb = cloneB(board); const r = dropSim(nb, c, 2);
    const v = winAt(nb, r, c, 2) ? 100000 : minimax(nb, DEPTH - 1, -1e9, 1e9, false);
    if (v > best) { best = v; bestCols = [c]; } else if (v === best) bestCols.push(c);
  }
  return bestCols[Math.floor(Math.random() * bestCols.length)];
}
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
