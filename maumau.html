<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mau-Mau — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=10"></script>
<link rel="stylesheet" href="game-common.css?v=3">
<style>
  :root{--redsuit:#ff5d6c;--cardbg:#f5f2ea;--cardink:#1a1a2e}
  body{display:flex;flex-direction:column}
  .wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px}
  .opp{display:flex;gap:4px;min-height:44px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:92vw}
  .table{display:flex;gap:18px;align-items:center}
  .card{width:64px;height:92px;border-radius:10px;background:var(--cardbg);color:var(--cardink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;
    font-size:22px;box-shadow:0 3px 8px rgba(0,0,0,.45);border:1px solid rgba(0,0,0,.25);flex:0 0 auto}
  .card .s{font-size:26px;line-height:1}
  .card.red{color:var(--redsuit)}
  .card.back{background:linear-gradient(135deg,#243a8f,#101b4d);color:transparent;border:1px solid var(--border)}
  .card.mini{width:30px;height:44px;border-radius:6px}
  .stock{position:relative;cursor:pointer}
  .stock .n{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}
  .badges{display:flex;gap:8px;min-height:26px}
  .badge{background:var(--card2);border:1px solid var(--accent);color:var(--accent2);border-radius:20px;padding:3px 12px;font-size:13px;font-weight:800}
  .hand{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:94vw}
  .hand .card{cursor:default;transition:transform .12s;opacity:.55}
  .hand .card.ok{cursor:pointer;opacity:1}
  .hand .card.ok:hover{transform:translateY(-8px)}
  .wishbox{display:none;gap:10px}
  .wishbox button{font-size:26px;width:56px;height:56px;border-radius:12px;border:1px solid var(--border);background:var(--cardbg);cursor:pointer}
  .rules{color:var(--muted);font-size:12px;text-align:center;max-width:420px;line-height:1.5}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  <meta name="theme-color" content="#0d0d1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
</head>
<body>
<header class="bar">
  <a class="home" href="pixelbreak.html">‹ Games</a>
  <h1>🃏 Mau-Mau</h1>
  <div class="spacer"></div>
</header>

<div class="wrap">
  <div class="status" id="status">Connecting…</div>
  <div class="sub" id="sub"></div>
  <div class="opp" id="opp"></div>
  <div class="table">
    <div class="stock" id="stock"><div class="card back">🂠</div><div class="n" id="stockN"></div></div>
    <div id="top"></div>
  </div>
  <div class="badges" id="badges"></div>
  <div class="wishbox" id="wishbox"></div>
  <div class="hand" id="hand"></div>
  <button class="btn" id="rematch" style="display:none">↻ Rematch</button>
  <div class="rules">Match suit or rank · 7 = opponent draws 2 (stack 7s to pass it on) · 8 = play again · J = any card + wish a suit · first empty hand wins</div>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game-common.js?v=1"></script>
<script type="module" src="notify-ambient.js?v=5"></script>
<script>
/* Mau-Mau with a 32-card deck. The whole game is derived deterministically from
 * one seed (deal + every reshuffle), so clients only exchange the seed and the
 * moves — both sides replay the same reducer and stay in sync. */
const GC = window.GameCommon;
const { AI, room, role } = GC;
const me = role === "host" ? 1 : 2;
const opp = 3 - me;
const $ = (id) => document.getElementById(id);
const recordResult = GC.recordResult;

const SUITS = ["♠", "♥", "♣", "♦"];
const RANKS = ["7", "8", "9", "10", "J", "Q", "K", "A"];
const suitOf = (c) => Math.floor(c / 8);
const rankOf = (c) => c % 8;               // 0=7 1=8 4=J
const isRed = (c) => suitOf(c) === 1 || suitOf(c) === 3;

let difficulty = GC.difficultyFromUrl();

function mulberry32(a) {
  return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
}
function shuffled(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

/* ---------- state + reducers (identical on both clients) ---------- */
let seed = 0, reshuffles = 0, hands = { 1: [], 2: [] }, stock = [], discard = [];
let wish = null, pending = 0, turn = 1, over = 0, moveCount = 0;
let oppHere = false, recorded = false, dealt = false;
let ch = null;

function setup(s) {
  seed = s; reshuffles = 0;
  const deck = shuffled(Array.from({ length: 32 }, (_, i) => i), mulberry32(seed));
  hands = { 1: deck.slice(0, 5), 2: deck.slice(5, 10) };
  discard = [deck[10]]; stock = deck.slice(11);
  wish = null; pending = 0; turn = 1; over = 0; moveCount = 0; recorded = false; dealt = true;
}
// "topCard" not "top" — a global lexical `top` collides with the browser's
// non-configurable window.top and kills the whole script with a SyntaxError.
const topCard = () => discard[discard.length - 1];
function canPlay(c) {
  if (pending) return rankOf(c) === 0;                    // only another 7 passes the draw on
  if (rankOf(c) === 4) return true;                       // J goes on anything
  if (wish !== null) return suitOf(c) === wish;
  return suitOf(c) === suitOf(topCard()) || rankOf(c) === rankOf(topCard());
}
function takeCard() {
  if (!stock.length) {
    const t = discard.pop();
    if (!discard.length) { discard = [t]; return null; }  // every card is in a hand
    reshuffles++;
    stock = shuffled(discard, mulberry32(seed + reshuffles * 7919));
    discard = [t];
  }
  return stock.shift();
}
function applyPlay(p, c, wishSuit) {
  hands[p] = hands[p].filter((x) => x !== c);
  discard.push(c); wish = null; moveCount++;
  let next = 3 - p;
  if (rankOf(c) === 0) pending += 2;
  else if (rankOf(c) === 1) next = p;                     // 8: opponent skipped → play again
  else if (rankOf(c) === 4) wish = wishSuit;
  if (!hands[p].length) over = p; else turn = next;
}
function applyDraw(p) {
  const n = pending || 1; pending = 0; moveCount++;
  for (let i = 0; i < n; i++) { const c = takeCard(); if (c !== null) hands[p].push(c); }
  turn = 3 - p;
}

/* ---------- render ---------- */
function cardHTML(c, mini) {
  return `<div class="card${isRed(c) ? " red" : ""}${mini ? " mini" : ""}"><div>${RANKS[rankOf(c)]}</div><div class="s">${SUITS[suitOf(c)]}</div></div>`;
}
function render() {
  $("opp").innerHTML = hands[opp].map(() => '<div class="card back mini"></div>').join("") +
    `<span style="color:var(--muted);font-size:13px;margin-left:8px">${AI ? "🤖" : "Opponent"}: ${hands[opp].length}</span>`;
  $("top").innerHTML = dealt ? cardHTML(topCard()) : '<div class="card back"></div>';
  $("stockN").textContent = stock.length + " left";
  const badges = [];
  if (pending) badges.push(`<span class="badge">+${pending} draw</span>`);
  if (wish !== null) badges.push(`<span class="badge">Wish: ${SUITS[wish]}</span>`);
  $("badges").innerHTML = badges.join("");
  const myTurn = turn === me && !over && oppHere && dealt;
  $("hand").innerHTML = hands[me].map((c) =>
    `<div class="card${isRed(c) ? " red" : ""}${myTurn && canPlay(c) ? " ok" : ""}" data-c="${c}"><div>${RANKS[rankOf(c)]}</div><div class="s">${SUITS[suitOf(c)]}</div></div>`).join("");
  $("hand").querySelectorAll(".ok").forEach((el) => { el.onclick = () => humanPlay(+el.dataset.c); });
  updateStatus(myTurn);
}
function updateStatus(myTurn) {
  if (over) { setStatus(over === me ? "Mau-Mau! You win! 🎉" : "You lost — empty hand across the table."); return; }
  if (!oppHere) return setStatus("Waiting for opponent…", `Share room <code>${room}</code> or invite from Friends.`);
  if (!dealt) return setStatus("Dealing…");
  if (!myTurn) return setStatus(AI ? "Computer thinking…" : "Opponent's turn");
  const has = hands[me].some(canPlay);
  setStatus("Your turn", has ? (pending ? `Play a 7 or draw ${pending}.` : "Play a highlighted card, or tap the deck.") : (pending ? `No 7 — tap the deck to draw ${pending}.` : "No playable card — tap the deck."));
}
function setStatus(h, sub = "") { $("status").innerHTML = h; $("sub").innerHTML = sub; }
function finish() {
  $("rematch").style.display = "";
  if (!AI && !recorded) { recorded = true; recordResult("maumau", over === me ? "win" : "loss"); }
}

/* ---------- local actions ---------- */
function humanPlay(c) {
  if (turn !== me || over || !canPlay(c)) return;
  if (rankOf(c) === 4) { askWish(c); return; }
  doPlay(me, c, null);
}
function askWish(c) {
  const box = $("wishbox");
  box.style.display = "flex";
  box.innerHTML = SUITS.map((s, i) => `<button data-w="${i}" style="color:${i === 1 || i === 3 ? "var(--redsuit)" : "#1a1a2e"}">${s}</button>`).join("");
  box.querySelectorAll("button").forEach((b) => { b.onclick = () => { box.style.display = "none"; doPlay(me, c, +b.dataset.w); }; });
}
function doPlay(p, c, wishSuit) {
  applyPlay(p, c, wishSuit);
  render();
  if (over) finish();
  if (p === me && !AI) ch.send({ type: "broadcast", event: "play", payload: { c, wish: wishSuit } });
  if (AI && !over && turn === opp) setTimeout(aiTurn, 800);
}
function doDraw(p) {
  applyDraw(p);
  render();
  if (p === me && !AI) ch.send({ type: "broadcast", event: "draw", payload: {} });
  if (AI && !over && turn === opp) setTimeout(aiTurn, 800);
}
$("stock").onclick = () => { if (turn === me && !over && oppHere && dealt && !hands[me].some(canPlay)) doDraw(me); };

/* ---------- AI opponent (seat 2) ---------- */
function aiTurn() {
  if (over || turn !== opp) return;
  const playable = hands[opp].filter(canPlay);
  if (!playable.length) { doDraw(opp); return; }
  let c;
  if (difficulty === "easy") c = playable[Math.floor(Math.random() * playable.length)];
  else {
    // prefer punishing 7s/8s, keep Jacks for later
    const score = (x) => (rankOf(x) === 0 ? 3 : rankOf(x) === 1 ? 2 : rankOf(x) === 4 ? -2 : 0) + Math.random() * 0.5;
    c = playable.slice().sort((a, b) => score(b) - score(a))[0];
  }
  let wishSuit = null;
  if (rankOf(c) === 4) {
    const cnt = [0, 0, 0, 0];
    hands[opp].forEach((x) => { if (x !== c) cnt[suitOf(x)]++; });
    wishSuit = difficulty === "easy" ? Math.floor(Math.random() * 4) : cnt.indexOf(Math.max(...cnt));
  }
  doPlay(opp, c, wishSuit);
}

/* ---------- wiring ---------- */
function rematch() {
  if (AI || role === "host") {
    setup(Math.floor(Math.random() * 2147483647));
    $("rematch").style.display = "none"; render();
    if (!AI) ch.send({ type: "broadcast", event: "deal", payload: { seed } });
    if (AI && turn === opp) setTimeout(aiTurn, 800);
  } else {
    ch.send({ type: "broadcast", event: "again", payload: {} });
    setStatus("Asked the host for a rematch…");
  }
}
$("rematch").onclick = rematch;

if (AI) {
  document.querySelector(".bar h1").textContent = "🃏 Mau-Mau — vs Computer";
  GC.mountDifficulty(() => difficulty, (d) => { difficulty = d; });
  oppHere = true;
  setup(Math.floor(Math.random() * 2147483647));
  render();
} else {
  ch = GC.createChannel("mau");
  ch.on("broadcast", { event: "deal" }, ({ payload }) => { setup(payload.seed); $("rematch").style.display = "none"; render(); })
    .on("broadcast", { event: "play" }, ({ payload }) => { if (turn === opp) doPlay(opp, payload.c, payload.wish); })
    .on("broadcast", { event: "draw" }, () => { if (turn === opp) doDraw(opp); })
    .on("broadcast", { event: "again" }, () => { if (role === "host" && over) rematch(); });
  render();
  GC.joinRoom(ch, {
    getState: () => ({ seed, reshuffles, hands, stock, discard, wish, pending, turn, over, moveCount, dealt }),
    setState: (p) => {
      seed = p.seed; reshuffles = p.reshuffles; hands = p.hands; stock = p.stock; discard = p.discard;
      wish = p.wish; pending = p.pending; turn = p.turn; over = p.over; moveCount = p.moveCount; dealt = p.dealt;
      render(); if (over) $("rematch").style.display = "";
    },
    isStarted: () => dealt && (moveCount > 0 || over !== 0),
    onPeers: (here) => {
      oppHere = here; render();
      // host deals once both seats are filled; a game already in progress is
      // resynced via gc-state instead (isStarted gates the redeal)
      if (here && role === "host" && !dealt) {
        setTimeout(() => {
          if (dealt || !oppHere) return;
          setup(Math.floor(Math.random() * 2147483647));
          ch.send({ type: "broadcast", event: "deal", payload: { seed } });
          render();
        }, 600);
      }
    },
    onSeatTaken: () => { over = -1; render(); setStatus("Seat already taken", `This room already has a ${role} — join with the other role or start a new room.`); },
  });
}
</script>
  <script type="module" src="rtc-ring.js?v=2"></script>
  <script type="module" src="class-gate.js?v=4"></script>
</body>
</html>
