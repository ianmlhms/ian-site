<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--ok:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:700px;margin:0 auto;padding:18px 14px 24px;display:flex;flex-direction:column;gap:14px;min-height:0}
  .gate{text-align:center;color:var(--muted);padding:20px}
  /* ---- picker ---- */
  .hero{text-align:center;padding:12px 6px 2px}
  .hero .hi{font-size:42px;line-height:1;filter:drop-shadow(0 6px 18px rgba(110,168,254,.45))}
  .hero h2{margin:10px 0 4px;font-size:22px;font-weight:800}
  .hero p{margin:0 auto;max-width:420px;color:var(--muted);font-size:13.5px;line-height:1.4}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .mode{position:relative;overflow:hidden;text-align:left;background:linear-gradient(155deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;color:var(--text);transition:transform .15s ease,border-color .15s,box-shadow .15s}
  .mode:hover,.mode:active{transform:translateY(-3px);border-color:var(--m,var(--accent2));box-shadow:0 12px 26px rgba(0,0,0,.28)}
  .mode::after{content:"";position:absolute;right:-28px;top:-28px;width:92px;height:92px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--m,var(--accent)) 34%,transparent),transparent 70%);opacity:.55;pointer-events:none}
  .mode .ic{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:14px;font-size:23px;background:rgba(255,255,255,.06);background:color-mix(in srgb,var(--m,var(--accent)) 20%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--m,var(--accent)) 42%,transparent)}
  .mode b{position:relative;z-index:1;display:block;margin:12px 0 3px;font-size:15.5px}
  .mode span{position:relative;z-index:1;color:var(--muted);font-size:12.5px;line-height:1.4;display:block}
  @media(max-width:480px){.modes{grid-template-columns:1fr}}
  /* recent conversations */
  #recent .rhead{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;margin:20px 4px 10px}
  .conv{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
  .conv:hover{border-color:var(--accent2)}
  .conv .ci{font-size:20px;flex:none}
  .conv .cmain{flex:1;min-width:0}
  .conv .ct{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .cs{color:var(--muted);font-size:11.5px;margin-top:2px}
  .conv .cx{flex:none;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:6px;border-radius:8px}
  .conv .cx:hover{color:#f87171}
  /* ---- chat ---- */
  .chatwrap{display:none;flex:1;flex-direction:column;gap:10px;min-height:0}
  .subbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .subbar .back{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:13px}
  .subbar .tag{font-weight:800;font-size:14px}
  .subbar select{margin-left:auto;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px}
  .stream{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 2px}
  .b{max-width:88%;padding:10px 13px;border-radius:14px;font-size:14.5px;line-height:1.45;word-wrap:break-word}
  .b.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .b.ai{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
  .b .imgs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .b .imgs img{max-width:150px;max-height:150px;border-radius:8px;display:block}
  .b b{font-weight:800}
  .b.ai .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent2);background:rgba(77,232,255,.1);border:1px solid var(--border);border-radius:6px;padding:1px 6px;margin-bottom:6px}
  /* Quizlet-style flashcard deck */
  .dtip{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .deck{width:100%;max-width:360px}
  .card3d{height:184px;perspective:1100px;cursor:pointer;margin:0 auto}
  .card3d .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .card3d.flip .inner{transform:rotateY(180deg)}
  .card3d .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;border-radius:16px;font-size:16px;line-height:1.45;overflow:auto}
  .card3d .front{background:var(--card2);border:1px solid var(--border);font-weight:800}
  .card3d .back{background:linear-gradient(150deg,var(--accent),var(--accent2));color:#0d0d1a;font-weight:600;transform:rotateY(180deg)}
  .deckctl{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
  .deckctl .dbtn{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;min-width:40px;height:36px;font-size:16px;cursor:pointer}
  .deckctl .dbtn:hover{border-color:var(--accent2)}
  .deckctl .count{font-size:13px;color:var(--muted);min-width:54px;text-align:center;font-weight:700}
  .hint{color:var(--muted);font-size:12px;text-align:center}
  .composer{display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--border);padding-top:10px}
  .composer textarea{flex:1;resize:none;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:14.5px;font-family:inherit;max-height:120px}
  .composer button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 16px;height:42px;font-weight:800;cursor:pointer;font-size:14px}
  .composer button:disabled{opacity:.5;cursor:default}
  .iconbtn{background:var(--card2)!important;color:var(--text)!important;border:1px solid var(--border)!important;font-size:18px!important;padding:0 12px!important}
  .thumbs{display:none;flex-wrap:wrap;gap:8px}
  .thumbs .th{position:relative}
  .thumbs .th img{width:52px;height:52px;object-fit:cover;border-radius:8px;display:block}
  .thumbs .th .x{position:absolute;top:-6px;right:-6px;background:#f87171;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800}
  .left{color:var(--muted);font-size:11.5px;text-align:right}
</style>

<div class="wrap">

<script type="module">
import * as auth from "./auth.js?v=5";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt=(s)=>esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");

const MODES=[
  {id:"ask",       ic:"❓",c:"#6ea8fe",label:"Erklären & léisen",desc:"Schrëtt fir Schrëtt eng Aufgab verstoen",ph:"Schreif deng Fro…"},
  {id:"flashcards",ic:"🃏",c:"#f7b955",label:"Léierkaarten",     desc:"Notizen oder Thema → e Kaartespill",   ph:"Thema oder Notizen aginn…"},
  {id:"quiz",      ic:"🎯",c:"#4de8ff",label:"Quiz mech",         desc:"Loosst dech iwwert en Thema testen",  ph:"Iwwer wat soll ech dech testen?"},
  {id:"language",  ic:"🗣️",c:"#b17cff",label:"Sproochen",        desc:"Grammaire, Vocabulaire, Korrekturen",  ph:"Sprooch, Text oder Fro…"},
  {id:"scan",      ic:"📸",c:"#3fb950",label:"Säit scannen",      desc:"Foto(en) vun der Aufgab → ganz Léisung",ph:"(optional) Notiz fir d'Fotoen…"},
];
const SUBJECTS=["Allgemeng","Mathé","Däitsch","Franséisch","Englesch","Latäin","Physik","Chimie","Biologie","Geschicht","Geographie","Informatik","Konscht","Relioun/Moral"];

let sb=null, mode=null, history=[], pending=[], busy=false, remaining=null, convId=null, convos=[];

/* ---- mode picker ---- */
$("modes").innerHTML=MODES.map(m=>
  `<button class="mode" data-m="${m.id}" style="--m:${m.c}"><span class="ic">${m.ic}</span><b>${m.label}</b><span>${m.desc}</span></button>`).join("");
$("modes").querySelectorAll(".mode").forEach(b=>b.onclick=()=>openMode(b.dataset.m));
$("subject").innerHTML=SUBJECTS.map(s=>`<option>${s}</option>`).join("");

function enterChat(){
  $("picker").style.display="none"; $("chatwrap").style.display="flex";
  $("modeTag").textContent=mode.ic+" "+mode.label;
  $("input").placeholder=mode.ph; renderThumbs(); renderLeft();
}
function openMode(id){
  mode=MODES.find(m=>m.id===id); history=[]; pending=[]; convId=null;
  $("subject").value="Allgemeng";
  enterChat();
  $("stream").innerHTML=`<div class="hint">${mode.id==="scan"?"Maach eng Foto — oder lued e fäerdegt Foto/PDF vun der Aufgab erop (📷) — an dréck Schécken.":"Stell deng éischt Fro — du kanns och Fotoen oder e PDF matschécken."}</div>`;
}
$("back").onclick=()=>{ $("chatwrap").style.display="none"; $("picker").style.display=""; loadConvos(); };

/* ---- bubbles ---- */
function bubble(role,html){
  const d=document.createElement("div");
  d.className="b "+(role==="user"?"me":"ai");
  d.innerHTML=html;
  if($("stream").querySelector(".hint"))$("stream").innerHTML="";
  $("stream").appendChild(d);
  $("stream").scrollTop=$("stream").scrollHeight;
  return d;
}
function push(role,text,imgs){
  history.push({role,text});
  const ih=(imgs&&imgs.length)?`<div class="imgs">${imgs.map(u=>`<img src="${u}">`).join("")}</div>`:"";
  return bubble(role,ih+fmt(text));
}
function renderHistory(){
  $("stream").innerHTML="";
  for(const h of history){
    if(h.role==="assistant"){ renderReply(bubble("assistant",""), h.text, ""); }
    else bubble("user", fmt(h.text));
  }
}
function renderLeft(){ $("left").textContent=remaining==null?"":`${remaining} Noriichten haut iwwreg`; }

/* ---- Quizlet-style flashcard deck ---- */
function parseCards(text){
  const cards=[];
  for(let line of (text||"").split("\n")){
    line=line.trim().replace(/^\s*(\d+[.)]|[-*•])\s*/,"");
    let p=line.split(/\s*[—–]\s*/); if(p.length<2)p=line.split(/\s+-\s+/);
    if(p.length<2)continue;
    const t=p[0].trim(), d=p.slice(1).join(" — ").trim();
    if(t&&d)cards.push({t,d});
  }
  return cards;
}
function el2(cls,txt){const d=document.createElement("div");d.className=cls;if(txt!=null)d.textContent=txt;return d;}
function makeDeck(cards){
  let i=0;
  const wrap=el2("deck"), card=el2("card3d"), inner=el2("inner"),
        front=el2("face front"), back=el2("face back"), ctl=el2("deckctl");
  inner.append(front,back); card.append(inner);
  const mk=(t)=>{const b=document.createElement("button");b.className="dbtn";b.textContent=t;return b;};
  const prev=mk("‹"), count=el2("count"), next=mk("›"), sh=mk("🔀");
  ctl.append(prev,count,next,sh); wrap.append(card,ctl);
  function show(){const c=cards[i];front.innerHTML=fmt(c.t);back.innerHTML=fmt(c.d);card.classList.remove("flip");count.textContent=(i+1)+" / "+cards.length;}
  card.onclick=()=>card.classList.toggle("flip");
  prev.onclick=()=>{i=(i-1+cards.length)%cards.length;show();};
  next.onclick=()=>{i=(i+1)%cards.length;show();};
  sh.onclick=()=>{for(let k=cards.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[cards[k],cards[j]]=[cards[j],cards[k]];}i=0;show();};
  show(); return wrap;
}
function renderReply(elm,text,badgeStr){
  const badge=badgeStr?`<span class="badge">${esc(badgeStr)}</span>`:"";
  if(mode&&mode.id==="flashcards"){
    const cards=parseCards(text);
    if(cards.length>=2){
      elm.innerHTML=badge+`<div class="dtip">🃏 ${cards.length} Kaarten · tipp op d'Kaart fir se ëmzedréinen</div>`;
      elm.appendChild(makeDeck(cards));
      $("stream").scrollTop=$("stream").scrollHeight; return;
    }
  }
  elm.innerHTML=(badge?badge+"<br>":"")+fmt(text);
}

/* ---- image + PDF attach (all modes): existing photos, camera, or PDFs ----
   Files are downscaled to keep the request small, and multi-page PDFs are
   rendered to images client-side (pdf.js) so the vision backend is unchanged.
   The backend caps a message at 6 images, so we enforce the same cap here. */
const MAX_IMG=6, MAX_DIM=1600, JPEG_Q=0.82;
let _pdfjs=null;
async function ensurePdfjs(){
  if(_pdfjs)return _pdfjs;
  const m=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs");
  m.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";
  _pdfjs=m; return m;
}
function _scaled(w,h){ const mx=Math.max(w,h); if(mx>MAX_DIM){const k=MAX_DIM/mx; return [Math.round(w*k),Math.round(h*k)];} return [w,h]; }
function imgToDataUrl(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{ const [w,h]=_scaled(img.naturalWidth,img.naturalHeight);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src); res(c.toDataURL("image/jpeg",JPEG_Q)); };
    img.onerror=()=>{ URL.revokeObjectURL(img.src); rej(new Error("img")); };
    img.src=URL.createObjectURL(file);
  });
}
async function pdfToDataUrls(file,limit){
  const lib=await ensurePdfjs();
  const pdf=await lib.getDocument({data:await file.arrayBuffer()}).promise;
  const pages=Math.min(pdf.numPages,limit), urls=[];
  for(let p=1;p<=pages;p++){
    const page=await pdf.getPage(p), v1=page.getViewport({scale:1});
    const [w]=_scaled(v1.width,v1.height), vp=page.getViewport({scale:w/v1.width});
    const c=document.createElement("canvas"); c.width=Math.round(vp.width); c.height=Math.round(vp.height);
    await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;
    urls.push(c.toDataURL("image/jpeg",JPEG_Q));
  }
  return {urls,total:pdf.numPages};
}
function attachHint(msg){
  let t=$("atHint");
  if(!t){ t=document.createElement("div"); t.id="atHint"; t.className="hint";
    t.style.cssText="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;z-index:60;max-width:90%;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4)";
    document.body.appendChild(t); }
  t.textContent=msg; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(()=>{t.style.display="none";},2600);
}
$("picBtn").onclick=()=>$("file").click();
$("file").onchange=async()=>{
  const files=[...$("file").files]; $("file").value=""; if(!files.length)return;
  let full=false; $("picBtn").disabled=true;
  for(const f of files){
    if(pending.length>=MAX_IMG){full=true;break;}
    try{
      if(f.type==="application/pdf"||/\.pdf$/i.test(f.name||"")){
        const {urls,total}=await pdfToDataUrls(f,MAX_IMG-pending.length);
        for(const u of urls){ if(pending.length>=MAX_IMG){full=true;break;} pending.push({dataUrl:u}); }
        if(total>urls.length)full=true;
      }else if(f.type.startsWith("image/")){
        pending.push({dataUrl:await imgToDataUrl(f)});
      }
      renderThumbs();
    }catch(e){ console.warn("[buddy attach]",f.name,e); attachHint("Konnt d'Datei net liesen."); }
  }
  $("picBtn").disabled=false; renderThumbs();
  if(full)attachHint(`Maximal ${MAX_IMG} Säiten/Biller pro Message.`);
};
function renderThumbs(){
  const el=$("thumbs");
  if(!pending.length){el.style.display="none";el.innerHTML="";return;}
  el.style.display="flex";
  el.innerHTML=pending.map((p,i)=>`<span class="th"><img src="${p.dataUrl}"><span class="x" data-i="${i}">✕</span></span>`).join("");
  el.querySelectorAll(".x").forEach(x=>x.onclick=()=>{ pending.splice(+x.dataset.i,1); renderThumbs(); });
}

/* ---- send ---- */
async function send(){
  if(busy)return;
  const text=$("input").value.trim();
  if(!text && !pending.length)return;
  const images=[], dataUrls=pending.map(p=>p.dataUrl);
  for(const p of pending){
    const m=/^data:(image\/[a-z0-9.+-]+);base64,(.*)$/i.exec(p.dataUrl);
    if(m)images.push({media_type:m[1],data:m[2]});
  }
  busy=true; $("send").disabled=true;
  const n=dataUrls.length, utext=text||("📷 "+n+(n===1?" Bild":" Biller"));
  push("user", utext, dataUrls);
  $("input").value=""; $("input").style.height="auto";
  pending=[]; renderThumbs();
  const wait=push("assistant","…");
  try{
    const token=auth.session()?.access_token;
    const res=await fetch(`${PB_CONFIG.url}/functions/v1/study-buddy`,{
      method:"POST",
      headers:{"content-type":"application/json","apikey":PB_CONFIG.anonKey,"Authorization":`Bearer ${token}`},
      body:JSON.stringify({mode:mode.id,subject:$("subject").value,messages:history.slice(0,-1),images}),
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      wait.innerHTML=fmt(data.message||(res.status===429?"Daageslimit erreecht — muer erëm.":"Feeler — nach eng Kéier probéieren."));
      history.pop();
    }else{
      renderReply(wait, data.reply||"…", data.badge);
      history[history.length-1].text=data.reply||"";
      if(typeof data.remaining==="number"){remaining=data.remaining;renderLeft();}
      saveConv();
    }
  }catch(e){ wait.innerHTML=fmt("Netzwierk-Feeler."); history.pop(); }
  $("stream").scrollTop=$("stream").scrollHeight;
  busy=false; $("send").disabled=false; $("input").focus();
}
$("send").onclick=send;
$("input").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
$("input").addEventListener("input",()=>{ $("input").style.height="auto"; $("input").style.height=Math.min(120,$("input").scrollHeight)+"px"; });

/* ---- saved conversations (14-day retention, owner-only) ---- */
const SINCE=()=>new Date(Date.now()-14*864e5).toISOString();
const rel=(t)=>{const s=(Date.now()-new Date(t))/1000;if(s<3600)return Math.max(1,Math.round(s/60))+" Min";if(s<86400)return Math.round(s/3600)+" Std";return Math.round(s/86400)+" Deeg";};
async function loadConvos(){
  if(!auth.session()){convos=[];renderRecent();return;}
  try{
    const {data}=await sb.from("buddy_conversations").select("id,mode,subject,title,updated_at")
      .gte("updated_at",SINCE()).order("updated_at",{ascending:false}).limit(20);
    convos=data||[];
  }catch{convos=[];}
  renderRecent();
}
function renderRecent(){
  const el=$("recent");
  if(!convos.length){el.innerHTML="";return;}
  el.innerHTML=`<div class="rhead">Weiderfueren</div>`+convos.map(c=>{
    const m=MODES.find(x=>x.id===c.mode)||{ic:"💬"};
    return `<div class="conv" data-id="${c.id}"><span class="ci">${m.ic}</span>
      <div class="cmain"><div class="ct">${esc(c.title||"Chat")}</div>
      <div class="cs">${esc(c.subject||"")} · ${rel(c.updated_at)}</div></div>
      <button class="cx" data-del="${c.id}" title="Läschen">🗑</button></div>`;
  }).join("");
  el.querySelectorAll(".conv").forEach(d=>d.onclick=(e)=>{ if(e.target.dataset.del)return; resumeConv(d.dataset.id); });
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=async(e)=>{ e.stopPropagation(); await deleteConv(b.dataset.del); });
}
async function resumeConv(id){
  try{
    const {data}=await sb.from("buddy_conversations").select("*").eq("id",id).single();
    if(!data)return;
    mode=MODES.find(m=>m.id===data.mode)||MODES[0];
    convId=data.id; history=Array.isArray(data.messages)?data.messages:[]; pending=[];
    $("subject").value=data.subject||"Allgemeng";
    enterChat(); renderHistory();
  }catch(e){console.warn("[buddy] resume",e);}
}
async function deleteConv(id){
  try{ await sb.from("buddy_conversations").delete().eq("id",id); }catch{}
  if(convId===id)convId=null;
  loadConvos();
}
async function saveConv(){
  if(!auth.session()||!history.length)return;
  const title=(history.find(h=>h.role==="user")?.text||"Chat").slice(0,60);
  try{
    if(convId){
      await sb.from("buddy_conversations").update(
        {messages:history,subject:$("subject").value,title,updated_at:new Date().toISOString()}).eq("id",convId);
    }else{
      const {data}=await sb.from("buddy_conversations").insert(
        {mode:mode.id,subject:$("subject").value,title,messages:history}).select("id").single();
      if(data)convId=data.id;
    }
  }catch(e){console.warn("[buddy] save",e);}
}

/* ---- gate / boot ---- */
function applyAuth(){
  const signedIn=!!auth.session();
  $("gate").style.display=signedIn?"none":"";
  $("picker").style.display=signedIn?"":"none";
  if(!signedIn){ $("chatwrap").style.display="none"; convos=[]; renderRecent(); }
  else loadConvos();
}
(async()=>{
  auth.mountAccountButton($("acctHost"));
  $("gateBtn").onclick=(e)=>{e.preventDefault();auth.openAuthModal();};
  auth.onAuth(applyAuth);
  try{ sb=await auth.client(); }catch{}
  applyAuth();
})();
</script>
