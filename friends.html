<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Friends — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=6"></script>
<script src="i18n-dict.js?v=15"></script>
<script src="i18n.js?v=1"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:max(16px,env(safe-area-inset-top)) max(22px,env(safe-area-inset-right)) 16px max(22px,env(safe-area-inset-left));border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{max-width:680px;margin:0 auto;padding:22px 18px 80px}
  #gate{text-align:center;color:var(--muted);padding:50px 20px}
  .auth-go{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-weight:800;cursor:pointer;margin-top:12px}
  .add{display:flex;gap:10px;margin-bottom:8px}
  .add input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:14px}
  .add button{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 18px;font-weight:800;cursor:pointer}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:26px 0 10px}
  .tabs{display:flex;gap:4px;margin:16px 0 18px;border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{appearance:none;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:14px;font-weight:700;padding:9px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .tbadge{background:var(--accent);color:#fff;font-size:11px;font-weight:800;border-radius:999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
  .panel{display:none}
  .panel.active{display:block}
  .panel h2:first-child,.panel>div:first-child h2{margin-top:6px}
  .row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px}
  .row .name{font-weight:700;flex:1}
  .row .name .av{display:inline-flex;width:26px;height:26px;border-radius:50%;background:var(--card2);align-items:center;justify-content:center;margin-right:8px}
  .admin-tag{display:inline-block;font-size:10px;font-weight:800;color:#ffcf4d;background:rgba(255,207,77,.14);border:1px solid rgba(255,207,77,.45);border-radius:999px;padding:1px 7px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}
  .class-tag{display:inline-block;font-size:10px;font-weight:800;color:#5cc8ff;background:rgba(92,200,255,.14);border:1px solid rgba(92,200,255,.45);border-radius:999px;padding:1px 7px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}
  .mini{border:1px solid var(--border);background:var(--card2);color:var(--text);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer}
  .mini:hover{border-color:var(--accent2);color:var(--accent2)}
  .mini.go{background:var(--accent);color:#fff;border-color:var(--accent)}
  .mini.x{color:var(--muted)} .mini.x:hover{color:#ff6b6b;border-color:#ff6b6b}
  .empty{color:var(--muted);font-size:13.5px;padding:6px 2px}
  .msgline{font-size:12.5px;margin:4px 0 0;min-height:16px}
  .msgline.err{color:#ff6b6b}.msgline.ok{color:#3fb950}
  .act-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);font-size:13.5px}
  .act-row:last-child{border-bottom:none}
  .act-emoji{flex:none;font-size:16px}
  .act-text{flex:1;color:var(--muted)}
  .act-text b{color:var(--text);font-weight:700}
  .act-time{flex:none;color:var(--muted);font-size:12px}
  /* mobile: stop iOS focus-zoom + roomier touch targets */
  @media(max-width:640px){
    .add input{font-size:16px}
    .tab{padding:11px 12px;font-size:14.5px}
    .mini{padding:9px 13px;font-size:14px}
    body{padding-bottom:env(safe-area-inset-bottom)}
  }
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html" data-i18n="nav.home">‹ Home</a>
  <h1 data-i18n="friends.h1">👥 Friends</h1>
  <div class="spacer"></div>
  <span id="langSw"></span>
  <span id="acctHost"></span>
</header>

<div class="wrap">
  <div id="gate" style="display:none">
    <h3 data-i18n="friends.gateTitle">Sign in to manage friends</h3>
    <button class="auth-go" id="gateBtn" data-i18n="auth.signin">Sign in / Create account</button>
  </div>

  <div id="app" style="display:none">
    <div class="add">
      <input id="addInput" data-i18n-attr="placeholder:friends.addPlaceholder" placeholder="Add a friend by username" autocomplete="off">
      <button id="addBtn" data-i18n="friends.add">Add</button>
    </div>
    <div class="msgline" id="addMsg"></div>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="friends" data-i18n="friends.tab.friends">Friends</button>
      <button class="tab" data-tab="people" data-i18n="friends.people">People</button>
      <button class="tab" data-tab="requests"><span data-i18n="friends.tab.requests">Requests</span><span class="tbadge" id="badge-requests" style="display:none">0</span></button>
      <button class="tab" data-tab="activity" data-i18n="friends.tab.activity">Activity</button>
    </nav>

    <section class="panel active" data-panel="friends">
      <div id="friends"></div>
    </section>

    <section class="panel" data-panel="people">
      <div id="directory"></div>
    </section>

    <section class="panel" data-panel="requests">
      <div id="invitesWrap" style="display:none"><h2 data-i18n="friends.invites">🎮 Game invites</h2><div id="invites"></div></div>
      <div id="reqWrap" style="display:none"><h2 data-i18n="friends.requests">Friend requests</h2><div id="requests"></div></div>
      <div id="sentWrap" style="display:none"><h2 data-i18n="friends.sent">Requests you sent</h2><div id="sent"></div></div>
      <div class="empty" id="reqEmpty" style="display:none" data-i18n="friends.noReq">Nothing new right now.</div>
    </section>

    <section class="panel" data-panel="activity">
      <div id="activityWrap"><h2 data-i18n="friends.activity">📊 Recent activity</h2><div id="activity"></div></div>
    </section>
  </div>
</div>

<script>
// Segmented-tab controller (pure UI; friends.js still renders into the same IDs).
(function () {
  const tabs = document.getElementById("tabs");
  if (!tabs) return;
  tabs.addEventListener("click", (e) => {
    const b = e.target.closest(".tab"); if (!b) return;
    const name = b.dataset.tab;
    tabs.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === b));
    document.querySelectorAll(".panel").forEach((p) => p.classList.toggle("active", p.dataset.panel === name));
  });
})();
</script>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="friends.js?v=12"></script>
<script type="module" src="notify-ambient.js?v=2"></script>
<script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=1"></script>
</body>
</html>
