<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Messenger — ian.lu</title>
<meta name="description" content="Real-time group messenger.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Messenger">
<meta name="theme-color" content="#0d0d1a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="theme.js?v=7"></script>
<script src="i18n-dict.js?v=18"></script>
<script src="i18n.js?v=1"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#ff6b9d;--accent2:#4de8ff}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;height:100vh;height:100dvh;height:var(--vvh,100dvh);display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  header{display:flex;align-items:center;gap:14px;padding:max(14px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) 14px max(20px,env(safe-area-inset-left));border-bottom:1px solid var(--border);flex:none}
  header .home{color:var(--muted);font-weight:700}
  header h1{font-size:18px;margin:0}
  header .spacer{flex:1}
  #gate{flex:1;display:none;align-items:center;justify-content:center;padding:20px;text-align:center}
  .gate-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 28px;max-width:340px}
  .gate-box h3{margin:0 0 8px;font-size:22px}
  .gate-box p{color:var(--muted);font-size:14px;margin:0 0 18px}
  .auth-go{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:800;cursor:pointer}
  #app{flex:1;display:none;min-height:0}
  .sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex:none}
  .side-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .side-head .t{font-weight:800;font-size:15px;flex:1}
  .side-head button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer}
  .side-head button:hover{border-color:var(--accent2);color:var(--accent2)}
  #groupList{list-style:none;margin:0;padding:8px;overflow-y:auto;flex:1}
  .grp{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:2px}
  .grp:hover{background:var(--card)}
  .grp.active{background:var(--card2)}
  .grp .gname{font-weight:700;font-size:14px}
  .grp .gcode{font-size:11px;color:var(--muted)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px 12px;line-height:1.5}
  .chat{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .chat-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex:none}
  .back-btn{display:none;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;width:34px;height:32px;font-size:20px;line-height:1;cursor:pointer;flex:none}
  .back-btn:hover{border-color:var(--accent2)}
  .chat-head .invite{color:var(--muted);font-size:12px}
  .chat-head code{background:var(--card2);padding:2px 7px;border-radius:6px;color:var(--accent2)}
  .head-actions{margin-left:auto;display:flex;gap:6px}
  .head-actions button{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;width:34px;height:32px;cursor:pointer;font-size:15px}
  .head-actions button:hover{border-color:var(--accent2)}
  .member-panel{position:absolute;top:60px;right:0;width:230px;max-height:70%;overflow-y:auto;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin:8px;display:none;z-index:10}
  .member-panel.open{display:block}
  .mp-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px}
  .mp-head button{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
  .mp-list{padding:8px 14px}
  .mp-row{padding:6px 0;font-size:14px}
  .mp-row .you{color:var(--muted);font-size:12px}
  .media{max-width:240px;max-height:240px;border-radius:10px;display:block;margin-top:6px;cursor:pointer}
  .filechip{display:flex;align-items:center;gap:9px;margin-top:6px;max-width:240px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;text-decoration:none;color:var(--text)}
  .filechip:hover{border-color:var(--accent2)}
  .filechip .fc-ico{font-size:20px;flex:none}
  .filechip .fc-name{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filechip .fc-dl{font-size:15px;color:var(--muted);flex:none}
  .admin-link{color:#ffcc00;font-weight:700;margin-right:14px;white-space:nowrap}
  .messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:18px;display:flex;flex-direction:column;gap:8px}
  .msg{display:flex;align-items:flex-end;gap:6px}
  .av-chip{flex:none;width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}
  .mp-av{display:inline-flex;width:22px;height:22px;border-radius:50%;overflow:hidden;vertical-align:middle;align-items:center;justify-content:center}
  .av-img{width:100%;height:100%;object-fit:cover;display:block}
  .msg.mine{justify-content:flex-end}
  .bubble{max-width:72%;background:var(--card);border:1px solid var(--border);padding:8px 12px;border-radius:14px;font-size:14px;line-height:1.4;position:relative}
  .msg.mine .bubble{background:var(--accent);border-color:var(--accent);color:#fff}
  .bubble .who{display:block;font-size:11px;font-weight:800;color:var(--accent2);margin-bottom:2px}
  .msg.mine .bubble .who{color:rgba(255,255,255,.85)}
  .admin-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#ffcf4d;background:rgba(255,207,77,.14);border:1px solid rgba(255,207,77,.45);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle;letter-spacing:.3px}
  .class-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#5cc8ff;background:rgba(92,200,255,.14);border:1px solid rgba(92,200,255,.45);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle;letter-spacing:.3px}
  .vip-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#d7b3ff;background:rgba(170,110,255,.16);border:1px solid rgba(170,110,255,.5);border-radius:999px;padding:0 6px;margin-left:4px;vertical-align:middle;letter-spacing:.3px}
  .bubble{position:relative}
  .bubble .time{font-size:10px;color:var(--muted);margin-left:8px;float:right;margin-top:3px}
  .ticks{font-size:11px;margin-left:5px;color:rgba(255,255,255,.6);letter-spacing:-1px}
  .ticks.read{color:var(--accent2)}
  .del-btn{position:absolute;top:-10px;right:-8px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;line-height:1;opacity:.55}
  .del-btn:hover{opacity:1;border-color:#ff6b6b}
  .msg.mine .bubble .time{color:rgba(255,255,255,.7)}
  .composer{display:none;gap:10px;padding:14px max(18px,env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left));border-top:1px solid var(--border);flex:none}
  .composer input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:24px;padding:11px 16px;font-size:14px;outline:none}
  .composer input:focus{border-color:var(--accent2)}
  .composer button[type=submit]{background:var(--accent);color:#fff;border:none;border-radius:24px;padding:0 20px;font-weight:800;cursor:pointer}
  #attachBtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;flex:none}
  #attachBtn:hover{border-color:var(--accent2)}
  #attachBtn:disabled{opacity:.6;cursor:default}
  /* unread chat in the list */
  .grp .gtop{display:flex;align-items:center;gap:6px}
  .grp .gprev{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .grp.unread .gname{font-weight:900}
  .grp.unread .gprev{color:var(--text)}
  .grp .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;margin-left:auto}
  /* notification button in header */
  .ntf-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:30px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
  .ntf-btn:hover{border-color:var(--accent2);color:var(--accent2)}
  .ntf-btn.on{border-color:var(--accent);color:var(--accent)}
  /* swipe-to-reply / message gestures */
  .msg{touch-action:pan-y}
  .bubble{transition:transform .12s ease-out}
  .bubble.swiping{transition:none}
  .reply-cue{position:absolute;top:50%;transform:translateY(-50%);left:-30px;font-size:16px;opacity:0;transition:opacity .1s}
  .msg.mine .reply-cue{left:auto;right:-30px}
  /* quoted reply inside a bubble */
  .reply-quote{display:block;border-left:3px solid var(--accent2);background:rgba(255,255,255,.06);border-radius:6px;padding:3px 8px;margin-bottom:5px;font-size:12px;cursor:pointer;max-width:100%;overflow:hidden}
  .reply-quote .rq-user{display:block;font-weight:800;color:var(--accent2);font-size:11px}
  .reply-quote .rq-text{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  .msg.mine .reply-quote{border-left-color:rgba(255,255,255,.7);background:rgba(0,0,0,.15)}
  .msg.mine .reply-quote .rq-user{color:#fff}
  .msg.mine .reply-quote .rq-text{color:rgba(255,255,255,.8)}
  /* desktop hover reply button */
  .reply-btn{position:absolute;top:-10px;right:-8px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:24px;height:24px;font-size:11px;cursor:pointer;line-height:1;opacity:0;transition:opacity .1s}
  .msg.mine .reply-btn{right:auto;left:-8px}
  .msg:hover .reply-btn{opacity:.65}
  .reply-btn:hover{opacity:1!important;border-color:var(--accent2)}
  /* reply banner above composer */
  .reply-bar{display:none;align-items:center;gap:10px;padding:8px 18px;border-top:1px solid var(--border);background:var(--card2);font-size:13px}
  .reply-bar.open{display:flex}
  .reply-bar .rb-body{flex:1;min-width:0}
  .reply-bar .rb-user{font-weight:800;color:var(--accent2);font-size:11px;display:block}
  .reply-bar .rb-text{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  .reply-bar .rb-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  /* image lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:8000;padding:20px;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  .lightbox .lb-x{position:absolute;top:14px;right:18px;background:none;border:none;color:#fff;font-size:34px;cursor:pointer;line-height:1}
  /* search box in sidebar */
  .search-box{padding:8px 10px;border-bottom:1px solid var(--border)}
  .search-box input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:18px;padding:8px 13px;font-size:13px;outline:none}
  .search-box input:focus{border-color:var(--accent2)}
  /* online dot */
  .on-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3fb950;margin-left:6px;vertical-align:middle}
  .chat-head .on-dot{margin-left:2px}
  .chat-head .presence{color:#3fb950;font-size:12px;font-weight:700}
  /* edited tag */
  .edited{font-size:10px;color:var(--muted);margin-left:6px}
  .msg.mine .edited{color:rgba(255,255,255,.65)}
  /* reactions */
  .react-btn{position:absolute;bottom:-10px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;line-height:1;opacity:0;transition:opacity .1s}
  .msg:not(.mine) .react-btn{right:-8px}.msg.mine .react-btn{left:-8px}
  .msg:hover .react-btn{opacity:.7}.react-btn:hover{opacity:1!important;border-color:var(--accent)}
  .reacts{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
  .reacts:empty{display:none}
  .react-chip{display:inline-flex;align-items:center;gap:3px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:1px 7px;font-size:12px;cursor:pointer;line-height:1.5}
  .react-chip.mine-r{border-color:var(--accent);background:rgba(255,107,157,.18)}
  .msg.mine .react-chip{background:rgba(0,0,0,.18)}
  .react-pop{position:absolute;bottom:18px;display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 8px;z-index:20;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .msg.mine .react-pop{left:-8px}.msg:not(.mine) .react-pop{right:-8px}
  .react-pop button{background:none;border:none;font-size:19px;cursor:pointer;line-height:1;padding:1px;border-radius:6px}
  .react-pop button:hover{transform:scale(1.25)}
  /* audio / voice messages */
  .voice{margin-top:6px;max-width:230px}
  audio.voice{height:38px;width:230px}
  #micBtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;flex:none}
  #micBtn:hover{border-color:var(--accent2)}
  #micBtn.rec{background:#ff5d6c;border-color:#ff5d6c;color:#fff;animation:recpulse 1s infinite}
  @keyframes recpulse{0%,100%{opacity:1}50%{opacity:.6}}
  /* typing indicator */
  .typing{display:none;padding:2px 18px 6px;color:var(--muted);font-size:12px;font-style:italic}
  .typing.show{display:block}
  @media(max-width:640px){
    .bubble{max-width:85%}
    /* one pane at a time: chat list, OR the open conversation full-screen */
    .sidebar{width:100%;border-right:none}
    .chat{display:none}
    #app.chat-open .sidebar{display:none}
    #app.chat-open .chat{display:flex}
    .back-btn{display:inline-flex}
    .member-panel{width:auto;left:0;right:0;max-height:60%}
    /* 16px inputs stop iOS from zooming on focus */
    .composer input, .search-box input{font-size:16px}
    /* roomier touch targets */
    .side-head button{width:38px;height:38px;font-size:18px}
    .head-actions button{width:40px;height:36px;font-size:17px}
    .back-btn{width:40px;height:36px}
    .composer button[type=submit]{padding:0 18px;font-size:15px}
    .messages{padding:14px 12px}
    /* full-screen conversation: hide the global top bar, back-btn navigates */
    body:has(#app.chat-open) header{display:none}
    #app.chat-open .chat-head{padding-top:max(14px,env(safe-area-inset-top))}
  }
</style>

<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<body>
<header>
  <a class="home" href="index.html" data-i18n="nav.home">‹ Home</a>
  <h1 data-i18n="msg.h1">💬 Messenger</h1>
  <div class="spacer"></div>
  <a href="notify-help.html" class="ntf-btn" data-i18n-attr="title:msg.notifyHelp" title="How to turn on notifications" style="text-decoration:none">❓</a>
  <button id="notifyBtn" class="ntf-btn" style="display:none" title="Get notified of new messages">🔔 Notify</button>
  <span id="langSw"></span>
  <span id="acctHost"></span>
</header>

<div id="gate"></div>

<div id="app">
  <aside class="sidebar">
    <div class="side-head">
      <span class="t" data-i18n="msg.chats">Chats</span>
      <button id="newDM" data-i18n-attr="title:msg.tip.dm" title="Message someone by username">@</button>
      <button id="newG" data-i18n-attr="title:msg.tip.newGroup" title="New group">+</button>
      <button id="joinG" data-i18n-attr="title:msg.tip.join" title="Join by code">⇲</button>
    </div>
    <div class="search-box"><input id="searchInput" data-i18n-attr="placeholder:msg.searchPlaceholder" placeholder="🔍 Search chats…" autocomplete="off"></div>
    <ul id="groupList"></ul>
  </aside>
  <section class="chat">
    <div class="chat-head" id="chatHead" data-i18n="msg.selectChat">Select a chat ←</div>
    <div class="messages" id="messages"></div>
    <div class="member-panel" id="memberPanel"></div>
    <div class="typing" id="typing"></div>
    <div class="reply-bar" id="replyBar">
      <div class="rb-body"><span class="rb-user" id="rbUser"></span><span class="rb-text" id="rbText"></span></div>
      <button class="rb-x" id="rbX" type="button" title="Cancel reply">&times;</button>
    </div>
    <form class="composer" id="composer">
      <button type="button" id="attachBtn" data-i18n-attr="title:msg.tip.attach" title="Send a photo, video or file">📎</button>
      <button type="button" id="micBtn" data-i18n-attr="title:msg.tip.voice" title="Record a voice message">🎤</button>
      <input type="file" id="fileInput" hidden>
      <input id="msgInput" data-i18n-attr="placeholder:msg.composerPlaceholder" placeholder="Message…" autocomplete="off" maxlength="2000">
      <button type="submit" data-i18n="msg.send">Send</button>
    </form>
  </section>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-x" id="lbX" title="Close">&times;</button>
  <img id="lbImg" alt="">
</div>

<script>
/* Mobile keyboard fit: track the visual viewport so the composer stays above
   the on-screen keyboard instead of being covered by it (iOS/Android). */
(function(){
  var vv=window.visualViewport; if(!vv)return;
  var root=document.documentElement;
  function fit(){ root.style.setProperty("--vvh", vv.height+"px"); }
  vv.addEventListener("resize",fit); vv.addEventListener("scroll",fit); fit();
  // when the keyboard opens on focus, keep the latest messages in view
  document.addEventListener("focusin",function(e){
    if(!e.target.closest||!e.target.closest(".composer"))return;
    setTimeout(function(){ var m=document.getElementById("messages"); if(m)m.scrollTop=m.scrollHeight; },250);
  });
})();
</script>
<script src="pixelbreak-config.js"></script>

</body>
