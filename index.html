<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ian.lu — apps and tools by Ian Mulheims." />
  <title>ian.lu</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="bar">
    <a class="brand" href="/">ian.lu</a>
    <span id="acctHost"></span>
  </header>

  <main class="hub">
    <div class="tiles">
      <a class="tile pixel" href="pixelbreak.html">
        <span class="ico">🎮</span><span class="tname">PixelBreak</span><span class="tsub">Arcade games</span>
      </a>
      <a class="tile shorts" href="stats.html">
        <span class="ico">📊</span><span class="tname">ShortsFactory</span><span class="tsub">Channel stats</span>
      </a>
      <a class="tile msg" href="messenger.html">
        <span class="ico">💬</span><span class="tname">Messenger</span><span class="tsub">Chat &amp; groups</span>
      </a>
      <a class="tile grades" href="grades.html">
        <span class="ico">🎓</span><span class="tname">Grades</span><span class="tsub">Average calculator</span>
      </a>
      <a class="tile dash admin-only" href="factory.html" style="display:none">
        <span class="ico">📈</span><span class="tname">Dashboard</span><span class="tsub">Full ShortsFactory</span>
      </a>
      <a class="tile admin admin-only" href="admin.html" style="display:none">
        <span class="ico">🛡</span><span class="tname">Admin</span><span class="tsub">Moderation</span>
      </a>
    </div>
  </main>

  <footer><span id="year"></span> · Ian Mulheims</footer>

  <script src="main.js"></script>
  <script src="pixelbreak-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { mountAccountButton, client, onAuth } from "./auth.js?v=3";
    mountAccountButton(document.getElementById("acctHost"));
    async function refreshAdminTiles() {
      let admin = false;
      try { const sb = await client(); const { data } = await sb.rpc("is_admin"); admin = !!data; } catch {}
      document.querySelectorAll(".admin-only").forEach((e) => (e.style.display = admin ? "" : "none"));
    }
    onAuth(() => refreshAdminTiles());
    refreshAdminTiles();
  </script>
</body>
</html>
