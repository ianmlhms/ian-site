<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profile — ian.lu</title>
<meta name="description" content="Your ian.lu player profile — avatar and game stats.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=9"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:560px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:14px}
  .gate{text-align:center;color:var(--muted);padding:50px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .me{display:flex;align-items:center;gap:14px}
  .me .big{width:64px;height:64px;border-radius:50%;background:var(--card2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden}
  .me .big img{width:100%;height:100%;object-fit:cover;display:block}
  .upl{display:flex;gap:10px;flex-wrap:wrap}
  .uplbtn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer;font-size:14px}
  .uplbtn.ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
  .uplbtn:hover{filter:brightness(1.06)}
  .upl-hint{color:var(--muted);font-size:12px;margin-top:8px}
  .me .name{font-weight:800;font-size:20px}
  .me .sub{color:var(--muted);font-size:13px}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:6px 0 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px}
  .avb{aspect-ratio:1;font-size:24px;background:var(--card2);border:1px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .avb:hover{border-color:var(--accent2)}
  .avb.on{border:2px solid var(--accent);background:rgba(110,168,254,.12)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
  .stat{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
  .stat b{display:block;font-size:22px}
  .stat span{font-size:12px;color:var(--muted)}
  .msg{min-height:18px;color:var(--accent2);font-weight:700;font-size:13px}
  .field{display:flex;gap:8px;flex-wrap:wrap}
  .field input{flex:1;min-width:150px;padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px}
  .field .btn{white-space:nowrap}
  .hint{color:var(--muted);font-size:12px;margin-top:8px}
  .tags{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
  .tags span{border-radius:8px;padding:2px 8px;font-size:12px;font-weight:700}
  .class-tag{background:rgba(92,200,255,.15);color:#5cc8ff;border:1px solid rgba(92,200,255,.35)}
  .admin-tag{background:rgba(255,207,77,.15);color:#ffcf4d;border:1px solid rgba(255,207,77,.35)}
  .vip-tag{background:rgba(215,179,255,.15);color:#d7b3ff;border:1px solid rgba(215,179,255,.35)}
  .ach{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;margin:0 6px 6px 0}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Home</a>
  <h1>👤 Profile</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Loading…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const AVATARS=["😀","😎","🤖","👾","🐱","🐶","🦊","🐸","🐼","🦁","🐯","🐵",
               "🦄","🐙","🐢","🦖","🐬","🦅","⚡","🔥","🌟","🍕","🎮","🏎️"];
const BUCKET="avatars", AV_PX=256;
const isUrl=(v)=>/^https?:\/\//.test(v||"");
const avInner=(v)=>v?(isUrl(v)?`<img src="${esc(v)}" alt="avatar">`:esc(v)):"👤";
let sb=null,myAvatar=null,myClass=null;
// same specific-class rule as class-gate.js
const normClass=(r)=>(""+(r??"")).trim().toUpperCase().replace(/[^A-Z0-9]/g,"");
const YEAR_ONLY=/^\d{1,2}(E|È|EME|ÈME|IEME|IÈME)?$/;
const CLASS_SHAPE=/^\d{1,2}[A-Z]{1,4}\d{0,2}$/;
const validClass=(r)=>{const v=normClass(r);return CLASS_SHAPE.test(v)&&!YEAR_ONLY.test(v);};
const validName=(n)=>/^[A-Za-z0-9_]{3,20}$/.test((n||"").trim());
const qs=new URLSearchParams(location.search);

// Cosmetic badges derived from stats (server wins/losses + local wordle best).
function achievements(s){
  const A=[];
  const add=(cond,html)=>{if(cond)A.push(`<span class="ach">${html}</span>`);};
  add(s.wins>=1,"🏆 First win");
  add(s.wins>=10,"🔥 10 wins");
  add(s.wins>=50,"🌟 50 wins");
  add((s.total||0)>=100,"💯 100 games");
  add(s.pct!=null&&s.pct>=60&&(s.total||0)>=10,"🎯 60%+ win rate");
  add((s.wordleMax||0)>=5,`📚 Wordle streak ${s.wordleMax}`);
  return A.length?A.join(""):'<span style="color:var(--muted)">No badges yet — play some games!</span>';
}

// Read-only view of another player: profile.html?u=<username>.
async function renderPublic(username){
  const {data:p}=await sb.from("profiles").select("id,avatar,class,username").ilike("username",username).maybeSingle();
  if(!p){$("wrap").innerHTML=`<div class="gate">No player called “${esc(username)}”.<br><br><a href="profile.html">‹ Your profile</a></div>`;return;}
  let isAdmin=false,isVip=false;
  try{const {data}=await sb.rpc("admin_user_ids");isAdmin=(data||[]).some(r=>r.user_id===p.id);}catch{}
  try{const {data}=await sb.rpc("vip_user_ids");isVip=(data||[]).some(r=>r.user_id===p.id);}catch{}
  const tags=(p.class?`<span class="class-tag">${esc(p.class)}</span>`:"")+(isAdmin?`<span class="admin-tag">👑 Admin</span>`:"")+(isVip?`<span class="vip-tag">⭐ VIP</span>`:"");
  let stats={wins:0,losses:0,total:0,pct:null};
  try{const {data}=await sb.rpc("game_leaderboard",{p_game:null});const m=(data||[]).find(r=>r.username===p.username);if(m)stats={wins:m.wins,losses:m.losses,total:m.total,pct:m.winpct};}catch{}
  $("wrap").innerHTML=`
    <div class="card me">
      <div class="big">${avInner(p.avatar)}</div>
      <div><div class="name">${esc(p.username)}</div><div class="sub">ian.lu player</div><div class="tags">${tags}</div></div>
    </div>
    <h2>Stats</h2>
    <div class="card stats">
      <div class="stat"><b>${stats.wins}</b><span>Match wins</span></div>
      <div class="stat"><b>${stats.losses}</b><span>Losses</span></div>
      <div class="stat"><b>${stats.pct==null?"—":stats.pct+"%"}</b><span>Win rate</span></div>
    </div>
    <h2>Achievements</h2>
    <div class="card">${achievements(stats)}</div>
    <div class="hint" style="margin-top:14px"><a href="profile.html">‹ Your profile</a></div>`;
}

// Fit the WHOLE image into a small square JPEG (any aspect ratio, nothing cropped).
// The square is filled with a soft blurred copy of the photo so there are no
// solid letterbox bars, then the full image is drawn on top, centred.
function squareResize(file,size){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");c.width=size;c.height=size;
      const ctx=c.getContext("2d");
      // blurred cover background (fills the whole square, may crop — that's fine)
      const cov=Math.max(size/img.width,size/img.height);
      const cw=img.width*cov,ch=img.height*cov;
      ctx.filter="blur(14px)";
      ctx.drawImage(img,(size-cw)/2,(size-ch)/2,cw,ch);
      ctx.filter="none";
      // full image, contained (whole photo visible, nothing cut off)
      const con=Math.min(size/img.width,size/img.height);
      const iw=img.width*con,ih=img.height*con;
      ctx.drawImage(img,(size-iw)/2,(size-ih)/2,iw,ih);
      c.toBlob(b=>b?res(b):rej(new Error("Could not process image")),"image/jpeg",0.85);
    };
    img.onerror=()=>rej(new Error("That file isn't a readable image"));
    img.src=URL.createObjectURL(file);
  });
}

async function boot(){
  sb=await auth.client();
  auth.mountAccountButton($("acctHost"));
  const viewU=qs.get("u");
  if(viewU && viewU.toLowerCase()!==(auth.username()||"").toLowerCase()){ return renderPublic(viewU); }
  if(!auth.session()){
    $("wrap").innerHTML=`<div class="gate">Sign in to see your profile.<br><br><button class="btn" id="signin">Sign in</button></div>`;
    $("signin").onclick=auth.openAuthModal;
    return;
  }
  const uname=auth.username();
  const uid=auth.session().user.id;
  try{const {data}=await sb.from("profiles").select("avatar, class").eq("id",uid).single();myAvatar=data?.avatar||null;myClass=data?.class||null;}catch{}
  let isAdmin=false,isVip=false;
  try{const {data}=await sb.rpc("admin_user_ids");isAdmin=(data||[]).some(r=>r.user_id===uid);}catch{}
  try{const {data}=await sb.rpc("vip_user_ids");isVip=(data||[]).some(r=>r.user_id===uid);}catch{}
  const tagsHtml=
    (myClass?`<span class="class-tag">${esc(myClass)}</span>`:"")+
    (isAdmin?`<span class="admin-tag">👑 Admin</span>`:"")+
    (isVip?`<span class="vip-tag">⭐ VIP</span>`:"");
  $("wrap").innerHTML=`
    <div class="card me">
      <div class="big" id="bigAv">${avInner(myAvatar)}</div>
      <div><div class="name" id="dispName">${esc(uname)}</div><div class="sub">ian.lu player</div>
        <div class="tags" id="tags">${tagsHtml}</div></div>
    </div>
    <h2>Username</h2>
    <div class="card">
      <div class="field">
        <input id="nameInp" maxlength="20" value="${esc(uname)}" placeholder="your name">
        <button class="btn" id="nameSave">Save</button>
      </div>
      <div class="hint">3–20 characters — letters, numbers and underscore. Must be unique.</div>
      <div class="msg" id="nameMsg"></div>
    </div>
    <h2>Class</h2>
    <div class="card">
      <div class="field">
        <input id="classInp" maxlength="12" value="${esc(myClass||"")}" placeholder="e.g. 5C6">
        <button class="btn" id="classSave">Save</button>
      </div>
      <div class="hint">A specific class in a year (5C6, 7C1, 2CG) — not just the year. Helps friends find you.</div>
      <div class="msg" id="classMsg"></div>
    </div>
    <h2>Profile picture</h2>
    <div class="card">
      <div class="upl">
        <button class="uplbtn" id="uplBtn">📷 Upload a photo</button>
        <button class="uplbtn ghost" id="rmBtn"${isUrl(myAvatar)?"":" hidden"}>Remove photo</button>
        <input type="file" id="uplFile" accept="image/*" hidden>
      </div>
      <div class="upl-hint">Any image works — the whole photo is kept and stored small (256px). Or pick an emoji below.</div>
      <div class="msg" id="uplMsg"></div>
    </div>
    <h2>Or pick an emoji</h2>
    <div class="card"><div class="grid" id="avGrid"></div><div class="msg" id="avMsg"></div></div>
    <h2>Your stats</h2>
    <div class="card stats" id="stats"><div class="gate">Loading…</div></div>
    <h2>Achievements</h2>
    <div class="card" id="ach"><div class="gate">Loading…</div></div>
    <div class="hint" style="margin-top:8px">Your public profile: <a id="shareLink" href="profile.html?u=${encodeURIComponent(uname)}">ian.lu/profile.html?u=${esc(uname)}</a></div>`;
  wireUpload();
  wireName();
  wireClass();
  const grid=$("avGrid");
  for(const a of AVATARS){
    const b=document.createElement("button");
    b.className="avb"+(a===myAvatar?" on":"");b.textContent=a;
    b.onclick=async()=>{
      try{
        const {error}=await sb.rpc("set_avatar",{p_avatar:a});
        if(error)throw error;
        myAvatar=a;$("bigAv").innerHTML=avInner(a);$("rmBtn").hidden=true;
        grid.querySelectorAll(".avb").forEach(x=>x.classList.toggle("on",x.textContent===a));
        $("avMsg").textContent="Saved ✓";setTimeout(()=>$("avMsg").textContent="",1200);
      }catch(e){console.warn(e);$("avMsg").textContent="Couldn't save (run the migration?)";}
    };
    grid.appendChild(b);
  }
  loadStats(uname);
}

function setMsg(id,t,err){
  const m=$(id);if(!m)return;
  m.textContent=t;m.style.color=err?"#ff6b6b":"var(--accent2)";
  if(t&&!err&&/✓/.test(t))setTimeout(()=>{if($(id))$(id).textContent="";},1600);
}

function wireName(){
  const inp=$("nameInp"),btn=$("nameSave");
  const run=async()=>{
    const v=inp.value.trim();
    if(!validName(v)){setMsg("nameMsg","3–20 letters, numbers or underscore.",true);return;}
    if(v===auth.username()){setMsg("nameMsg","That's already your name.");return;}
    btn.disabled=true;setMsg("nameMsg","Saving…");
    try{
      const {data,error}=await sb.rpc("set_username",{p_name:v});
      if(error)throw error;
      if(!data){setMsg("nameMsg","That name is taken — try another.",true);btn.disabled=false;return;}
      // keep the JWT metadata in sync so auth.username() (account button, etc.) matches
      try{await sb.auth.updateUser({data:{username:data}});}catch(e){console.warn("meta sync",e);}
      $("dispName").textContent=data;inp.value=data;
      auth.mountAccountButton($("acctHost"));
      setMsg("nameMsg","Saved ✓");
    }catch(e){console.warn(e);setMsg("nameMsg","Couldn't save (run the migration?).",true);}
    btn.disabled=false;
  };
  btn.onclick=run;
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();run();}});
}

function wireClass(){
  const inp=$("classInp"),btn=$("classSave");
  const run=async()=>{
    const raw=inp.value.trim();
    if(!raw){setMsg("classMsg","Enter a class, e.g. 5C6.",true);return;}
    if(!validClass(raw)){setMsg("classMsg","A specific class, e.g. 5C6 — not just the year.",true);return;}
    const v=normClass(raw);
    btn.disabled=true;setMsg("classMsg","Saving…");
    try{
      const {error}=await sb.rpc("set_class",{p_class:v});
      if(error)throw error;
      myClass=v;inp.value=v;
      // reflect the class tag next to the name without a reload
      const tags=$("tags"),ex=tags.querySelector(".class-tag");
      if(ex)ex.textContent=v;
      else tags.insertAdjacentHTML("afterbegin",`<span class="class-tag">${esc(v)}</span>`);
      setMsg("classMsg","Saved ✓");
    }catch(e){console.warn(e);setMsg("classMsg","Couldn't save your class.",true);}
    btn.disabled=false;
  };
  btn.onclick=run;
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();run();}});
}

function setUpl(t,err){
  const m=$("uplMsg");if(!m)return;
  m.textContent=t;m.style.color=err?"#ff6b6b":"var(--accent2)";
  if(t&&!err&&/✓/.test(t))setTimeout(()=>{if($("uplMsg"))$("uplMsg").textContent="";},1600);
}

function wireUpload(){
  $("uplBtn").onclick=()=>$("uplFile").click();
  $("uplFile").onchange=async(e)=>{
    const file=e.target.files&&e.target.files[0];
    e.target.value="";                 // allow re-picking the same file later
    if(!file)return;
    if(!/^image\//.test(file.type)){setUpl("Please choose an image file.",true);return;}
    setUpl("Processing…");
    try{
      const blob=await squareResize(file,AV_PX);
      const uid=auth.session().user.id;
      const path=`${uid}/avatar.jpg`;
      const {error:upErr}=await sb.storage.from(BUCKET)
        .upload(path,blob,{upsert:true,contentType:"image/jpeg",cacheControl:"3600"});
      if(upErr)throw upErr;
      const url=sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl+"?v="+Date.now();
      const {error}=await sb.rpc("set_avatar",{p_avatar:url});
      if(error)throw error;
      myAvatar=url;
      $("bigAv").innerHTML=avInner(url);
      $("avGrid").querySelectorAll(".avb").forEach(x=>x.classList.remove("on"));
      $("rmBtn").hidden=false;
      setUpl("Saved ✓");
    }catch(err){console.warn(err);setUpl(err.message||"Upload failed — is the migration run?",true);}
  };
  $("rmBtn").onclick=async()=>{
    setUpl("Removing…");
    try{
      const {error}=await sb.rpc("set_avatar",{p_avatar:""});
      if(error)throw error;
      try{await sb.storage.from(BUCKET).remove([`${auth.session().user.id}/avatar.jpg`]);}catch{}
      myAvatar=null;
      $("bigAv").innerHTML=avInner(null);
      $("rmBtn").hidden=true;
      setUpl("Removed ✓");
    }catch(err){console.warn(err);setUpl("Couldn't remove the photo.",true);}
  };
}

async function loadStats(uname){
  let wins=0,losses=0,pct=null,total=0;
  try{
    const {data}=await sb.rpc("game_leaderboard",{p_game:null});
    const me=(data||[]).find(r=>r.username===uname);
    if(me){wins=me.wins;losses=me.losses;pct=me.winpct;total=me.total;}
  }catch(e){console.warn(e);}
  const w=(l)=>JSON.parse(localStorage.getItem("wordleStats_"+l)||"null")||{played:0,wins:0,streak:0,max:0};
  const lb=w("lb"),de=w("de");
  const wordleMax=Math.max(lb.max,de.max);
  $("stats").innerHTML=`
    <div class="stat"><b>${wins}</b><span>Match wins</span></div>
    <div class="stat"><b>${losses}</b><span>Losses</span></div>
    <div class="stat"><b>${pct==null?"—":pct+"%"}</b><span>Win rate</span></div>
    <div class="stat"><b>${lb.wins+de.wins}/${lb.played+de.played}</b><span>Wordle wins</span></div>
    <div class="stat"><b>${wordleMax}</b><span>Best streak</span></div>`;
  if($("ach"))$("ach").innerHTML=achievements({wins,losses,pct,total,wordleMax});
}

auth.onAuth(boot);
boot();
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
