<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Frot deng Daten — ian.lu</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=10"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;height:100dvh}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);flex:0 0 auto}
  .bar .home{color:var(--muted);font-weight:700;text-decoration:none}
  .bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:720px;margin:0 auto;display:flex;flex-direction:column;min-height:0}
  .gate{text-align:center;color:var(--muted);padding:60px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer;font-size:14px}
  #chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
  .msg.think{align-self:flex-start;color:var(--muted);background:none;border:none;font-size:13px}
  .hint{color:var(--muted);font-size:12.5px;text-align:center;padding:4px 14px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:6px 14px}
  .chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;font-weight:700}
  .chip:hover{border-color:var(--accent2);color:var(--text)}
  form{display:flex;gap:8px;padding:12px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);flex:0 0 auto}
  form input{flex:1;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px;font-family:inherit;outline:none}
  form input:focus{border-color:var(--accent)}
  form button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:800;cursor:pointer;font-size:15px}
  form button:disabled{opacity:.5;cursor:default}
</style>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>🧠 Frot deng Daten</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Lueden…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=5";
const $=(id)=>document.getElementById(id);
const cfg=window.PB_CONFIG||{};
let turns=[],busy=false;

const SUGGESTIONS=[
  "Wéivill hunn ech dëse Mount ausginn?",
  "Op wat ginn déi meescht Suen?",
  "Wéi vill Schrëtt haten ech dës Woch?",
  "Wéini ass mäin nächsten Abo fälleg?",
  "Wat war meng bescht Kart-Ronn?",
];

function shell(){
  return `
    <div id="chat"></div>
    <div class="chips" id="chips">${SUGGESTIONS.map(s=>`<span class="chip">${s}</span>`).join("")}</div>
    <div class="hint">Äntwert baséiert op dénge Sue-, Gesondheets-, Abo-, Countdown- a Kart-Donnéeën.</div>
    <form id="f"><input id="q" placeholder="Frot eppes iwwer deng Daten…" autocomplete="off"><button id="send">➤</button></form>`;
}

function addMsg(cls,text){
  const el=document.createElement("div");
  el.className="msg "+cls;el.textContent=text;
  $("chat").appendChild(el);
  $("chat").scrollTop=$("chat").scrollHeight;
  return el;
}

async function send(text){
  if(busy||!text.trim())return;
  busy=true;$("send").disabled=true;$("chips").style.display="none";
  addMsg("user",text);
  turns.push({role:"user",text});
  const th=addMsg("think","Denkt no…");
  try{
    const r=await fetch(`${cfg.url}/functions/v1/ask`,{
      method:"POST",
      headers:{"content-type":"application/json",apikey:cfg.anonKey,
        Authorization:`Bearer ${auth.session()?.access_token}`},
      body:JSON.stringify({turns:turns.slice(-12)}),
    });
    const j=await r.json().catch(()=>({}));
    th.remove();
    if(!r.ok||!j.reply){
      addMsg("bot",j.error==="daily limit reached"
        ?"Deeglech Limite erreecht — probéier muer nach eng Kéier."
        :"Uups — dat huet net geklappt. Probéier nach eng Kéier.");
      turns.pop();
    }else{
      addMsg("bot",j.reply);
      turns.push({role:"assistant",text:j.reply});
    }
  }catch(e){th.remove();addMsg("bot","Net erreechbar — kuck deng Verbindung.");turns.pop();}
  busy=false;$("send").disabled=false;$("q").focus();
}

function showApp(){
  $("wrap").innerHTML=shell();
  addMsg("bot","Moien! 👋 Frot mech eppes iwwer deng Suen, Gesondheet, Aboen, Countdowns oder Kart-Sessiounen.");
  $("f").onsubmit=(e)=>{e.preventDefault();const v=$("q").value;$("q").value="";send(v);};
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>send(c.textContent));
  $("q").focus();
}
function showGate(){
  $("wrap").innerHTML=`<div class="gate">Mell dech un fir deng Daten ze froen.<br><br><button class="btn" id="si">Umellen</button></div>`;
  $("si").onclick=auth.openAuthModal;
}

async function boot(){
  await auth.client();
  auth.mountAccountButton($("acctHost"));
  auth.session()?showApp():showGate();
}
auth.onAuth(()=>{auth.session()?showApp():showGate();});
boot();
</script>
</body>
</html>
