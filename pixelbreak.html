:root{--brand1:#ff6b9d;--brand2:#4de8ff;--bg:#0d0d1a;--card:#161625;--card-hover:#1e1e35;--accent:#ff6b9d;--accent2:#4de8ff;--accent3:#ffcc00;--accent4:#44ff88;--text:#e8e8f0;--text2:#8888aa;--radius:14px}
html[data-theme="light"]{--brand1:#e23d78;--brand2:#0e7ec2}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh}
::selection{background:var(--accent);color:#fff}
header{background:var(--card);padding:20px 30px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--brand1),var(--brand2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(255,107,157,0.3);animation:lp 3s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.logo-text{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--brand1),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card2);border:2px solid var(--border);border-radius:30px;padding:7px 16px;width:280px;transition:border-color 0.3s}
.search-box:focus-within{border-color:var(--accent2)}
.search-box input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%;font-family:'Nunito',sans-serif}
.search-box input::placeholder{color:var(--muted)}
.si{font-size:16px;opacity:0.4}
.header-right{display:flex;align-items:center;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.home-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:30px;border:2px solid var(--border);background:var(--card);color:var(--text);text-decoration:none;font-weight:700;font-size:14px;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s}
.home-btn:hover{border-color:var(--accent);color:var(--accent)}
main{max-width:1200px;margin:0 auto;padding:8px 30px 50px}
.sec-title{font-family:'Fredoka',sans-serif;font-size:23px;margin:26px 0 2px;display:flex;align-items:center;gap:9px;letter-spacing:0.3px}
.sec-sub{color:var(--text2);font-size:13px;margin:2px 0 16px}
.count{font-size:13px;color:var(--text2);margin-bottom:12px}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.game-card{background:var(--card);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s,background 0.25s;position:relative;border:1px solid var(--border)}
.game-card.online{border-color:rgba(77,232,255,0.22)}
.game-card.online:hover{box-shadow:0 14px 40px rgba(0,0,0,0.45),0 0 26px rgba(77,232,255,0.14)}
.game-card:hover{transform:translateY(-6px);box-shadow:0 14px 40px rgba(0,0,0,0.45);background:var(--card-hover)}
.game-thumb{height:126px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden}
.game-thumb .em{filter:drop-shadow(0 8px 20px rgba(0,0,0,0.55));transition:transform 0.3s}
.game-card:hover .game-thumb .em{transform:scale(1.12)}
.game-thumb::after{content:'\25B6';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:32px;color:#fff;opacity:0;transition:all 0.3s;text-shadow:0 0 20px rgba(0,0,0,0.8)}
.game-card:hover .game-thumb::after{transform:translate(-50%,-50%) scale(1);opacity:0.8}
.game-info{padding:10px 12px}
.game-name{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;margin-bottom:3px}
.game-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:7px;background:var(--card2);color:var(--text2)}
.tag.mp{background:rgba(77,232,255,0.15);color:var(--accent2)}
.tag.hot{background:rgba(255,107,157,0.15);color:var(--accent)}
.tag.new{background:rgba(68,255,136,0.15);color:var(--accent4)}
.ext{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;font-size:9px;padding:2px 6px;border-radius:5px}

#gf{flex:1;width:100%;border:none;border-radius:0;background:#000;min-height:0}

#tc{display:none;position:absolute;bottom:14px;left:0;right:0;align-items:flex-end;justify-content:space-between;gap:14px;padding:0 16px;user-select:none;-webkit-user-select:none;touch-action:none;pointer-events:none;z-index:5}

#tc .up{left:53px;top:0}#tc .left{left:0;top:53px}#tc .down{left:53px;top:106px}#tc .right{left:106px;top:53px}
#tc .act{position:static;width:78px;height:78px;border-radius:50%;background:var(--accent);border:none;font-weight:800;font-size:24px;flex:none}
#tc .tb.on{background:var(--accent2);color:#0d0d1a}
@media (pointer:coarse){#tc{display:flex}}
#om{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:2000;padding:18px}

#om .jr button{background:var(--accent2);color:#0d0d1a;border:none;border-radius:10px;padding:11px 16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
#om .x{float:right;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1}
footer{text-align:center;padding:25px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}

</style>

var frame=document.getElementById('gf');
// Give the game keyboard focus as soon as it loads, so arrow/space keys work on
// iPad (and desktop) without having to tap the canvas first to "activate" it.
frame.onload=function(){try{frame.contentWindow.focus();}catch(e){}};
document.getElementById('overlay').classList.add('open');
document.body.style.overflow='hidden';
fetch(g.src,{cache:'no-cache'}).then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
return r.text();
}).then(function(src){
if(seq!==openSeq)return; // user closed or opened another game meanwhile
if(window.PB&&PB.onOpenGame)PB.onOpenGame(g);   // before instrument: save injection needs PB.current
frame.srcdoc=(window.PB&&PB.instrument)?PB.instrument(src):src;
try{frame.focus();}catch(e){}
}).catch(function(){
if(seq!==openSeq)return;
frame.srcdoc='<body style="margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0d1a;color:#e8e8f0;font-family:system-ui;text-align:center;padding:20px">Could not load the game &mdash; check your connection and try again.';
});
}
function closeGame(fromHistory){
openSeq++;
document.getElementById('overlay').classList.remove('open');
document.getElementById('gf').srcdoc='';
document.body.style.overflow='';
document.title='PixelBreak - Play Games';
if(_cnEl)_cnEl.href=_cn0;
if(_mdEl)_mdEl.content=_md0;
if(!fromHistory&&/[?&]g=/.test(location.search))history.pushState(null,'',location.pathname);
if(window.PB&&PB.onCloseGame)PB.onCloseGame();
}
function gameIdxById(id){
for(var i=0;i<GAMES.length;i++)if(GAMES[i].id===id&&GAMES[i].src)return i;
return -1;
}
window.addEventListener('popstate',function(e){
var id=(e.state&&e.state.g)||new URLSearchParams(location.search).get('g');
var i=id?gameIdxById(id):-1;
if(i>=0)openGame(i,true);else closeGame(true);
});
(function(){
var id=new URLSearchParams(location.search).get('g');
var i=id?gameIdxById(id):-1;
if(i>=0)openGame(i,true);
})();
function goHome(){
closeGame();
document.getElementById('search').value='';
applyFilters();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeGame()});

/* room modal for the online (two-device) games */
function openOnline(idx){
var g=GAMES[idx];if(!g||!g.href)return;
var om=document.getElementById('om');
om.querySelector('.box').innerHTML='<button class="x" onclick="document.getElementById(\'om\').classList.remove(\'open\')">&#x2715;</button>'+
'<h3>'+g.emoji+' '+g.name+'</h3><p>'+g.desc+'</p>'+
'<button class="go" onclick="startOnline(\''+g.href+'\')">&#x25B6; Start &mdash; get a room code</button>'+
(g.ai?'<button class="go alt" onclick="location.href=\''+g.href+'?ai=1\'">&#x1F916; Play vs AI</button>':'')+
'<div class="jr"><input id="omCode" placeholder="room code" autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false"><button onclick="joinOnline(\''+g.href+'\')">Join</button></div>';
om.classList.add('open');
}
function startOnline(href){location.href=href+'?room='+Math.random().toString(36).slice(2,8)+'&role=host'}
function joinOnline(href){var c=(document.getElementById('omCode').value||'').trim().toLowerCase();if(c)location.href=href+'?room='+encodeURIComponent(c)+'&role=guest'}
document.getElementById('om').addEventListener('click',function(e){if(e.target.id==='om')e.target.classList.remove('open')});

// On-screen touch controls → synthetic key events into the open game (same-origin iframe).
(function(){
  var CODE={'ArrowUp':'ArrowUp','ArrowDown':'ArrowDown','ArrowLeft':'ArrowLeft','ArrowRight':'ArrowRight',' ':'Space'};
  function sendKey(type,key){
    var fr=document.getElementById('gf');
    var win=fr&&fr.contentWindow, doc=fr&&fr.contentDocument;
    if(!win||!doc)return;
    try{
      var KE=win.KeyboardEvent||window.KeyboardEvent;
      doc.dispatchEvent(new KE(type,{key:key,code:CODE[key]||'',bubbles:true,cancelable:true}));
    }catch(e){}
  }
  var tc=document.getElementById('tc');
  if(!tc)return;
  tc.querySelectorAll('.tb').forEach(function(b){
    var k=b.getAttribute('data-k');
    var press=function(e){e.preventDefault();b.classList.add('on');sendKey('keydown',k);};
    var release=function(e){e.preventDefault();b.classList.remove('on');sendKey('keyup',k);};
    b.addEventListener('pointerdown',press);
    b.addEventListener('pointerup',release);
    b.addEventListener('pointercancel',release);
    b.addEventListener('pointerleave',release);
  });
})();

applyFilters();

<script type="module">
/* ---------- feedback box ---------- */
import * as auth from "./auth.js?v=5";
const fab=document.getElementById('fbFab'),panel=document.getElementById('fbPanel');
fab.onclick=()=>{panel.style.display=panel.style.display==='none'?'':'none';};
document.getElementById('fbSend').onclick=async()=>{
  const msg=document.getElementById('fbMsg').value.trim();
  const note=document.getElementById('fbNote');
  if(msg.length<3){note.textContent='Too short';return;}
  note.textContent='…';
  try{
    const sb=await auth.client();
    const {error}=await sb.from('feedback').insert({
      kind:document.getElementById('fbKind').value,
      message:msg.slice(0,2000),
      page:new URLSearchParams(location.search).get('g')||'pixelbreak',
      username:auth.session()?auth.username():null,
    });
    if(error)throw error;
    document.getElementById('fbMsg').value='';
    note.textContent='Merci! 🎉';
    setTimeout(()=>{panel.style.display='none';note.textContent='';},1500);
  }catch(e){console.warn('[feedback]',e);note.textContent='Failed — try again';}
};
</script>
<script>
/* ---------- install as app (PWA) ---------- */
(function(){
  var btn=document.getElementById('installBtn');
  if(!btn)return;
  var standalone=matchMedia('(display-mode: standalone)').matches||navigator.standalone;
  if(standalone)return;
  var deferred=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferred=e;btn.style.display='';
  });
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if(isIOS)btn.style.display='';
  btn.onclick=function(){
    if(deferred){deferred.prompt();deferred=null;btn.style.display='none';return;}
    // iOS has no install prompt: explain the Share-menu route
    var tip=document.createElement('div');
    tip.textContent='Op iOS: Deelen-Knäppchen ⬆️ → "Zum Home-Bildschierm"';
    tip.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card-hover);border:1px solid var(--accent2);color:var(--text);padding:12px 18px;border-radius:12px;font-weight:700;z-index:9999;max-width:90vw;text-align:center';
    document.body.appendChild(tip);
    setTimeout(function(){tip.remove();},5000);
  };
})();
</script>
