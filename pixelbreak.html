<style>
:root{--bg:#0d0d1a;--card:#161625;--card-hover:#1e1e35;--accent:#ff6b9d;--accent2:#4de8ff;--accent3:#ffcc00;--accent4:#44ff88;--text:#e8e8f0;--text2:#8888aa;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh}
::selection{background:var(--accent);color:#fff}
header{background:linear-gradient(135deg,#1a1a35 0%,#0d0d1a 50%,#1a1025 100%);padding:24px 30px 16px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.05)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(255,107,157,0.3);animation:lp 3s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.logo-text{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card2);border:2px solid var(--border);border-radius:30px;padding:7px 16px;width:280px;transition:border-color 0.3s}
.search-box:focus-within{border-color:var(--accent2)}
.search-box input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%;font-family:'Nunito',sans-serif}
.search-box input::placeholder{color:var(--muted)}
.si{font-size:16px;opacity:0.4}
.header-right{display:flex;align-items:center;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.home-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:30px;border:2px solid var(--border);background:var(--card);color:var(--text);text-decoration:none;font-weight:700;font-size:14px;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s}
.home-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-pills{display:flex;gap:6px;padding:12px 30px 0;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:18px;border:1px solid #2a2a4a;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s;font-family:'Nunito',sans-serif}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
main{max-width:1200px;margin:0 auto;padding:16px 30px 50px}
.count{font-size:13px;color:var(--text2);margin-bottom:12px}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.game-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s,background 0.25s;position:relative;border:1px solid rgba(255,255,255,0.04)}
.game-card:hover{transform:translateY(-5px);box-shadow:0 10px 35px rgba(0,0,0,0.4);background:var(--card-hover)}
.game-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.game-thumb::after{content:'\25B6';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:32px;color:#fff;opacity:0;transition:all 0.3s;text-shadow:0 0 20px rgba(0,0,0,0.8)}
.game-card:hover .game-thumb::after{transform:translate(-50%,-50%) scale(1);opacity:0.8}
.game-info{padding:10px 12px}
.game-name{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;margin-bottom:3px}
.game-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:7px;background:rgba(255,255,255,0.06);color:var(--text2)}
.tag.mp{background:rgba(77,232,255,0.15);color:var(--accent2)}
.tag.hot{background:rgba(255,107,157,0.15);color:var(--accent)}
.tag.new{background:rgba(68,255,136,0.15);color:var(--accent4)}
.ext{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;font-size:9px;padding:2px 6px;border-radius:5px}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.94);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
#overlay.open{display:flex}
#gh{display:flex;align-items:center;justify-content:space-between;width:95%;max-width:960px;padding:8px 0;color:#fff}
#gh h2{font-family:'Fredoka',sans-serif;font-size:20px}
#cb{background:var(--accent);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
#cb:hover{transform:scale(1.1)}
#gf{width:95%;max-width:960px;height:82vh;border:none;border-radius:var(--radius);background:#000;box-shadow:0 0 50px rgba(0,0,0,0.5)}
footer{text-align:center;padding:25px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
@media(max-width:700px){header{padding:12px 15px 8px}.header-right{width:100%;order:3}.search-box{flex:1;width:auto;order:0}main{padding:12px 12px 35px}.nav-pills{padding:8px 12px 0}.game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}.game-thumb{height:90px;font-size:36px}}
</style>

var currentCat='all';
function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return Math.abs(h)}
function renderGames(list){
document.getElementById('count').textContent=list.length+' games';
var html='';
for(var i=0;i<list.length;i++){
var g=list[i];
var tagHTML='';
if(g.tags){for(var t=0;t<g.tags.length;t++){
if(g.tags[t]==='mp')tagHTML+='<span class="tag mp">Multiplayer<\/span>';
if(g.tags[t]==='hot')tagHTML+='<span class="tag hot">Popular<\/span>';
if(g.tags[t]==='new')tagHTML+='<span class="tag new">New<\/span>';
}}
var ext=g.url?'<span class="ext">External<\/span>':'';
var hue=hashStr(g.name)%360;
var gIdx=GAMES.indexOf(g);
var oc=g.b64?'openGame('+gIdx+')':("window.open('"+g.url+"','_blank')");
html+='<div class="game-card" onclick="'+oc+'" title="'+g.desc+'">'+ext+
'<div class="game-thumb" style="background:linear-gradient(135deg,hsl('+hue+',40%,18%),hsl('+(hue+40)+',35%,12%))">'+g.emoji+'<\/div>'+
'<div class="game-info"><div class="game-name">'+g.name+'<\/div><div class="game-tags">'+tagHTML+'<\/div><\/div><\/div>';
}
document.getElementById('grid').innerHTML=html;
}
function filterCat(cat,el){
currentCat=cat;
var pills=document.querySelectorAll('.pill');
for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
if(el)el.classList.add('active');
applyFilters();
}
function applyFilters(){
var q=document.getElementById('search').value.toLowerCase();
var list=[];
for(var i=0;i<GAMES.length;i++){
var g=GAMES[i];
if(currentCat!=='all'&&g.cats.indexOf(currentCat)===-1)continue;
if(q&&g.name.toLowerCase().indexOf(q)===-1&&g.desc.toLowerCase().indexOf(q)===-1)continue;
list.push(g);
}
renderGames(list);
}
function openGame(idx){
var g=GAMES[idx];
if(!g||!g.b64)return;
document.getElementById('gt').textContent=g.name;
var frame=document.getElementById('gf');
var src=b64decode(g.b64);
// Give the game keyboard focus as soon as it loads, so arrow/space keys work on
// iPad (and desktop) without having to tap the canvas first to "activate" it.
frame.onload=function(){try{frame.contentWindow.focus();}catch(e){}};
frame.srcdoc=(window.PB&&PB.instrument)?PB.instrument(src):src;
if(window.PB&&PB.onOpenGame)PB.onOpenGame(g);
document.getElementById('overlay').classList.add('open');
document.body.style.overflow='hidden';
try{frame.focus();}catch(e){}
}
function closeGame(){
document.getElementById('overlay').classList.remove('open');
document.getElementById('gf').srcdoc='';
document.body.style.overflow='';
if(window.PB&&PB.onCloseGame)PB.onCloseGame();
}
function goHome(){
closeGame();
document.getElementById('search').value='';
currentCat='all';
var pills=document.querySelectorAll('.pill');
for(var i=0;i<pills.length;i++)pills[i].classList.toggle('active',i===0);
renderGames(GAMES);
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeGame()});
renderGames(GAMES);
</script>
