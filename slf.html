<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--good:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .bar .code{color:var(--muted);font-size:13px}.bar code{background:var(--card2);padding:2px 8px;border-radius:6px;color:var(--accent2)}
  .wrap{max-width:680px;margin:0 auto;padding:22px 18px 60px}
  .players{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .pchip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px}
  .letter{font-size:64px;font-weight:900;text-align:center;color:var(--accent);margin:10px 0}
  .big{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:16px;cursor:pointer}
  .big.stop{background:#ff5d6c}
  .cat{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cat label{width:120px;color:var(--muted);font-size:14px;flex:none}
  .cat input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
  th,td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:left}
  th{color:var(--muted);font-size:12px}
  td.pts{text-align:right;font-weight:800}
  .tot{margin-top:16px}
  .ovr{background:var(--card2);border:1px solid var(--border);color:var(--good);border-radius:8px;padding:2px 7px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .ovr:hover{border-color:var(--good)}
  .muted{color:var(--muted)}.center{text-align:center}
  h3{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:22px 0 10px}
  .catpick .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .chip{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:7px 13px;font-size:13px;cursor:pointer}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
</style>

<body>
<header class="bar">
  <a class="home" href="pixelbreak.html">‹ Games</a>
  <h1>🔤 Stadt-Land-Fluss</h1>
  <div class="spacer"></div>
  <span class="code">room <code id="roomc"></code></span>
</header>
<div class="wrap" id="app"><p class="muted">Connecting…</p></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="notify-ambient.js?v=2"></script>
<script>
/* 15 categories to choose from. `check` is the Wikidata WHERE-fragment used to
   verify an answer; null = no online check (that category always counts). */
const CATALOG = [
  { name:"Stadt",     check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q486972 }" },              // human settlement
  { name:"Land",      check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q6256 }" },                // country
  { name:"Fluss",     check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q355304 }" },              // watercourse
  { name:"Name",      check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q202444 }" },              // given name
  { name:"Tier",      check:'?item (wdt:P279|wdt:P171)* wd:Q729. hint:Prior hint:gearing "forward".' },   // Animalia
  { name:"Beruf",     check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q28640 wd:Q12737077 }" },  // profession/occupation
  { name:"Pflanze",   check:'?item (wdt:P279|wdt:P171)* wd:Q756. hint:Prior hint:gearing "forward".' },   // Plantae
  { name:"Farbe",     check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q1075 }" },                // colour
  { name:"Sportart",  check:"?item wdt:P31/wdt:P279* ?c. VALUES ?c { wd:Q349 wd:Q31629 }" },       // sport / type of sport
  { name:"Essen",     check:null },
  { name:"Getränk",   check:null },
  { name:"Automarke", check:null },
  { name:"Film",      check:null },
  { name:"Band",      check:null },
  { name:"Körperteil",check:null },
];
const DEFAULT_CATS = [0,1,2,3,4,5];   // the classic six
let selIdx = (()=>{ try{ const s=JSON.parse(localStorage.getItem("slfCats"));
  if(Array.isArray(s)&&s.length>=2&&s.every(n=>Number.isInteger(n)&&n>=0&&n<CATALOG.length)) return s;
}catch{} return [...DEFAULT_CATS]; })();
let cats = DEFAULT_CATS.map(i=>CATALOG[i]);   // the categories in play this round
const LETTERS = "ABDEFGHIKLMNOPRSTUVW";
const params = new URLSearchParams(location.search);
const room = (params.get("room")||"demo").toLowerCase();
const role = params.get("role")==="guest" ? "guest" : "host";
const cid = Math.random().toString(36).slice(2,10);
document.getElementById("roomc").textContent = room;

const cfg = window.PB_CONFIG;
const sb = supabase.createClient(cfg.url.replace(/\/$/,""), cfg.anonKey, { auth:{ persistSession:false, autoRefreshToken:false } });
const ch = sb.channel("slf:"+room, { config:{ broadcast:{self:false}, presence:{key:cid} }});
const $ = (id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let name="Player", phase="lobby", letter="", round=0, stopped=false, answers={}, totals={}, collectTimer=null, hostHere=true;
let verdicts={}, verdictTimer=null;   // "cid|catIndex" -> false when Wikidata says the word isn't real
let roundScores={}, roundPlayers=[];  // this round's scoring, kept so host overrides can re-score

/* ---------- answer checking (Wikidata) ----------
 * On reveal the HOST asks Wikidata whether each answer really is a city /
 * country / river / first name / animal / profession, then broadcasts the
 * verdicts so every client scores identically. Fails OPEN: if the check
 * errors or times out, answers count as valid and the game just continues. */
const VERIFY_TIMEOUT_MS = 12000;      // per Wikidata query
const VERDICT_WAIT_MS   = 20000;      // guests: give up waiting for the host's verdicts
const VERIFY_CONCURRENCY = 4;
async function checkWord(term, check){
  if(!check) return null;                          // category has no online check → always valid
  const safe = term.trim().slice(0,60).replace(/[\\"]/g,"");
  const query = `SELECT ?item WHERE {
    SERVICE wikibase:mwapi {
      bd:serviceParam wikibase:endpoint "www.wikidata.org";
                      wikibase:api "EntitySearch";
                      mwapi:search "${safe}";
                      mwapi:language "de";
                      mwapi:limit "10".
      ?item wikibase:apiOutputItem mwapi:item.
    }
    ${check} } LIMIT 1`;
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), VERIFY_TIMEOUT_MS);
  try{
    const r = await fetch("https://query.wikidata.org/sparql", {
      method:"POST", signal:ctrl.signal,
      headers:{ "Content-Type":"application/x-www-form-urlencoded", "Accept":"application/sparql-results+json",
                "Api-User-Agent":"ianlu-slf/1.0 (https://ian.lu)" },
      body:"format=json&query="+encodeURIComponent(query),
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data = await r.json();
    return data.results.bindings.length > 0;
  }catch(e){ console.warn("[slf] check skipped for", term, e); return null; }   // unknown → counts as valid
  finally{ clearTimeout(to); }
}
async function validateAll(ps){
  const jobs=[];
  ps.forEach(p=>{ cats.forEach((c,i)=>{
    const a=(answers[p.cid]?.ans?.[i]||"").trim();
    if(a && valid(a) && c.check) jobs.push({ key:p.cid+"|"+i, term:a, check:c.check });
  }); });
  const v={};
  for(let at=0; at<jobs.length; at+=VERIFY_CONCURRENCY){
    const slice=jobs.slice(at, at+VERIFY_CONCURRENCY);
    const res=await Promise.all(slice.map(j=>checkWord(j.term, j.check)));
    res.forEach((ok,k)=>{ if(ok===false) v[slice[k].key]=false; });
  }
  return v;
}

async function getName(){
  let n=localStorage.getItem("playerName");
  if(!n){ try{ n=window.__pbAuth?.session?.user?.user_metadata?.username; }catch{} }
  if(!n){ n=(prompt("Your name for the game:")||"Player").slice(0,20); }
  localStorage.setItem("playerName", n); return n;
}
function players(){ const st=ch.presenceState(); return Object.keys(st).map(k=>({cid:k, name:(st[k][0]||{}).name||"?"})); }
// Shuffled-bag draw: every letter comes up once before any repeats, and the
// same letter can never be picked twice in a row (guarded at bag refill).
let letterBag = [];
function pick(){
  if (!letterBag.length){
    letterBag = LETTERS.split("");
    for (let i=letterBag.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [letterBag[i], letterBag[j]] = [letterBag[j], letterBag[i]];
    }
    if (letterBag[letterBag.length-1] === letter) letterBag.unshift(letterBag.pop());
  }
  return letterBag.pop();
}

function render(){
  const ps = players();
  if (phase==="lobby"){
    $("app").innerHTML = `
      <div class="players">${ps.map(p=>`<span class="pchip">👤 ${esc(p.name)}${p.cid===cid?" (you)":""}</span>`).join("")||'<span class="muted">…</span>'}</div>
      <p class="muted">${ps.length<2?"Waiting for players — share the room code above.":"Ready!"}</p>
      <p class="muted" style="font-size:12.5px">🔎 At the reveal, answers are checked against Wikidata — made-up words score 0.</p>
      ${role==="host" ? renderCatPicker() : ""}
      ${role==="host" ? `<button class="big" id="startBtn" ${(ps.length<2||selIdx.length<2)?"disabled":""}>Start round ${round+1}</button>`
                      : (hostHere ? `<p class="center muted">Waiting for the host to start…</p>`
                                  : `<p class="center muted">⚠️ The host left the room — ask them to rejoin, or <a href="pixelbreak.html">start a new game</a>.</p>`)}
      ${renderTotals(ps)}`;
    if(role==="host"){
      $("startBtn") && ($("startBtn").onclick=startRound);
      $("app").querySelectorAll(".chip").forEach(b=> b.onclick=()=>toggleCat(+b.dataset.ci));
    }
  } else if (phase==="play"){
    $("app").innerHTML = `
      <div class="players">${ps.map(p=>`<span class="pchip">👤 ${esc(p.name)}</span>`).join("")}</div>
      <div class="letter">${letter}</div>
      ${cats.map((c,i)=>`<div class="cat"><label>${esc(c.name)}</label><input id="c${i}" autocomplete="off" placeholder="${letter}…"></div>`).join("")}
      <button class="big stop" id="stopBtn">✋ Stop! (reveal)</button>`;
    $("c0").focus();
    $("stopBtn").onclick=()=>{ ch.send({type:"broadcast",event:"stop",payload:{}}); doStop(); };
  } else if (phase==="checking"){
    $("app").innerHTML = `
      <div class="letter" style="font-size:34px">Letter: ${letter}</div>
      <p class="center muted">🔎 Checking the answers on Wikidata…</p>`;
  } else if (phase==="results"){
    $("app").innerHTML = `
      <div class="letter" style="font-size:34px">Letter: ${letter}</div>
      ${renderRound(ps)}
      ${renderTotals(ps)}
      ${role==="host" ? `<button class="big" id="nextBtn" style="margin-top:18px">Next round</button>`
                      : (hostHere ? `<p class="center muted">Waiting for host…</p>`
                                  : `<p class="center muted">⚠️ The host left — <a href="pixelbreak.html">start a new game</a>.</p>`)}`;
    if(role==="host"){
      $("nextBtn").onclick=()=>{ phase="lobby"; render(); };
      $("app").querySelectorAll("[data-ov]").forEach(b=> b.onclick=()=>overrideVerdict(b.dataset.ov,true));
    }
  }
}
function renderRound(ps){
  let rows = `<h3>Round ${round}</h3><table><tr><th>Category</th>${ps.map(p=>`<th>${esc(p.name)}</th>`).join("")}</tr>`;
  cats.forEach((cat,i)=>{
    rows += `<tr><td class="muted">${esc(cat.name)}</td>` + ps.map(p=>{
      const a=(answers[p.cid]?.ans?.[i])||""; const pts=scoreCell(i,p.cid,ps);
      const isBad = verdicts[p.cid+"|"+i]===false;
      const ovr = role==="host" ? ` <button class="ovr" data-ov="${p.cid}|${i}" title="Wikidata got it wrong? Count this answer anyway.">✓ count it</button>` : "";
      const shown = !a ? "—" : isBad ? `<s style="color:#ff5d6c">${esc(a)}</s> ❌${ovr}` : esc(a);
      return `<td>${shown} <span class="pts" style="color:var(--good)">${pts?("+"+pts):""}</span></td>`;
    }).join("") + `</tr>`;
  });
  rows += `</table>`; return rows;
}
function renderTotals(ps){
  if(!Object.keys(totals).length) return "";
  const sorted=[...ps].sort((a,b)=>(totals[b.cid]||0)-(totals[a.cid]||0));
  return `<div class="tot"><h3>Scores</h3><table>${sorted.map(p=>`<tr><td>👤 ${esc(p.name)}</td><td class="pts">${totals[p.cid]||0}</td></tr>`).join("")}</table></div>`;
}
function valid(a){ return a && a.trim() && a.trim()[0].toUpperCase()===letter; }
function scoreCell(i,pcid,ps){
  const a=(answers[pcid]?.ans?.[i])||"";
  if(!valid(a)) return 0;
  if(verdicts[pcid+"|"+i]===false) return 0;          // not a real word for this category
  const v=a.trim().toLowerCase();
  let dup=false;
  ps.forEach(p=>{ if(p.cid!==pcid){ const o=(answers[p.cid]?.ans?.[i])||"";
    if(valid(o)&&verdicts[p.cid+"|"+i]!==false&&o.trim().toLowerCase()===v) dup=true; }});
  return dup?5:10;
}

function startRound(){
  round++; letter=pick(); stopped=false; answers={};
  cats = selIdx.map(i=>CATALOG[i]);
  ch.send({type:"broadcast",event:"start",payload:{round,letter,cats:selIdx}});
  enterPlay();
}
function toggleCat(i){
  const has=selIdx.includes(i);
  if(has && selIdx.length<=2) return;                 // keep at least two categories
  selIdx = has ? selIdx.filter(x=>x!==i) : [...selIdx,i].sort((a,b)=>a-b);
  localStorage.setItem("slfCats", JSON.stringify(selIdx));
  render();
}
function renderCatPicker(){
  return `<div class="catpick"><h3>Kategorien (${selIdx.length})</h3>
    <div class="chips">${CATALOG.map((c,i)=>`<button class="chip${selIdx.includes(i)?" on":""}" data-ci="${i}">${esc(c.name)}</button>`).join("")}</div>
    ${selIdx.length<2?'<p class="muted" style="font-size:12px">Wähle mindestens 2 Kategorien.</p>':''}</div>`;
}
function enterPlay(){ phase="play"; stopped=false; answers={}; verdicts={}; roundScores={}; clearTimeout(verdictTimer); render(); }
function doStop(){
  if(stopped) return; stopped=true; phase="collect";
  const ans=cats.map((_,i)=>($("c"+i)?($("c"+i).value||""):""));
  answers[cid]={name,ans};
  ch.send({type:"broadcast",event:"answers",payload:{cid,name,ans}});
  clearTimeout(collectTimer); collectTimer=setTimeout(finish,4000);
  checkComplete();
}
function checkComplete(){ const ps=players(); if(ps.every(p=>answers[p.cid])) finish(); }
function finish(){
  if(phase==="results"||phase==="checking") return;
  clearTimeout(collectTimer);
  phase="checking"; render();
  if(role==="host") hostValidate();
  else verdictTimer=setTimeout(()=>applyVerdicts({}), VERDICT_WAIT_MS);   // host gone? score unchecked
}
async function hostValidate(){
  const v = await validateAll(players());
  ch.send({type:"broadcast",event:"verdicts",payload:{v}});
  applyVerdicts(v);
}
function applyVerdicts(v){
  if(phase==="results") return;                       // score each round only once
  clearTimeout(verdictTimer);
  verdicts = v || {};
  roundPlayers = players();
  roundScores = {};
  roundPlayers.forEach(p=>{ let s=0; cats.forEach((_,i)=>s+=scoreCell(i,p.cid,roundPlayers)); roundScores[p.cid]=s; totals[p.cid]=(totals[p.cid]||0)+s; });
  phase="results"; render();
}
// Host judgement call: Wikidata rejected a word the players know is real —
// flip the verdict and re-score the whole round (duplicates included).
function overrideVerdict(key, send){
  if(phase!=="results" || verdicts[key]!==false) return;
  delete verdicts[key];
  roundPlayers.forEach(p=>{
    let s=0; cats.forEach((_,i)=>s+=scoreCell(i,p.cid,roundPlayers));
    totals[p.cid]=(totals[p.cid]||0)+s-(roundScores[p.cid]||0);
    roundScores[p.cid]=s;
  });
  if(send) ch.send({type:"broadcast",event:"override",payload:{key}});
  render();
}

ch.on("broadcast",{event:"start"},({payload})=>{ round=payload.round; letter=payload.letter;
    cats=(Array.isArray(payload.cats)?payload.cats:DEFAULT_CATS).map(i=>CATALOG[i]).filter(Boolean); enterPlay(); })
  .on("broadcast",{event:"stop"},()=>doStop())
  .on("broadcast",{event:"answers"},({payload})=>{ answers[payload.cid]={name:payload.name,ans:payload.ans}; if(stopped) checkComplete(); })
  .on("broadcast",{event:"verdicts"},({payload})=>applyVerdicts(payload.v||{}))
  .on("broadcast",{event:"override"},({payload})=>overrideVerdict(payload.key,false))
  .on("presence",{event:"sync"},()=>{
    const st=ch.presenceState();
    const hh = role==="host" || Object.values(st).some(m=>(m[0]||{}).role==="host");
    const hostChanged = hh!==hostHere; hostHere=hh;
    if(phase==="lobby"||phase==="results"||hostChanged&&phase!=="play") render();
  })
  .subscribe(async (s)=>{ if(s==="SUBSCRIBED"){ name=await getName(); await ch.track({name,role}); render(); }});
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
