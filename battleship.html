<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battleship — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=1"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--ship:#5b6bbf;--hit:#ff5d6c;--miss:#33384f;--water:#10142e}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .bar code{background:var(--card2);padding:2px 8px;border-radius:6px;color:var(--accent2)}
  .wrap{max-width:560px;margin:0 auto;padding:18px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .status{font-size:17px;font-weight:800;text-align:center;min-height:22px}
  .sub{color:var(--muted);font-size:13px;text-align:center}
  .label{align-self:flex-start;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:-6px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;width:100%;max-width:420px;background:var(--water);padding:8px;border-radius:12px}
  .cell{aspect-ratio:1;border-radius:6px;background:#1a2040;display:flex;align-items:center;justify-content:center;font-size:16px}
  .cell.ship{background:var(--ship)} .cell.hit{background:var(--hit)} .cell.miss{background:var(--miss);color:var(--muted)}
  .grid.fire .cell:not(.hit):not(.miss){cursor:pointer}
  .grid.fire .cell:not(.hit):not(.miss):hover{outline:2px solid var(--accent2)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:800;cursor:pointer}
  .btn.ghost{background:var(--card);border:1px solid var(--border);color:var(--text)}
  .row{display:flex;gap:10px}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="games.html">‹ Games</a>
  <h1>🚢 Battleship</h1>
  <div class="spacer"></div>
  <span class="sub">room <code id="roomc"></code></span>
</header>
<div class="wrap">
  <div class="status" id="status">Connecting…</div>
  <div class="sub" id="sub"></div>
  <div id="setup" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:12px">
    <div class="label">Your fleet — arrange it</div>
    <div class="grid" id="own"></div>
    <div class="row"><button class="btn ghost" id="shuffle">🔀 Shuffle</button><button class="btn" id="ready">Ready</button></div>
  </div>
  <div id="play" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:12px">
    <div class="label">Enemy waters — tap to fire</div>
    <div class="grid fire" id="enemy"></div>
    <div class="label">Your fleet</div>
    <div class="grid" id="ownSmall"></div>
  </div>
  <button class="btn ghost" id="rematch" style="display:none">↻ New game</button>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const N=8, SHIPS=[4,3,3,2];
const params=new URLSearchParams(location.search);
const room=(params.get("room")||"demo").toLowerCase();
const role=params.get("role")==="guest"?"guest":"host";
const other=role==="host"?"guest":"host";
document.getElementById("roomc").textContent=room;
const cfg=window.PB_CONFIG;
const sb=supabase.createClient(cfg.url.replace(/\/$/,""), cfg.anonKey);
const ch=sb.channel("bs:"+room,{config:{broadcast:{self:false},presence:{key:role}}});
const $=(id)=>document.getElementById(id);

let own=[], enemy=[], myReady=false, oppReady=false, oppHere=false, turn="host", phase="setup", over=false;
const empty=()=>Array.from({length:N},()=>Array(N).fill(0)); // 0 water,1 ship,2 hit,3 miss
const shipCells=()=>{let n=0;own.forEach(r=>r.forEach(v=>{if(v===1||v===2)n++;}));return n;};

function place(){
  const b=empty();
  for(const len of SHIPS){
    let ok=false,tries=0;
    while(!ok && tries++<500){
      const horiz=Math.random()<.5;
      const r=Math.floor(Math.random()*(horiz?N:N-len+1));
      const c=Math.floor(Math.random()*(horiz?N-len+1:N));
      let free=true;
      for(let k=0;k<len;k++){ if(b[r+(horiz?0:k)][c+(horiz?k:0)]) free=false; }
      if(free){ for(let k=0;k<len;k++) b[r+(horiz?0:k)][c+(horiz?k:0)]=1; ok=true; }
    }
  }
  own=b;
}
function grid(el,board,reveal,onclick){
  el.innerHTML="";
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement("div"); let cls="cell";
    const v=board[r][c];
    if(v===2)cls+=" hit"; else if(v===3)cls+=" miss"; else if(v===1&&reveal)cls+=" ship";
    d.className=cls; d.textContent=v===2?"✶":v===3?"·":"";
    if(onclick) d.onclick=()=>onclick(r,c);
    el.appendChild(d);
  }
}
function setStatus(h,s=""){ $("status").innerHTML=h; $("sub").innerHTML=s; }

function renderSetup(){
  $("setup").style.display="flex"; $("play").style.display="none";
  grid($("own"),own,true,null);
  setStatus(myReady?"Waiting for opponent…":"Arrange your fleet",
    oppHere?"":"Share room <code>"+room+"</code> so your opponent can join.");
}
function renderPlay(){
  $("setup").style.display="none"; $("play").style.display="flex";
  $("enemy").className="grid"+(turn===role&&!over?" fire":"");
  grid($("enemy"),enemy,false,(r,c)=>fire(r,c));
  grid($("ownSmall"),own,true,null);
  if(over) setStatus(over===role?"You win! 🎉":"You lost.","");
  else setStatus(turn===role?"Your turn — fire!":"Opponent's turn…");
  $("rematch").style.display=over?"":"none";
}

function bothReady(){ if(myReady&&oppReady&&phase==="setup"){ phase="play"; turn="host"; enemy=empty(); renderPlay(); } }
function fire(r,c){
  if(over||turn!==role) return;
  if(enemy[r][c]===2||enemy[r][c]===3) return;
  turn=other; // lock until result
  ch.send({type:"broadcast",event:"fire",payload:{r,c}});
  renderPlay();
}
function onFire(r,c){
  const hitShip=own[r][c]===1||own[r][c]===2;
  own[r][c]= hitShip?2:3;
  const lost = !own.flat().some(v=>v===1);
  ch.send({type:"broadcast",event:"result",payload:{r,c,hit:hitShip,lost}});
  if(lost){ over=other; } // the firer (other) won
  turn=role; // now my turn
  renderPlay();
}
function onResult(r,c,hit,lost){
  enemy[r][c]=hit?2:3;
  if(lost){ over=role; } // I sank their last ship
  renderPlay();
}

ch.on("broadcast",{event:"ready"},()=>{ oppReady=true; bothReady(); if(phase==="setup")renderSetup(); })
  .on("broadcast",{event:"fire"},({payload})=>{ if(phase==="play") onFire(payload.r,payload.c); })
  .on("broadcast",{event:"result"},({payload})=>onResult(payload.r,payload.c,payload.hit,payload.lost))
  .on("broadcast",{event:"reset"},()=>resetGame(false))
  .on("presence",{event:"sync"},()=>{ const st=ch.presenceState(); oppHere=!!st[other]; if(phase==="setup")renderSetup(); })
  .subscribe(async(s)=>{ if(s==="SUBSCRIBED"){ place(); phase="setup"; renderSetup(); await ch.track({role}); }});

$("shuffle").onclick=()=>{ if(myReady)return; place(); renderSetup(); };
$("ready").onclick=()=>{ if(myReady)return; myReady=true; ch.send({type:"broadcast",event:"ready",payload:{}}); renderSetup(); bothReady(); };
function resetGame(send){ over=false; myReady=false; oppReady=false; phase="setup"; place(); enemy=empty(); renderSetup(); if(send) ch.send({type:"broadcast",event:"reset",payload:{}}); }
$("rematch").onclick=()=>resetGame(true);
</script>
</body>
</html>
