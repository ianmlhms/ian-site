<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Battleship — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=8"></script>
<link rel="stylesheet" href="game-common.css?v=3">
<style>
  :root{--ship:#5b6bbf;--hit:#ff5d6c;--miss:#33384f;--water:#10142e;--ok:#3fb950}
  .wrap{max-width:560px;margin:0 auto;padding:18px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .status{font-size:17px;min-height:22px}
  .label{align-self:flex-start;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:-6px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;width:100%;max-width:420px;background:var(--water);padding:8px;border-radius:12px;touch-action:manipulation}
  .cell{aspect-ratio:1;border-radius:6px;background:#1a2040;display:flex;align-items:center;justify-content:center;font-size:16px}
  .cell.ship{background:var(--ship)} .cell.hit{background:var(--hit)} .cell.miss{background:var(--miss);color:var(--muted)}
  .grid.place .cell{cursor:pointer}
  .grid.fire .cell:not(.hit):not(.miss){cursor:pointer}
  .grid.fire .cell:not(.hit):not(.miss):hover{outline:2px solid var(--accent2)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:var(--card);border:1px solid var(--border);color:var(--text)}
  .seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .seg-b{background:var(--card);color:var(--muted);border:none;padding:10px 14px;font-weight:800;cursor:pointer;font-size:13px}
  .seg-b.active{background:var(--accent);color:#fff}
  .fleet{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
  .ship-pip{display:flex;gap:2px;padding:5px 7px;border-radius:8px;border:1px solid var(--border);background:var(--card)}
  .ship-pip.next{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .ship-pip.done{opacity:.35}
  .ship-pip i{width:11px;height:11px;border-radius:2px;background:var(--ship);display:block}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="pixelbreak.html">‹ Games</a>
  <h1>🚢 Battleship</h1>
  <div class="spacer"></div>
  <span class="sub">room <code id="roomc"></code></span>
</header>
<div class="wrap">
  <div class="status" id="status">Connecting…</div>
  <div class="sub" id="sub"></div>

  <div id="setup" style="display:none;width:100%;flex-direction:column;align-items:center;gap:12px">
    <div class="label">Your fleet — place your ships</div>
    <div class="fleet" id="fleet"></div>
    <div class="grid place" id="own"></div>
    <div class="toolbar">
      <div class="seg">
        <button id="orientH" class="seg-b active">→ Horizontal</button>
        <button id="orientV" class="seg-b">↓ Vertical</button>
      </div>
      <button class="btn ghost" id="shuffle">🔀 Shuffle</button>
      <button class="btn ghost" id="clear">Clear</button>
      <button class="btn" id="ready" disabled>Ready</button>
    </div>
    <div class="sub">Pick a direction, tap a square to place · tap a ship to remove it.</div>
  </div>

  <div id="play" style="display:none;width:100%;flex-direction:column;align-items:center;gap:12px">
    <div class="label">Enemy waters — tap to fire</div>
    <div class="grid fire" id="enemy"></div>
    <div class="label">Your fleet</div>
    <div class="grid" id="ownSmall"></div>
  </div>
  <button class="btn ghost" id="rematch" style="display:none">↻ New game</button>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game-common.js?v=1"></script>
<script type="module" src="notify-ambient.js?v=2"></script>
<script>
const N=8, SHIPS=[4,3,3,2];
const GC=window.GameCommon;
const { AI, room, role, other } = GC;
document.getElementById("roomc").textContent=AI?"computer 🤖":room;
const $=(id)=>document.getElementById(id);
let ch=null;   // realtime channel (multiplayer only)

let own=empty(), enemy=empty(), placed=[], toPlace=[...SHIPS], orient="h";
let myReady=false, oppReady=false, oppHere=false, turn="host", phase="setup", over=false;
let aiBoard=null, aiHunt=[];   // AI mode: computer's hidden fleet + its hit-follow-up queue

/* ---------- difficulty (AI mode) ---------- */
let difficulty=GC.difficultyFromUrl();
let recorded=false;
const recordResult=GC.recordResult;
function empty(){ return Array.from({length:N},()=>Array(N).fill(0)); }
const allPlaced=()=>toPlace.length===0;

/* ---------- local persistence (fleet can't be restored by the opponent) ----
 * The opponent never learns our ship positions, so a refresh mid-battle would
 * lose them forever. Keep the whole local view in sessionStorage; the shared
 * facts (turn, over, opponent readiness) are re-synced from the peer on rejoin. */
const storeKey="bs:"+room+":"+role;
function persistLocal(){ if(AI) return; try{ sessionStorage.setItem(storeKey, JSON.stringify({own,enemy,placed,toPlace,orient,myReady,oppReady,phase,turn,over})); }catch{} }
function restoreLocal(){
  if(AI) return false;
  try{
    const s=JSON.parse(sessionStorage.getItem(storeKey)||"null");
    if(!s) return false;
    ({own,enemy,placed,toPlace,orient,myReady,oppReady,phase,turn,over}=s);
    return true;
  }catch{ return false; }
}
function clearLocal(){ try{ sessionStorage.removeItem(storeKey); }catch{} }

// ---------- placement ----------
function fits(r,c,len,o){
  for(let k=0;k<len;k++){ const rr=r+(o==="v"?k:0), cc=c+(o==="h"?k:0);
    if(rr<0||rr>=N||cc<0||cc>=N||own[rr][cc]!==0) return false; }
  return true;
}
function tryPlace(r,c){
  if(!toPlace.length) return;
  const len=toPlace[0];
  if(!fits(r,c,len,orient)) return;
  const cells=[];
  for(let k=0;k<len;k++){ const rr=r+(orient==="v"?k:0), cc=c+(orient==="h"?k:0); own[rr][cc]=1; cells.push([rr,cc]); }
  placed.push({len,cells}); toPlace.shift();
  renderSetup();
}
function removeAt(r,c){
  const i=placed.findIndex(s=>s.cells.some(([rr,cc])=>rr===r&&cc===c));
  if(i<0) return;
  placed[i].cells.forEach(([rr,cc])=>own[rr][cc]=0);
  toPlace.unshift(placed[i].len); placed.splice(i,1);
  renderSetup();
}
function shuffle(){
  own=empty(); placed=[]; toPlace=[];
  for(const len of SHIPS){ let ok=false,t=0;
    while(!ok&&t++<600){ const o=Math.random()<.5?"h":"v";
      const r=Math.floor(Math.random()*N), c=Math.floor(Math.random()*N);
      if(fits(r,c,len,o)){ const cells=[]; for(let k=0;k<len;k++){const rr=r+(o==="v"?k:0),cc=c+(o==="h"?k:0);own[rr][cc]=1;cells.push([rr,cc]);} placed.push({len,cells}); ok=true; } } }
  renderSetup();
}
function clearAll(){ own=empty(); placed=[]; toPlace=[...SHIPS]; renderSetup(); }

// ---------- rendering ----------
function grid(el,board,reveal,onclick){
  el.innerHTML="";
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement("div"); const v=board[r][c]; let cls="cell";
    if(v===2)cls+=" hit"; else if(v===3)cls+=" miss"; else if(v===1&&reveal)cls+=" ship";
    d.className=cls; d.textContent=v===2?"✶":v===3?"·":"";
    if(onclick) d.onclick=()=>onclick(r,c);
    el.appendChild(d);
  }
}
function setStatus(h,s=""){ $("status").innerHTML=h; $("sub").innerHTML=s; }
function renderFleet(){
  const pip=(len,cls)=>`<span class="ship-pip ${cls}">${Array(len).fill("<i></i>").join("")}</span>`;
  let html="";
  toPlace.forEach((len,i)=> html+=pip(len, i===0?"next":""));   // still to place (first = next)
  placed.forEach(s=> html+=pip(s.len,"done"));                  // already placed (dimmed)
  $("fleet").innerHTML=html;
}
function renderSetup(){
  persistLocal();
  $("setup").style.display="flex"; $("play").style.display="none";
  renderFleet();
  grid($("own"), own, true, (r,c)=>{ if(myReady)return; if(own[r][c]===1) removeAt(r,c); else tryPlace(r,c); });
  $("ready").disabled = !allPlaced() || myReady;
  $("orientH").classList.toggle("active", orient==="h");
  $("orientV").classList.toggle("active", orient==="v");
  setStatus(myReady?"Waiting for opponent…":(allPlaced()?"Fleet ready — press Ready":"Place your ships"),
    oppHere?"":"Share room <code>"+room+"</code> so your opponent can join.");
}
function renderPlay(){
  persistLocal();
  $("setup").style.display="none"; $("play").style.display="flex";
  $("enemy").className="grid"+(turn===role&&!over?" fire":"");
  grid($("enemy"),enemy,false,(r,c)=>fire(r,c));
  grid($("ownSmall"),own,true,null);
  if(over) setStatus(over===role?"You win! 🎉":"You lost.","");
  else setStatus(turn===role?"Your turn — fire!":(AI?"Computer firing…":"Opponent's turn…"));
  if(over && !AI && !recorded){ recorded=true; recordResult("battleship", over===role?"win":"loss"); }
  $("rematch").style.display=over?"":"none";
}

// ---------- battle ----------
function bothReady(){ if(myReady&&oppReady&&phase==="setup"){ phase="play"; turn="host"; enemy=empty(); renderPlay(); } }
function fire(r,c){
  if(over||turn!==role||phase!=="play") return;
  if(enemy[r][c]===2||enemy[r][c]===3) return;
  if(AI){
    const hit = aiBoard[r][c]===1 || aiBoard[r][c]===2;
    if(aiBoard[r][c]===1) aiBoard[r][c]=2;
    enemy[r][c]=hit?2:3;
    if(!aiBoard.flat().some(v=>v===1)){ over=role; renderPlay(); return; }   // sank them all
    turn=other; renderPlay();
    setTimeout(aiFire, 650);
    return;
  }
  turn=other;
  ch.send({type:"broadcast",event:"fire",payload:{r,c}});
  renderPlay();
}

// ---------- computer opponent (AI mode) ----------
function fitsOn(b,r,c,len,o){
  for(let k=0;k<len;k++){ const rr=r+(o==="v"?k:0), cc=c+(o==="h"?k:0);
    if(rr<0||rr>=N||cc<0||cc>=N||b[rr][cc]!==0) return false; }
  return true;
}
function aiPlace(){
  aiBoard=empty(); aiHunt=[];
  for(const len of SHIPS){ let ok=false,t=0;
    while(!ok&&t++<800){ const o=Math.random()<.5?"h":"v";
      const r=Math.floor(Math.random()*N), c=Math.floor(Math.random()*N);
      if(fitsOn(aiBoard,r,c,len,o)){ for(let k=0;k<len;k++){const rr=r+(o==="v"?k:0),cc=c+(o==="h"?k:0); aiBoard[rr][cc]=1;} ok=true; } } }
}
const aiTried=(r,c)=> own[r][c]===2 || own[r][c]===3;   // computer already fired here
function aiPickTarget(){
  if(difficulty!=="easy"){ while(aiHunt.length){ const [r,c]=aiHunt.pop(); if(!aiTried(r,c)) return [r,c]; } }  // normal/hard chase a hit; easy doesn't
  const par=[], any=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(!aiTried(r,c)){ any.push([r,c]); if((r+c)%2===0) par.push([r,c]); }
  const pool=(difficulty==="hard"&&par.length)?par:any;   // only hard uses the checkerboard parity hunt
  return pool[Math.floor(Math.random()*pool.length)];
}
function aiFire(){
  if(over) return;
  const [r,c]=aiPickTarget();
  const hit = own[r][c]===1;
  own[r][c]= hit?2:3;
  if(hit){ for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){ const rr=r+dr, cc=c+dc;
    if(rr>=0&&rr<N&&cc>=0&&cc<N&&!aiTried(rr,cc)) aiHunt.push([rr,cc]); } }
  if(!own.flat().some(v=>v===1)){ over=other; renderPlay(); return; }   // computer wins
  turn=role; renderPlay();
}
function onFire(r,c){
  const hitShip=own[r][c]===1||own[r][c]===2;
  own[r][c]=hitShip?2:3;
  const lost=!own.flat().some(v=>v===1);
  ch.send({type:"broadcast",event:"result",payload:{r,c,hit:hitShip,lost}});
  if(lost) over=other;
  turn=role;
  renderPlay();
}
function onResult(r,c,hit,lost){ enemy[r][c]=hit?2:3; if(lost) over=role; renderPlay(); }

if(AI){
  document.querySelector(".bar h1").textContent="🚢 Battleship — vs Computer";
  GC.mountDifficulty(()=>difficulty,(d)=>{difficulty=d;});
  clearAll(); phase="setup"; oppHere=true; renderSetup();
} else {
  ch=GC.createChannel("bs");
  ch.on("broadcast",{event:"ready"},()=>{ oppReady=true; bothReady(); if(phase==="setup")renderSetup(); })
    .on("broadcast",{event:"fire"},({payload})=>{ if(phase==="play") onFire(payload.r,payload.c); })
    .on("broadcast",{event:"result"},({payload})=>onResult(payload.r,payload.c,payload.hit,payload.lost))
    .on("broadcast",{event:"reset"},()=>resetGame(false));
  if(!restoreLocal()){ phase="setup"; }        // refresh mid-game restores our fleet
  if(phase==="play"||over) renderPlay(); else renderSetup();
  GC.joinRoom(ch,{
    // Only the shared facts travel; each side's fleet stays local.
    getState:()=>({turn,over,phase,iAmReady:myReady}),
    setState:(p)=>{
      oppReady=p.iAmReady; turn=p.turn; over=p.over;
      if(p.phase==="play"&&myReady&&phase==="setup"){ phase="play"; enemy=enemy||empty(); }
      if(phase==="play"||over) renderPlay(); else renderSetup();
    },
    isStarted:()=>myReady||phase!=="setup"||!!over,
    onPeers:(here)=>{
      oppHere=here;
      if(oppHere&&myReady&&phase==="setup") ch.send({type:"broadcast",event:"ready",payload:{}}); // re-announce for late joiners
      if(phase==="setup") renderSetup();
    },
    onSeatTaken:()=>setStatus("Seat already taken",`This room already has a ${role} — join with the other role or start a new room.`),
  });
}

$("orientH").onclick=()=>{ orient="h"; renderSetup(); };
$("orientV").onclick=()=>{ orient="v"; renderSetup(); };
$("shuffle").onclick=()=>{ if(!myReady) shuffle(); };
$("clear").onclick=()=>{ if(!myReady) clearAll(); };
$("ready").onclick=()=>{ if(myReady||!allPlaced())return; myReady=true;
  if(AI){ aiPlace(); oppReady=true; renderSetup(); bothReady(); return; }
  ch.send({type:"broadcast",event:"ready",payload:{}}); renderSetup(); bothReady(); };
function resetGame(send){ over=false; recorded=false; myReady=false; oppReady=false; phase="setup"; turn="host"; clearLocal(); clearAll(); enemy=empty(); aiBoard=null; aiHunt=[]; renderSetup(); if(send&&!AI) ch.send({type:"broadcast",event:"reset",payload:{}}); }
$("rematch").onclick=()=>resetGame(true);
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
