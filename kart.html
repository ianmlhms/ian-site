<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KartTracker — Session</title>
<meta name="description" content="A karting session recorded with Ian's KartTracker app.">
<meta property="og:title" content="KartTracker session">
<meta property="og:description" content="Lap times, consistency and the driven racing line.">
<script src="theme.js?v=5"></script>
<style>
  :root{
    --bg:#0d0d1a; --card:#161625; --card2:#1e1e35; --border:#2a2a4a;
    --text:#e8e8f0; --muted:#8888aa; --accent:#6ea8fe; --accent2:#4de8ff;
    --best:#3fb950; --hr:#ff6b9d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 70px}
  .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
  h1{font-size:22px;margin:0}
  .date{color:var(--muted);font-size:13px}
  .home{color:var(--muted);font-weight:700;font-size:13px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:18px 0 8px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .kpi .v{font-size:22px;font-weight:800;line-height:1.1}
  .kpi .l{color:var(--muted);font-size:12px;margin-top:3px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:30px 0 12px;font-weight:600}
  .laps{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .lap{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
  .lap .n{color:var(--muted);font-size:12px;width:34px;flex:none}
  .lap .t{font-weight:700;font-variant-numeric:tabular-nums}
  .lap .d{margin-left:auto;font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .lap.best{border-color:var(--best)}
  .lap.best .t{color:var(--best)}
  .lap.best .d{color:var(--best)}
  #map{width:100%;height:300px;background:var(--card);border:1px solid var(--border);border-radius:14px;display:block}
  .maplegend{display:flex;gap:14px;align-items:center;color:var(--muted);font-size:12px;margin-top:8px}
  .maplegend .bar{width:90px;height:8px;border-radius:4px;background:linear-gradient(90deg,#3a4a6a,var(--accent2))}
  .state{color:var(--muted);padding:50px 8px;text-align:center}
  footer{margin-top:36px;color:var(--muted);font-size:12px;text-align:center}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--muted)}
</style>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:8px"><a class="home" href="index.html">‹ ian.lu</a></div>
  <div id="content"><div class="state" id="state">Loading session…</div></div>
</div>

<script src="pixelbreak-config.js"></script>
<script>
const cfg = window.PB_CONFIG || {};
const $ = (id) => document.getElementById(id);
const esc = (s) => (""+(s??"")).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ---- formatting ----
function fmtLap(s){
  if(s==null||isNaN(s)) return "—";
  const m=Math.floor(s/60), rest=s-m*60;
  const ss=rest.toFixed(3);
  return m>0 ? `${m}:${rest<10?"0":""}${ss}` : ss;
}
function fmtDelta(d){ if(d==null) return ""; if(d===0) return "best"; return "+"+d.toFixed(3); }
function fmtDate(iso){ const d=new Date(iso); return isNaN(d)?"":d.toLocaleDateString([], {weekday:"short",day:"numeric",month:"short",year:"numeric"}) + " · " + d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }

function stats(lapTimes){
  const laps = (lapTimes||[]).filter(x=>typeof x==="number"&&x>0);
  if(!laps.length) return {laps:[], best:null, avg:null, sd:null};
  const best = Math.min(...laps);
  const avg = laps.reduce((a,b)=>a+b,0)/laps.length;
  const sd = laps.length>=2 ? Math.sqrt(laps.reduce((a,b)=>a+(b-avg)*(b-avg),0)/laps.length) : null;
  return {laps, best, avg, sd};
}

// ---- track map (equirectangular, speed-coloured) ----
function drawMap(canvas, track){
  const pts = (track||[]).filter(p=>typeof p.lat==="number"&&typeof p.lon==="number");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio||1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(pts.length<2){ ctx.fillStyle="#8888aa"; ctx.font="13px system-ui"; ctx.textAlign="center"; ctx.fillText("No GPS track for this session.", W/2, H/2); return false; }

  const lat0 = pts.reduce((a,p)=>a+p.lat,0)/pts.length;
  const k = Math.cos(lat0*Math.PI/180);
  const xs = pts.map(p=>p.lon*k), ys = pts.map(p=>p.lat);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const pad=22, spanX=(maxX-minX)||1e-6, spanY=(maxY-minY)||1e-6;
  const scale = Math.min((W-2*pad)/spanX, (H-2*pad)/spanY);
  const ox = (W-spanX*scale)/2, oy=(H-spanY*scale)/2;
  const X = x => ox + (x-minX)*scale;
  const Y = y => H - (oy + (y-minY)*scale);   // flip so north is up
  const maxSpd = Math.max(0.001, ...pts.map(p=>p.speed||0));

  ctx.lineWidth = 3.5; ctx.lineJoin="round"; ctx.lineCap="round";
  for(let i=1;i<pts.length;i++){
    const f = Math.min(1,(pts[i].speed||0)/maxSpd);
    // slow = dim blue, fast = cyan
    const r=Math.round(58+f*(77-58)), g=Math.round(74+f*(232-74)), b=Math.round(106+f*(234-106));
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath(); ctx.moveTo(X(xs[i-1]),Y(ys[i-1])); ctx.lineTo(X(xs[i]),Y(ys[i])); ctx.stroke();
  }
  // start marker
  ctx.fillStyle="#3fb950"; ctx.beginPath(); ctx.arc(X(xs[0]),Y(ys[0]),5,0,7); ctx.fill();
  return true;
}

async function boot(){
  const id = new URLSearchParams(location.search).get("s");
  if(!id){ $("state").textContent="No session id. Open a shared KartTracker link (…/kart.html?s=…)."; return; }
  if(!cfg.url||!cfg.anonKey){ $("state").textContent="Cloud not configured."; return; }
  let row;
  try{
    // kart_get() is the only read path — sessions are unlisted, the UUID is the key.
    const r = await fetch(`${cfg.url}/rest/v1/rpc/kart_get`, {
      method:"POST", cache:"no-store",
      headers:{ apikey:cfg.anonKey, Authorization:"Bearer "+cfg.anonKey, "Content-Type":"application/json" },
      body: JSON.stringify({ p_id: id }),
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    row = await r.json();
    if(!row){ $("state").textContent="Session not found (it may have been removed)."; return; }
  }catch(e){ $("state").textContent="Could not load session ("+e+")."; return; }

  const s = stats(row.lapTimes);
  const topKmh = Math.max(0, ...(row.track||[]).map(p=>(p.speed||0)*3.6));
  const name = row.trackName || "Karting session";
  const kpis = [
    {v:fmtLap(s.best), l:"Best lap", c:"var(--best)"},
    {v:fmtLap(s.avg), l:"Average lap"},
    {v:s.laps.length, l:"Laps"},
    {v:s.sd!=null?"±"+s.sd.toFixed(2)+"s":"—", l:"Consistency"},
    {v:topKmh>0?topKmh.toFixed(0)+" km/h":"—", l:"Top speed"},
    {v:row.maxHeartRate>0?Math.round(row.maxHeartRate)+" bpm":"—", l:"Max HR", c:"var(--hr)"},
  ];
  const lapHtml = s.laps.map((t,i)=>{
    const best = t===s.best;
    return `<div class="lap${best?" best":""}"><span class="n">L${i+1}</span><span class="t">${fmtLap(t)}</span><span class="d">${fmtDelta(best?0:t-s.best)}</span></div>`;
  }).join("");

  $("content").innerHTML = `
    <div class="top"><h1>🏎️ ${esc(name)}</h1></div>
    <div class="date">${esc(fmtDate(row.date))} ${row.avgHeartRate>0?`· <span class="pill">avg ${Math.round(row.avgHeartRate)} bpm</span>`:""}</div>
    <div class="kpis">${kpis.map(k=>`<div class="kpi"><div class="v" style="color:${k.c||"var(--text)"}">${k.v}</div><div class="l">${esc(k.l)}</div></div>`).join("")}</div>
    <h2>Racing line</h2>
    <canvas id="map"></canvas>
    <div class="maplegend"><span>slow</span><span class="bar"></span><span>fast</span></div>
    <h2>Lap times</h2>
    <div class="laps">${lapHtml || '<span class="state">No laps recorded.</span>'}</div>
    <footer>Recorded with <b>KartTracker</b> · <a href="index.html">ian.lu</a></footer>`;

  const canvas = $("map");
  if(canvas){ drawMap(canvas, row.track); window.addEventListener("resize", ()=>drawMap(canvas, row.track)); }
}
boot();
</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="rtc-ring.js?v=1"></script>
</body>
</html>
