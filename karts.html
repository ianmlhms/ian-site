<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KartTracker — All sessions</title>
<script src="theme.js?v=7"></script>
<script src="i18n-dict.js?v=17"></script>
<script src="i18n.js?v=1"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--best:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 80px}
  .state{color:var(--muted);text-align:center;padding:50px 20px}
  .auth-go{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-weight:800;cursor:pointer;margin-top:12px}
  .sumline{color:var(--muted);font-size:13px;margin-bottom:14px}
  .sess{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px}
  .sess .info{flex:1;min-width:0}
  .sess .name{font-weight:800;font-size:15px}
  .sess .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .sess .best{color:var(--best);font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .sess .best small{display:block;color:var(--muted);font-weight:600;font-size:11px;text-align:right}
  .act{display:flex;gap:8px;flex:none}
  .mini{border:1px solid var(--border);background:var(--card2);color:var(--text);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none}
  .mini:hover{border-color:var(--accent2);color:var(--accent2)}
  .mini.x{color:var(--muted)} .mini.x:hover{color:#ff6b6b;border-color:#ff6b6b}
</style>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script data-goatcounter="https://ianm.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html" data-i18n="nav.home">‹ Home</a>
  <h1 data-i18n="karts.h1">🏎️ KartTracker — All sessions</h1>
  <div class="spacer"></div>
  <span id="langSw"></span>
  <span id="acctHost"></span>
</header>

<div class="wrap">
  <div id="state" class="state" data-i18n="common.loading">Loading…</div>
  <div id="list"></div>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { client, session, onAuth, mountAccountButton, openAuthModal } from "./auth.js?v=4";

const T = (k) => (window.I18N ? window.I18N.t(k) : k);
const $ = (id) => document.getElementById(id);
const esc = (s) => (""+(s??"")).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb = null;

function fmtLap(s){ if(s==null||isNaN(s)) return "—"; const m=Math.floor(s/60), r=s-m*60; const ss=r.toFixed(3); return m>0?`${m}:${r<10?"0":""}${ss}`:ss; }
function fmtDate(iso){ const d=new Date(iso); return isNaN(d)?"":d.toLocaleDateString([], {weekday:"short",day:"numeric",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
function bestOf(laps){ const v=(laps||[]).filter(x=>typeof x==="number"&&x>0); return v.length?Math.min(...v):null; }
function topKmh(track){ return Math.max(0, ...(track||[]).map(p=>(p.speed||0)*3.6)); }

async function load(){
  const { data, error } = await sb.rpc("kart_list");   // admin-gated (kart_sessions has no public SELECT)
  if(error){ $("state").textContent = T("karts.loadErr")+": "+error.message; return; }
  const rows = data || [];
  if(!rows.length){ $("state").textContent = T("karts.none"); $("list").innerHTML=""; return; }
  $("state").textContent = "";
  $("state").innerHTML = `<div class="sumline">${rows.length} ${rows.length>1?T("karts.sessions"):T("karts.session")} · ${T("karts.newest")}</div>`;
  $("list").innerHTML = rows.map(r=>{
    const p = r.payload || {};
    const best = bestOf(p.lapTimes);
    const laps = (p.lapTimes||[]).filter(x=>typeof x==="number"&&x>0).length;
    const tk = topKmh(p.track);
    return `<div class="sess" data-id="${esc(r.id)}">
      <div class="info">
        <div class="name">${esc(p.trackName || T("karts.session.title"))}</div>
        <div class="sub">${esc(fmtDate(p.date || r.created_at))} · ${laps} ${laps===1?T("karts.lap"):T("karts.laps")}${tk>0?` · ${T("karts.top")} ${tk.toFixed(0)} km/h`:""}</div>
      </div>
      <div class="best">${fmtLap(best)}<small>${T("karts.bestLap")}</small></div>
      <div class="act">
        <a class="mini" href="kart.html?s=${encodeURIComponent(r.id)}" target="_blank" rel="noopener">${T("karts.view")}</a>
        <button class="mini x" data-del="${esc(r.id)}">${T("karts.delete")}</button>
      </div>
    </div>`;
  }).join("");
  $("list").querySelectorAll("[data-del]").forEach(b=> b.onclick = async () => {
    if(!confirm(T("karts.delConfirm"))) return;
    b.disabled = true; b.textContent = "…";
    const { error } = await sb.rpc("kart_delete", { p_id: b.dataset.del });
    if(error){ alert(T("karts.delFailed")+": "+error.message); b.disabled=false; b.textContent=T("karts.delete"); return; }
    load();
  });
}

async function render(){
  const s = session();
  if(!s){
    $("list").innerHTML = "";
    $("state").innerHTML = `<div>${T("karts.gate")}</div><button class="auth-go" id="gateBtn">${T("auth.signinShort")}</button>`;
    $("gateBtn").onclick = openAuthModal;
    return;
  }
  let admin = false;
  try { const { data } = await sb.rpc("is_admin"); admin = !!data; } catch {}
  if(!admin){ $("list").innerHTML=""; $("state").textContent = T("karts.private"); return; }
  load();
}

(async function boot(){
  mountAccountButton($("acctHost"));
  sb = await client();
  onAuth(() => render());
  render();
  document.addEventListener("i18n:change", () => { if (sb) render(); });
})();
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=2"></script>
</body>
</html>
