<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Molerei — ian.lu</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="theme.js?v=3"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--good:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:17px;margin:0}.bar .spacer{flex:1}
  .bar code{background:var(--card2);padding:2px 8px;border-radius:6px;color:var(--accent2)}
  .wrap{max-width:560px;margin:0 auto;padding:14px 12px 40px}
  .scores{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .pchip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:13px}
  .pchip.draw{border-color:var(--accent);color:var(--accent)}
  .pchip.got{border-color:var(--good);color:var(--good)}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;min-height:26px}
  .topbar .word{font-weight:800;letter-spacing:3px;font-size:20px;flex:1;text-align:center}
  .topbar .timer{font-weight:800;color:var(--accent2)}
  .topbar .rnd{color:var(--muted);font-size:13px}
  canvas{width:100%;aspect-ratio:1;background:#fff;border-radius:12px;border:1px solid var(--border);touch-action:none;cursor:crosshair;display:block}
  .tools{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:8px 0}
  .sw{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer}
  .sw.on{border-color:var(--accent2)}
  .tools .sz{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .tools .sz.on{border-color:var(--accent2)}
  .tools .clr{margin-left:auto;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700}
  .big{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;margin-top:6px}
  .big:disabled{opacity:.45;cursor:default}
  .choices{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:6px 0}
  .choices button{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 16px;font-weight:800;cursor:pointer;font-size:15px}
  .choices button:hover{border-color:var(--accent)}
  .log{height:130px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13.5px;margin:8px 0;display:flex;flex-direction:column;gap:3px}
  .log .sys{color:var(--good);font-weight:700}
  .log .g b{color:var(--accent2)}
  .guessrow{display:flex;gap:8px}
  .guessrow input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:22px;padding:11px 15px;font-size:14px;outline:none}
  .guessrow input:focus{border-color:var(--accent2)}
  .guessrow button{background:var(--accent);color:#fff;border:none;border-radius:22px;padding:0 18px;font-weight:800;cursor:pointer}
  .muted{color:var(--muted)}.center{text-align:center}
  .win{background:linear-gradient(90deg,rgba(110,168,254,.2),transparent);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:18px;font-weight:800;text-align:center;margin-bottom:10px}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="games.html">‹ Games</a>
  <h1>🎨 Molerei</h1>
  <div class="spacer"></div>
  <span class="muted">room <code id="roomc"></code></span>
</header>
<div class="wrap" id="app"><p class="muted">Connecting…</p></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="notify-ambient.js?v=2"></script>
<script>
const WORDS = ["HAUS","BAUM","AUTO","HUND","KATZE","SONNE","MOND","STERN","BLUME","FISCH","VOGEL","APFEL","BANANE","PIZZA","BURG","SCHIFF","ZUG","FLUGZEUG","RAKETE","ROBOTER","BRILLE","SCHUH","HUT","UHR","HERZ","SCHLANGE","ELEFANT","GIRAFFE","KROKODIL","PINGUIN","SCHMETTERLING","REGENBOGEN","WOLKE","BERG","BRÜCKE","GITARRE","FUSSBALL","KRONE","DRACHE","GESPENST","SCHNEEMANN","KAKTUS","LEUCHTTURM","AMPEL","FAHRRAD","EISBÄR","KERZE","TASSE","LÖFFEL","SCHLÜSSEL"];
const LAPS = 2, TURN_SECS = 75, COLORS = ["#000000","#e53527","#1d72e8","#2ca02c","#ffcc00","#8b5a2b","#ff7ac0","#ffffff"];
const params = new URLSearchParams(location.search);
const room = (params.get("room")||"demo").toLowerCase();
const role = params.get("role")==="guest" ? "guest" : "host";
const cid = Math.random().toString(36).slice(2,10);
document.getElementById("roomc").textContent = room;
const cfg = window.PB_CONFIG;
const sb = supabase.createClient(cfg.url.replace(/\/$/,""), cfg.anonKey, { auth:{ persistSession:false, autoRefreshToken:false } });
const ch = sb.channel("draw:"+room, { config:{ broadcast:{self:false}, presence:{key:cid} }});
const $ = (id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let name="Player", phase="lobby", drawerCid=null, round=0, totalTurns=0;
let scores={}, order=[], word="", mask="", roundEnd=0, guessed=new Set(), logLines=[];
let endTimer=null, tick=null;
const me=()=>cid, isDrawer=()=>drawerCid===cid;
const norm=(s)=> s.toLowerCase().replace(/[^a-zäöüß]/g,"");

function players(){ const st=ch.presenceState(); return Object.keys(st).map(k=>({cid:k,name:(st[k][0]||{}).name||"?"})); }
async function getName(){ let n=localStorage.getItem("playerName"); if(!n){ try{ n=window.__pbAuth?.session?.user?.user_metadata?.username; }catch{} } if(!n){ n=(prompt("Your name:")||"Player").slice(0,16);} localStorage.setItem("playerName",n); return n; }

/* ---------- render ---------- */
function render(){
  const ps=players();
  let html = `<div class="scores">${ps.map(p=>`<span class="pchip ${p.cid===drawerCid?"draw":""} ${guessed.has(p.cid)?"got":""}">${p.cid===drawerCid?"✏️ ":""}${esc(p.name)} · ${scores[p.cid]||0}${guessed.has(p.cid)?" ✓":""}</span>`).join("")}</div>`;
  if(phase==="lobby"){
    html += `<p class="muted center">One player draws a secret word, everyone else races to guess it in the chat. Most points after ${LAPS} laps wins.</p>`;
    html += role==="host" ? `<button class="big" id="startBtn" ${ps.length<2?"disabled":""}>${ps.length<2?"Waiting for players…":"Start game"}</button>`
                          : `<p class="center muted">Waiting for the host…</p>`;
    $("app").innerHTML=html; if(role==="host"&&$("startBtn")) $("startBtn").onclick=start; return;
  }
  if(phase==="final"){
    const sorted=[...ps].sort((a,b)=>(scores[b.cid]||0)-(scores[a.cid]||0));
    const top=sorted[0];
    html = `<div class="win">🏆 ${top?esc(top.name)+(top.cid===cid?" (you)":""):"-"} wins!</div>`+html;
    html += role==="host" ? `<button class="big" id="againBtn">Play again</button>` : `<p class="center muted">Waiting for host…</p>`;
    $("app").innerHTML=html; if(role==="host") $("againBtn").onclick=()=>{ ch.send({type:"broadcast",event:"reset",payload:{}}); resetAll(); render(); }; return;
  }
  // choosing / drawing / reveal
  const secsLeft = Math.max(0, Math.ceil((roundEnd-Date.now())/1000));
  html += `<div class="topbar"><span class="rnd">Turn ${round}/${totalTurns}</span><span class="word" id="wordEl">${phase==="drawing"?(isDrawer()?esc(word):mask):""}</span><span class="timer" id="timerEl">${phase==="drawing"?secsLeft+"s":""}</span></div>`;
  html += `<canvas id="cv" width="600" height="600"></canvas>`;
  if(phase==="choosing"){
    html += isDrawer()
      ? `<p class="center muted">Pick a word to draw:</p><div class="choices" id="choices"></div>`
      : `<p class="center muted">✏️ ${esc((ps.find(p=>p.cid===drawerCid)||{}).name||"Someone")} is choosing a word…</p>`;
  } else if(phase==="drawing" && isDrawer()){
    html += `<div class="tools" id="tools"></div>`;
  }
  html += `<div class="log" id="log"></div>`;
  if(!isDrawer()) html += `<div class="guessrow"><input id="guessIn" placeholder="Type your guess…" autocomplete="off" maxlength="40"><button id="guessBtn">Guess</button></div>`;
  $("app").innerHTML=html;
  setupCanvas();
  renderLog();
  if(phase==="choosing" && isDrawer()) renderChoices();
  if(phase==="drawing" && isDrawer()) renderTools();
  if(!isDrawer() && $("guessIn")){ const send=()=>sendGuess(); $("guessBtn").onclick=send; $("guessIn").onkeydown=(e)=>{ if(e.key==="Enter") send(); }; }
}
function renderLog(){ const l=$("log"); if(!l) return; l.innerHTML=logLines.map(x=> x.sys?`<div class="sys">${esc(x.t)}</div>`:`<div class="g"><b>${esc(x.n)}:</b> ${esc(x.t)}</div>`).join(""); l.scrollTop=l.scrollHeight; }
// Update just the score chips (so we never rebuild — and wipe — the canvas mid-round).
function renderScores(){ const el=document.querySelector(".scores"); if(!el) return; const ps=players(); el.innerHTML=ps.map(p=>`<span class="pchip ${p.cid===drawerCid?"draw":""} ${guessed.has(p.cid)?"got":""}">${p.cid===drawerCid?"✏️ ":""}${esc(p.name)} · ${scores[p.cid]||0}${guessed.has(p.cid)?" ✓":""}</span>`).join(""); }
function addLog(x){ logLines.push(x); if(logLines.length>60) logLines.shift(); renderLog(); }

/* ---------- canvas ---------- */
let ctx=null, drawing=false, last=null, curColor="#000000", curSize=6, sendBuf=[];
function setupCanvas(){
  const cv=$("cv"); if(!cv) return; ctx=cv.getContext("2d");
  ctx.lineCap="round"; ctx.lineJoin="round"; ctx.fillStyle="#fff"; ctx.fillRect(0,0,600,600);
  if(phase!=="drawing" || !isDrawer()) return;
  const pos=(e)=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)/r.width, y:(t.clientY-r.top)/r.height}; };
  const down=(e)=>{ e.preventDefault(); drawing=true; last=pos(e); };
  const move=(e)=>{ if(!drawing) return; e.preventDefault(); const p=pos(e); seg(last.x,last.y,p.x,p.y,curColor,curSize); sendBuf.push([last.x,last.y,p.x,p.y]); last=p; };
  const up=()=>{ drawing=false; last=null; flush(); };
  cv.onpointerdown=down; cv.onpointermove=move; cv.onpointerup=up; cv.onpointerleave=up;
}
function seg(x0,y0,x1,y1,color,size){ if(!ctx) return; ctx.strokeStyle=color; ctx.lineWidth=size; ctx.beginPath(); ctx.moveTo(x0*600,y0*600); ctx.lineTo(x1*600,y1*600); ctx.stroke(); }
function flush(){ if(sendBuf.length){ ch.send({type:"broadcast",event:"seg",payload:{a:sendBuf,c:curColor,w:curSize}}); sendBuf=[]; } }
setInterval(()=>{ if(isDrawer()) flush(); }, 60);
function renderTools(){
  const t=$("tools"); t.innerHTML = COLORS.map(c=>`<span class="sw ${c===curColor?"on":""}" data-c="${c}" style="background:${c}"></span>`).join("")
    + [3,7,16].map(s=>`<button class="sz ${s===curSize?"on":""}" data-s="${s}"><span style="width:${s}px;height:${s}px;border-radius:50%;background:var(--text);display:block"></span></button>`).join("")
    + `<button class="clr" id="clrBtn">🗑 Clear</button>`;
  t.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{ curColor=b.dataset.c; renderTools(); });
  t.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{ curSize=+b.dataset.s; renderTools(); });
  $("clrBtn").onclick=()=>{ clearCanvas(); ch.send({type:"broadcast",event:"clear",payload:{}}); };
}
function clearCanvas(){ if(ctx){ ctx.fillStyle="#fff"; ctx.fillRect(0,0,600,600); } }

/* ---------- host game logic ---------- */
function start(){ const ps=players(); order=ps.map(p=>p.cid); scores={}; ps.forEach(p=>scores[p.cid]=0); round=0; totalTurns=order.length*LAPS; nextTurn(); }
function nextTurn(){
  round++;
  if(round>totalTurns){ phase="final"; ch.send({type:"broadcast",event:"final",payload:{scores}}); render(); return; }
  drawerCid=order[(round-1)%order.length]; guessed=new Set(); word=""; mask="";
  const choices=[]; while(choices.length<3){ const w=WORDS[Math.floor(Math.random()*WORDS.length)]; if(!choices.includes(w)) choices.push(w); }
  phase="choosing";
  ch.send({type:"broadcast",event:"turn",payload:{round,totalTurns,drawerCid,scores,order,choices}});
  applyTurn({round,totalTurns,drawerCid,scores,choices});
}
function hostPick(w){ word=w; mask=w.replace(/[A-ZÄÖÜß]/g,"_ ").trim(); roundEnd=Date.now()+TURN_SECS*1000; phase="drawing";
  ch.send({type:"broadcast",event:"start",payload:{drawerCid,mask,roundEnd,word_len:w.length}});
  applyStart({drawerCid,mask,roundEnd});
  clearTimeout(endTimer); endTimer=setTimeout(endTurn, TURN_SECS*1000);
}
function hostGuess(g){
  if(phase!=="drawing"||g.cid===drawerCid||guessed.has(g.cid)) { return; }
  if(norm(g.text)===norm(word)){
    guessed.add(g.cid);
    const secs=Math.max(0,Math.ceil((roundEnd-Date.now())/1000));
    scores[g.cid]=(scores[g.cid]||0)+30+secs; scores[drawerCid]=(scores[drawerCid]||0)+20;
    ch.send({type:"broadcast",event:"correct",payload:{cid:g.cid,name:g.name,scores,guessed:[...guessed]}});
    applyCorrect({cid:g.cid,name:g.name,scores,guessed:[...guessed]});
    const guessers=players().filter(p=>p.cid!==drawerCid);
    if(guessers.every(p=>guessed.has(p.cid))) endTurn();
  } else {
    ch.send({type:"broadcast",event:"chat",payload:{n:g.name,t:g.text}});
    addLog({n:g.name,t:g.text});
  }
}
function endTurn(){ clearTimeout(endTimer); if(phase==="reveal"||phase==="final"||phase==="lobby") return; phase="reveal";
  ch.send({type:"broadcast",event:"reveal",payload:{word,scores}}); applyReveal({word,scores});
  setTimeout(()=>{ if(role==="host") nextTurn(); }, 4500);
}

/* ---------- apply (all clients) ---------- */
function applyTurn(p){ round=p.round; totalTurns=p.totalTurns; drawerCid=p.drawerCid; scores=p.scores; if(p.order)order=p.order; guessed=new Set(); word=""; mask=""; phase="choosing"; clearTimeout(tick);
  window._choices = (drawerCid===cid && p.choices) ? p.choices : null;
  render();
}
function applyStart(p){ drawerCid=p.drawerCid; mask=p.mask; roundEnd=p.roundEnd; phase="drawing"; render(); startTick(); }
function applyCorrect(p){ scores=p.scores; guessed=new Set(p.guessed); addLog({sys:true,t:`✅ ${p.name} guessed the word!`}); renderScores(); }
function applyReveal(p){ word=p.word; scores=p.scores; phase="reveal"; clearTimeout(tick); addLog({sys:true,t:`The word was: ${p.word}`}); render(); }
function startTick(){ clearTimeout(tick); const step=()=>{ const el=$("timerEl"); if(!el||phase!=="drawing") return; const s=Math.max(0,Math.ceil((roundEnd-Date.now())/1000)); el.textContent=s+"s"; if(s>0) tick=setTimeout(step,500); }; step(); }
function resetAll(){ phase="lobby"; drawerCid=null; round=0; totalTurns=0; scores={}; guessed=new Set(); word=""; mask=""; logLines=[]; }
function bcastState(){ /* final uses scores already broadcast */ }

/* ---------- guesser ---------- */
function sendGuess(){ const inp=$("guessIn"); const t=(inp.value||"").trim(); if(!t) return; inp.value="";
  if(role==="host") hostGuess({cid,name,text:t});
  else { addLog({n:name,t}); ch.send({type:"broadcast",event:"guess",payload:{cid,name,text:t}}); }
}
function renderChoices(){ const c=$("choices"); const choices=window._choices||[]; c.innerHTML=choices.map(w=>`<button data-w="${w}">${w}</button>`).join("");
  c.querySelectorAll("[data-w]").forEach(b=>b.onclick=()=>{ if(role==="host") hostPick(b.dataset.w); else ch.send({type:"broadcast",event:"pick",payload:{word:b.dataset.w}}); }); }

/* ---------- wire ---------- */
ch.on("broadcast",{event:"turn"},({payload})=>applyTurn(payload))
  .on("broadcast",{event:"start"},({payload})=>applyStart(payload))
  .on("broadcast",{event:"correct"},({payload})=>applyCorrect(payload))
  .on("broadcast",{event:"chat"},({payload})=>addLog({n:payload.n,t:payload.t}))
  .on("broadcast",{event:"reveal"},({payload})=>applyReveal(payload))
  .on("broadcast",{event:"final"},({payload})=>{ scores=payload.scores; phase="final"; clearTimeout(tick); render(); })
  .on("broadcast",{event:"reset"},()=>{ resetAll(); render(); })
  .on("broadcast",{event:"seg"},({payload})=>{ if(isDrawer())return; payload.a.forEach(s=>seg(s[0],s[1],s[2],s[3],payload.c,payload.w)); })
  .on("broadcast",{event:"clear"},()=>clearCanvas())
  .on("broadcast",{event:"pick"},({payload})=>{ if(role==="host"&&phase==="choosing"&&isDrawerHost()) hostPick(payload.word); })
  .on("broadcast",{event:"guess"},({payload})=>{ if(role==="host") hostGuess(payload); })
  .on("presence",{event:"sync"},()=>{ if(phase==="lobby"||phase==="final") render(); })
  .subscribe(async (s)=>{ if(s==="SUBSCRIBED"){ name=await getName(); await ch.track({name}); render(); }});
function isDrawerHost(){ return true; } // host validates picks regardless
</script>
</body>
</html>
