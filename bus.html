<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bussen — ian.lu</title>
<meta name="description" content="Déi nächst Bussen an Zich zu Lëtzebuerg — live Departuren.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=6"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--ok:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:620px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
  .muted{color:var(--muted);font-size:13px}
  .card h3{margin:0 0 12px;font-size:16px}
  #tprow{display:flex;gap:8px;margin-bottom:4px}
  #stopq{flex:1;min-width:0;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px}
  .tpbtn{flex:none;padding:10px 13px;border-radius:10px;border:1px solid var(--accent2);background:var(--accent2);color:#06121a;font-size:15px;font-weight:700;cursor:pointer}
  .tpbtn:hover{filter:brightness(1.05)}
  .tpbtn:disabled{opacity:.55;cursor:default}
  #linerow{display:flex;gap:8px}
  #lineq{flex:1;min-width:0;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px}
  .linex{flex:none;padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:15px;cursor:pointer}
  .linex:hover{border-color:var(--accent2);color:var(--text)}
  #stops .st{display:flex;justify-content:space-between;gap:8px;padding:12px 12px;border:1px solid var(--border);border-radius:9px;margin-top:6px;cursor:pointer;font-size:15px}
  #stops .st:hover{border-color:var(--accent2)}
  #stops .st .dist{color:var(--muted);font-size:12px;flex:none}
  #recents{margin-bottom:2px}
  .rectitle{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:2px 0 7px}
  .recchips{display:flex;flex-wrap:wrap;gap:7px}
  .recchip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:18px;padding:8px 14px;font-size:13.5px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .recchip:hover{border-color:var(--accent2)}
  .dep{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border)}
  .dep:last-child{border-bottom:none}
  .dep .line{flex:none;min-width:44px;text-align:center;font-weight:800;font-size:13px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:3px 6px}
  .dep .dir{flex:1;min-width:0;display:flex;flex-direction:column;font-size:13.5px}
  .dep .dir .dname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dep .dir .sub{color:var(--muted);font-size:11.5px;margin-top:1px}
  .dep .dir .q{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:0 5px;color:var(--accent2)}
  .dep .time{flex:none;font-weight:700;font-size:14px;text-align:right}
  .dep .time em{color:#f87171;font-style:normal;font-size:12px}
  .dep .time .ok{color:var(--ok)}
  .dep.canc{opacity:.5;text-decoration:line-through}
  .dep.train .line{background:#20304a;border-color:#3a5a8a;color:#8fc7ff}
  .dep{cursor:pointer}
  .dep .dcaret{flex:none;color:var(--muted);font-size:11px;margin-left:2px;transition:transform .15s}
  .dep.open .dcaret{transform:rotate(180deg)}
  /* expanded stop-by-stop itinerary */
  .depdetail{padding:2px 2px 12px 8px}
  .journey{margin-left:6px}
  .jstop{display:flex;gap:10px;align-items:baseline;padding:5px 0 5px 14px;position:relative}
  .jstop::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--border)}
  .jstop::after{content:"";position:absolute;left:-3px;top:10px;width:8px;height:8px;border-radius:50%;background:var(--border);border:2px solid var(--card)}
  .jstop:first-child::before{top:10px}
  .jstop:last-child::before{bottom:auto;height:10px}
  .jstop.here::after{background:var(--accent2)}
  .jstop.here .jn{color:var(--text);font-weight:800}
  .jstop .jt{flex:none;min-width:66px;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12.5px}
  .jstop .jt em{color:#f87171;font-style:normal}
  .jstop .jn{flex:1;min-width:0;font-size:13px;color:var(--muted)}
  .jstop .jn .q{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:0 5px;color:var(--accent2);font-size:11px;margin-left:6px}
  /* route finder */
  .triprow{display:flex;gap:8px;align-items:center}
  .triprow .cols{flex:1;min-width:0}
  .pickrow{position:relative;margin-bottom:8px}
  .pickrow:last-child{margin-bottom:0}
  .pickrow input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px}
  .picklist{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:5;background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .picklist .st{padding:12px 12px;cursor:pointer;font-size:15px;border-bottom:1px solid var(--border)}
  .picklist .st:last-child{border-bottom:none}
  .picklist .st:hover{background:var(--card)}
  #tpSwap{flex:none;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;width:40px;height:44px;font-size:16px;cursor:pointer}
  .tpwhen{display:flex;gap:8px;margin-top:8px;align-items:flex-start}
  .tpwhen select{flex:none;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 11px;font-size:15px}
  /* one-tap "when" chips (Elo / +15′ / Owend / Muer / 🗓) */
  .wrow{display:flex;flex-wrap:wrap;gap:7px}
  .wchip{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:18px;padding:9px 14px;font-size:13.5px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent}
  .wchip:hover{border-color:var(--accent2)}
  .wchip.on{background:var(--accent2);border-color:var(--accent2);color:#06121a;font-weight:700}
  .wchip.wcal{padding:7px 11px;font-size:14px}
  #tpFind{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:1px solid var(--accent2);background:var(--accent2);color:#06121a;font-weight:700;font-size:14px;cursor:pointer}
  #tpFind:disabled{opacity:.55;cursor:default}
  #rectrips{margin-top:12px}
  #rectrips .recchip .ar{color:var(--muted)}
  .trip{border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:10px}
  .trip .thead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
  .trip .ttime{font-weight:800;font-size:15px}
  .trip .tmeta{color:var(--muted);font-size:12.5px;flex:none}
  .trip .legs{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .leg{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:3px 7px}
  .leg.walk{background:transparent;border-style:dashed;color:var(--muted)}
  .leg .ln{font-weight:800}
  .trip .arrow{color:var(--muted);font-size:12px}
  .trip{cursor:pointer}
  .trip.open{border-color:var(--accent2)}
  .trip .tcaret{color:var(--muted);font-size:11px;transition:transform .15s}
  .trip.open .tcaret{transform:rotate(180deg)}
  .tripdetail{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:12px}
  .dleg{font-size:12.5px;line-height:1.5}
  .dleg.walk{color:var(--muted)}
  .dleg .dlt{display:flex;gap:8px;align-items:baseline}
  .dleg .dtime{color:var(--muted);font-variant-numeric:tabular-nums;flex:none;min-width:40px;font-weight:700}
  .dleg .dlmid{color:var(--muted);padding:3px 0 3px 48px}
  .dleg .q{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:0 5px;font-size:11px;color:var(--accent2);margin-left:6px}
</style>
<script data-goatcounter="https://ianm.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>🚌 Bus &amp; Zuch</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap">
  <div class="card">
    <h3>🧭 Wee fannen</h3>
    <div id="tproute" style="display:none">
      <div class="triprow">
        <div class="cols">
          <div class="pickrow"><input id="fromq" placeholder="Vun … (z.B. Gare)" autocomplete="off"><div id="fromList"></div></div>
          <div class="pickrow"><input id="toq" placeholder="Bis … (z.B. Kirchberg)" autocomplete="off"><div id="toList"></div></div>
        </div>
        <button id="tpSwap" title="Wiesselen">⇅</button>
      </div>
      <div class="tpwhen">
        <select id="tpMode" title="Depart oder Arrivée">
          <option value="dep">Depart</option>
          <option value="arr">Arrivée</option>
        </select>
        <div class="wrow" id="tpWhenChips" style="flex:1"></div>
      </div>
      <input type="hidden" id="tpTime">
      <div id="tpPicker" style="display:none;margin-top:8px"></div>
      <button id="tpFind">Wee sichen</button>
      <div id="rectrips"></div>
      <div id="trip"></div>
    </div>
    <div class="muted" id="tpRouteNote">Lueden…</div>
  </div>
  <div class="card">
    <h3>🚌 Nächst Departuren</h3>
    <div id="tprow" style="display:none">
      <input id="stopq" placeholder="Arrêt oder Gare sichen…" autocomplete="off">
      <button class="tpbtn" id="tpGeo" title="Arrêten no bei mir">📍</button>
    </div>
    <div id="linerow" style="display:none;margin-top:8px">
      <input id="lineq" placeholder="Linn filteren (z.B. 321)" autocomplete="off">
      <button class="linex" id="lineClear" title="Läschen" style="display:none">✕</button>
    </div>
    <div id="depwhen" style="display:none;margin-top:10px">
      <div class="wrow" id="depWhenChips"></div>
      <input type="hidden" id="depTime">
      <div id="depPicker" style="display:none;margin-top:8px"></div>
    </div>
    <div id="recents"></div>
    <div id="stops"></div>
    <div id="deps"><div class="muted" id="tpNote">Lueden…</div></div>
  </div>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
import { mountPicker } from "./datetime-picker.js?v=2";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---- transport ----
   Stop discovery (text search + nearby) is LOCAL against the bundled GTFS stop
   list (moien-stops.json, all ~2800 Luxembourg stops). Only the departure board
   goes through the Edge Function → ministry HAFAS API (accessId stays server-side). */
let curStop=null, tpTimer=null, STOPS=[], NORMS=[];
// recently opened stops, for one-tap access (newest first, max 6)
const MAX_RECENTS=6;
let RECENTS=(()=>{ try{ const r=JSON.parse(localStorage.getItem("moienRecents")); return Array.isArray(r)?r:[]; }catch{ return []; } })();
function pushRecent(s){
  RECENTS=[{id:s.id,name:s.name}, ...RECENTS.filter(r=>String(r.id)!==String(s.id))].slice(0,MAX_RECENTS);
  localStorage.setItem("moienRecents", JSON.stringify(RECENTS));
}
function renderRecents(){
  const host=$("recents"); if(!host)return;
  if(!RECENTS.length){ host.innerHTML=""; return; }
  host.innerHTML=`<div class="rectitle">🕘 Zulescht benotzt</div><div class="recchips">`+
    RECENTS.map(r=>`<button class="recchip" data-id="${esc(r.id)}">${esc(r.name)}</button>`).join("")+`</div>`;
  host.querySelectorAll(".recchip").forEach(el=>el.onclick=()=>{
    const r=RECENTS.find(x=>String(x.id)===el.dataset.id); if(r)selectStop(r);
  });
}
// accent-insensitive, and treat commas as spaces so "hollerich kierfecht" matches
// the stop "Hollerich, Kierfecht" (the comma is optional).
const norm=(s)=>(""+(s||"")).normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .toLowerCase().replace(/,/g," ").replace(/\s+/g," ").trim();
async function tp(params){
  const u=new URL(`${PB_CONFIG.url}/functions/v1/transport`);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u,{headers:{apikey:PB_CONFIG.anonKey,Authorization:`Bearer ${PB_CONFIG.anonKey}`}});
  return r.json();
}
// rail categories the HAFAS board returns at stations (buses have cat "Bus"/"")
const RAIL=new Set(["RB","RE","IC","IR","TER","TGV","ICE","EC","EN","CFL","TRAIN"]);
const railIcon=(cat)=>/TGV|ICE/i.test(cat||"")?"🚄":"🚆";
let DEPS=[], lineFilter="";
// line filter: match the line label, train number or category (e.g. "321", "RB")
const depMatch=(d)=>{ if(!lineFilter)return true; const f=normLine(lineFilter);
  return normLine(d.line).includes(f)||(d.num&&normLine(d.num).includes(f))||(d.cat&&normLine(d.cat).includes(f)); };
function renderDeps(list){ DEPS=list||[]; paintDeps(); }
function paintDeps(){
  if(!DEPS.length){
    const msg=$("depTime").value?"Keng Departuren ëm dës Zäit.":"Keng Departuren an der nächster Stonn.";
    $("deps").innerHTML=`<div class="muted">${msg}</div>`;return;}
  const rows=DEPS.map((d,i)=>[d,i]).filter(([d])=>depMatch(d));
  if(!rows.length){ $("deps").innerHTML=`<div class="muted">Keng Departure fir „${esc(lineFilter)}" an der Lëscht.</div>`; return; }
  $("deps").innerHTML=rows.map(([d,i])=>{
    const late=d.delay>0, dl=late?` <em>+${d.delay}</em>`:(d.delay===0?' <span class="ok">•</span>':"");
    const train=RAIL.has((d.cat||"").toUpperCase());
    const lab=train?`${railIcon(d.cat)} ${esc(d.line||d.cat)}`:esc(d.line);
    const bits=[];
    if(train && d.num) bits.push(`Zuch ${esc(d.num)}`);
    if(d.platform) bits.push(`<span class="q">Quai ${esc(d.platform)}</span>`);
    const sub=bits.length?`<span class="sub">${bits.join(" · ")}</span>`:"";
    return `<div class="dep ${train?"train":""} ${d.cancelled?"canc":""}" data-i="${i}"><span class="line">${lab}</span>
      <span class="dir"><span class="dname">${esc(d.dir)}</span>${sub}</span><span class="time">${esc(d.time)}${dl}${d.cancelled?" ✖":""}</span><span class="dcaret">▾</span></div>
      <div class="depdetail" hidden></div>`;
  }).join("");
  $("deps").querySelectorAll(".dep").forEach(el=>el.onclick=()=>toggleDep(+el.dataset.i,el));
}
function wireLineFilter(){
  const clr=$("lineClear");
  $("lineq").addEventListener("input",()=>{
    lineFilter=$("lineq").value.trim();
    clr.style.display=lineFilter?"":"none";
    paintDeps();
  });
  clr.onclick=()=>{ $("lineq").value=""; lineFilter=""; clr.style.display="none"; paintDeps(); };
}
function toggleDep(i,el){
  const box=el.nextElementSibling;
  if(!box||!box.classList.contains("depdetail"))return;
  if(box.hasAttribute("hidden")){
    el.classList.add("open"); box.removeAttribute("hidden");
    if(!box.dataset.done){ box.dataset.done="1"; loadDepDetail(i,box); }
  }else{ box.setAttribute("hidden",""); el.classList.remove("open"); }
}
async function loadBoard(){
  if(!curStop)return;
  // don't collapse an itinerary the user is reading during the 45s auto-refresh
  if($("deps").querySelector(".depdetail:not([hidden])"))return;
  const params={action:"board",id:curStop.id};
  // optional future moment: datetime-local gives "YYYY-MM-DDTHH:MM" in local time
  const when=$("depTime").value;
  if(when){ const [date,time]=when.split("T"); if(date)params.date=date; if(time)params.time=time.slice(0,5); }
  const d=await tp(params);
  if(d.error){$("deps").innerHTML='<div class="muted">Departuren net verfügbar.</div>';return;}
  renderDeps(d.departures);
}

/* Full stop-by-stop itinerary for a clicked departure. The HAFAS key can't do
   journeyDetail, so we resolve the trip via transitous (MOTIS): its stop id is
   our stop id zero-padded, `stoptimes` gives each departure a tripId, and
   `trip` returns every stop with scheduled + real times (→ delays). */
const TRANSITOUS="https://api.transitous.org/api/v1";
const motisStopId=(id)=>`lu-administration-des-transports-publics_${String(id).padStart(12,"0")}`;
// always local 24h "HH:MM" — toLocaleTimeString can emit "09:01 PM" on some
// locales, which would never match the HAFAS board's 24h times
const clockOf=(iso)=>{ if(!iso)return""; const d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const delayOf=(real,sched)=>(real&&sched)?Math.round((new Date(real)-new Date(sched))/60000):0;
const normLine=(s)=>(""+(s||"")).toUpperCase().replace(/[^A-Z0-9]/g,"");
async function findTripId(dep){
  const base=$("depTime").value?new Date($("depTime").value):new Date();
  const u=new URL(`${TRANSITOUS}/stoptimes`);
  u.searchParams.set("stopId",motisStopId(curStop.id));
  u.searchParams.set("time",base.toISOString());
  u.searchParams.set("n","60"); u.searchParams.set("arriveBy","false");
  const d=await (await fetch(u)).json();
  const sts=d.stopTimes||[];
  const want=dep.planned||dep.time, wl=normLine(dep.line);
  let timeMatch=null;
  for(const s of sts){
    if(clockOf(s.place&&s.place.scheduledDeparture)!==want)continue;
    const rl=normLine(s.routeShortName);
    if(rl===wl||(wl&&(rl.includes(wl)||wl.includes(rl))))return s.tripId;  // best: same time + line
    if(!timeMatch)timeMatch=s.tripId;                                       // fallback: same time
  }
  return timeMatch;
}
// strip "(Bus)"/"(Tram)" tags and a leading city so board names match trip names
const stopKey=(n)=>norm(n).replace(/\(.*?\)/g," ").replace(/^(luxembourg|luxemburg)\s+/,"").replace(/\s+/g," ").trim();
function renderJourney(leg){
  const stops=[leg.from,...(leg.intermediateStops||[]),leg.to];
  const myId=curStop?String(curStop.id).padStart(12,"0"):"";
  const myKey=curStop?stopKey(curStop.name):"";
  const rows=stops.map((s,idx)=>{
    const first=idx===0;
    const real=first?(s.departure||s.arrival):(s.arrival||s.departure);
    const sched=first?(s.scheduledDeparture||s.scheduledArrival):(s.scheduledArrival||s.scheduledDeparture);
    const dl=delayOf(real,sched), dlt=dl?` <em>${dl>0?"+":""}${dl}</em>`:"";
    const here=(s.stopId&&myId&&s.stopId.endsWith(myId)) || (myKey&&stopKey(s.name)===myKey);
    const q=s.track?`<span class="q">Quai ${esc(s.track)}</span>`:"";
    return `<div class="jstop${here?" here":""}"><span class="jt">${esc(clockOf(real))}${dlt}</span><span class="jn">${esc(s.name)}${q}</span></div>`;
  }).join("");
  return `<div class="journey">${rows}</div>`;
}
async function loadDepDetail(i,box){
  box.innerHTML='<div class="muted" style="padding:8px 2px">Wee gëtt gelueden…</div>';
  try{
    const tripId=await findTripId(DEPS[i]);
    if(!tripId){ box.innerHTML='<div class="muted" style="padding:8px 2px">Detail fir dës Linn net verfügbar.</div>'; return; }
    const u=new URL(`${TRANSITOUS}/trip`); u.searchParams.set("tripId",tripId);
    const d=await (await fetch(u)).json();
    const leg=(d.legs||[]).find(l=>l.mode!=="WALK")||(d.legs||[])[0];
    if(!leg||!leg.from){ box.innerHTML='<div class="muted" style="padding:8px 2px">Kee Detail fonnt.</div>'; return; }
    box.innerHTML=renderJourney(leg);
  }catch(e){ console.warn("[dep detail]",e); box.innerHTML='<div class="muted" style="padding:8px 2px">Detail net verfügbar — probéier nach eng Kéier.</div>'; }
}
function renderStops(stops){
  if(!stops||!stops.length){$("stops").innerHTML='<div class="muted">Keng Arrêten fonnt.</div>';return;}
  $("stops").innerHTML=stops.map(s=>
    `<div class="st" data-id="${esc(s.id)}"><span>${esc(s.name)}</span>${s.dist!=null?`<span class="dist">${s.dist<1000?Math.round(s.dist)+" m":(s.dist/1000).toFixed(1)+" km"}</span>`:""}</div>`
  ).join("");
  $("stops").querySelectorAll(".st").forEach(el=>el.onclick=()=>{
    const s=stops.find(x=>String(x.id)===el.dataset.id); if(s)selectStop(s);
  });
}
function selectStop(s){
  curStop={id:s.id,name:s.name};
  $("stopq").value=s.name; $("stops").innerHTML="";
  $("linerow").style.display="";
  $("deps").innerHTML='<div class="muted">Lueden…</div>';
  localStorage.setItem("moienStop",JSON.stringify(curStop));
  pushRecent(curStop); renderRecents();
  loadBoard(); clearInterval(tpTimer); tpTimer=setInterval(loadBoard,45000);
}
/* local text search over the bundled stops (accent- & comma-insensitive, prefix-first).
   Uses the precomputed NORMS[] so every keystroke stays cheap. */
function searchStops(q){
  const n=norm(q); if(n.length<2)return[];
  const res=[];
  for(let k=0;k<STOPS.length;k++){
    const nn=NORMS[k], i=nn.indexOf(n);
    if(i<0)continue;
    const [id,name,lat,lon]=STOPS[k];
    // rank: word-start match beats mid-word, earlier beats later
    const wordStart=(i===0||nn[i-1]===" ")?0:1;
    res.push({id,name,lat,lon,rank:wordStart*1000+i});
    if(res.length>400)break;
  }
  res.sort((a,b)=>a.rank-b.rank||a.name.length-b.name.length);
  return res.slice(0,12);
}
/* local nearest stops by haversine distance */
function nearestStops(lat,lon,k){
  const R=6371000, toRad=(d)=>d*Math.PI/180;
  const out=STOPS.map(([id,name,slat,slon])=>{
    const dLat=toRad(slat-lat), dLon=toRad(slon-lon);
    const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat))*Math.cos(toRad(slat))*Math.sin(dLon/2)**2;
    return {id,name,lat:slat,lon:slon,dist:2*R*Math.asin(Math.sqrt(a))};
  });
  out.sort((a,b)=>a.dist-b.dist);
  return out.slice(0,k);
}

/* ---- route finder (from → to) ---------------------------------------
   Routing uses transitous (free, no-key MOTIS engine that includes the
   Luxembourg GTFS feed), called by the coordinates we already hold for
   every bundled stop — so no API key and no Edge Function are involved. */
let tripFrom=null, tripTo=null;
function wireStopPicker(inputId,listId,setPick){
  const inp=$(inputId), list=$(listId); let t=null;
  const close=()=>{list.innerHTML="";list.className="";};
  inp.addEventListener("input",()=>{
    setPick(null);
    clearTimeout(t);
    t=setTimeout(()=>{
      const q=inp.value.trim();
      if(q.length<2){close();return;}
      const hits=searchStops(q);
      if(!hits.length){close();return;}
      list.className="picklist";
      list.innerHTML=hits.map(s=>`<div class="st" data-id="${esc(s.id)}">${esc(s.name)}</div>`).join("");
      list.querySelectorAll(".st").forEach(el=>el.onclick=()=>{
        const s=hits.find(x=>String(x.id)===el.dataset.id);
        if(s){ inp.value=s.name; setPick(s); close(); }
      });
    },160);
  });
  inp.addEventListener("blur",()=>setTimeout(close,180));
}
const fmtClock=(iso)=>new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const MODEICON={WALK:"🚶",BUS:"🚌",COACH:"🚌",TRAM:"🚊",RAIL:"🚆",REGIONAL_RAIL:"🚆",REGIONAL_FAST_RAIL:"🚆",LONG_DISTANCE:"🚆",HIGHSPEED_RAIL:"🚄",SUBWAY:"🚇",FERRY:"⛴️"};
function legLabel(lg){
  if(lg.mode==="WALK"){const m=Math.max(1,Math.round((lg.duration||0)/60));return `<span class="leg walk">🚶 ${m}′</span>`;}
  const ic=MODEICON[lg.mode]||"🚌", ln=lg.routeShortName||lg.mode;
  return `<span class="leg">${ic} <span class="ln">${esc(ln)}</span></span>`;
}
let TRIPS=[];
function renderTrip(data){
  TRIPS=((data&&data.itineraries)||[]).slice(0,4);
  if(!TRIPS.length){$("trip").innerHTML='<div class="muted" style="margin-top:10px">Kee Wee fonnt.</div>';return;}
  $("trip").innerHTML=TRIPS.map((it,idx)=>{
    const mins=Math.round((it.duration||0)/60);
    const legs=it.legs.filter(l=>l.mode!=="WALK"||l.duration>90);
    const chain=legs.map(legLabel).join('<span class="arrow">›</span>');
    const chg=it.transfers>0?`${it.transfers}× ëmklammen`:"direkt";
    return `<div class="trip" data-i="${idx}">
      <div class="thead">
        <span class="ttime">${fmtClock(it.startTime)} → ${fmtClock(it.endTime)}</span>
        <span class="tmeta">${mins} min · ${chg} <span class="tcaret">▾</span></span>
      </div>
      <div class="legs">${chain||'<span class="leg walk">🚶 zu Fouss</span>'}</div>
      <div class="tripdetail" hidden></div>
    </div>`;
  }).join("");
  $("trip").querySelectorAll(".trip").forEach(el=>el.onclick=()=>toggleTripDetail(+el.dataset.i,el));
}
// one leg of the itinerary, expanded: board time+stop, the ride, alight time+stop
function legDetail(lg){
  const t1=fmtClock(lg.startTime), t2=fmtClock(lg.endTime);
  if(lg.mode==="WALK"){
    const m=Math.max(1,Math.round((lg.duration||0)/60));
    return `<div class="dleg walk">🚶 ${m} min zu Fouss (${esc(lg.from.name)} → ${esc(lg.to.name)})</div>`;
  }
  const ic=MODEICON[lg.mode]||"🚌", line=esc(lg.routeShortName||lg.mode);
  const num=(lg.tripShortName&&lg.tripShortName!==lg.routeShortName)?` ${esc(lg.tripShortName)}`:"";
  const head=lg.headsign?` → ${esc(lg.headsign)}`:"";
  const ns=(lg.intermediateStops||[]).length;
  const stops=ns?` · ${ns} Arrêt${ns>1?"en":""}`:"";
  const q1=lg.from.track?`<span class="q">Quai ${esc(lg.from.track)}</span>`:"";
  const q2=lg.to.track?`<span class="q">Quai ${esc(lg.to.track)}</span>`:"";
  return `<div class="dleg">
    <div class="dlt"><span class="dtime">${t1}</span><b>${esc(lg.from.name)}</b>${q1}</div>
    <div class="dlmid">${ic} <b>${line}</b>${num}${head}${stops}</div>
    <div class="dlt"><span class="dtime">${t2}</span><b>${esc(lg.to.name)}</b>${q2}</div>
  </div>`;
}
function toggleTripDetail(i,el){
  const box=el.querySelector(".tripdetail"); if(!box)return;
  if(box.hasAttribute("hidden")){
    if(!box.dataset.done){ box.innerHTML=(TRIPS[i].legs||[]).map(legDetail).join(""); box.dataset.done="1"; }
    box.removeAttribute("hidden"); el.classList.add("open");
  }else{ box.setAttribute("hidden",""); el.classList.remove("open"); }
}
async function findTrip(){
  if(!tripFrom||!tripTo){$("trip").innerHTML='<div class="muted" style="margin-top:10px">Wiel en Depart an eng Destinatioun.</div>';return;}
  $("tpFind").disabled=true; $("trip").innerHTML='<div class="muted" style="margin-top:10px">Wee gëtt gesicht…</div>';
  try{
    const u=new URL("https://api.transitous.org/api/v1/plan");
    u.searchParams.set("fromPlace",`${tripFrom.lat},${tripFrom.lon}`);
    u.searchParams.set("toPlace",`${tripTo.lat},${tripTo.lon}`);
    // empty time = now; otherwise plan for a chosen departure or arrival moment
    const when=$("tpTime").value;
    const arriveBy=when && $("tpMode").value==="arr";
    if(when) u.searchParams.set("time", new Date(when).toISOString());
    u.searchParams.set("arriveBy", arriveBy?"true":"false");
    const r=await fetch(u); renderTrip(await r.json());
    pushRecentTrip(tripFrom, tripTo);
  }catch(e){ $("trip").innerHTML='<div class="muted" style="margin-top:10px">Wee net verfügbar — probéier nach eng Kéier.</div>'; }
  finally{ $("tpFind").disabled=false; }
}
// recently searched itineraries, for one-tap re-run (newest first, max 6)
let RTRIPS=(()=>{ try{ const r=JSON.parse(localStorage.getItem("moienRecentTrips")); return Array.isArray(r)?r:[]; }catch{ return []; } })();
function pushRecentTrip(from,to){
  const key=(t)=>String(t.id);
  RTRIPS=[{from,to}, ...RTRIPS.filter(r=>!(key(r.from)===key(from)&&key(r.to)===key(to)))].slice(0,6);
  localStorage.setItem("moienRecentTrips", JSON.stringify(RTRIPS));
  renderRecentTrips();
}
function renderRecentTrips(){
  const host=$("rectrips"); if(!host)return;
  if(!RTRIPS.length){ host.innerHTML=""; return; }
  host.innerHTML=`<div class="rectitle">🕘 Lescht Weeër</div><div class="recchips">`+
    RTRIPS.map((r,i)=>`<button class="recchip" data-i="${i}">${esc(r.from.name)} <span class="ar">→</span> ${esc(r.to.name)}</button>`).join("")+`</div>`;
  host.querySelectorAll(".recchip").forEach(el=>el.onclick=()=>{
    const r=RTRIPS[+el.dataset.i]; if(!r)return;
    tripFrom=r.from; tripTo=r.to;
    $("fromq").value=r.from.name; $("toq").value=r.to.name;
    findTrip();
  });
}

let searchT=null;
function wireSearch(){
  $("stopq").addEventListener("input",()=>{
    clearTimeout(searchT);
    searchT=setTimeout(()=>{
      const q=$("stopq").value.trim();
      if(q.length<2){$("stops").innerHTML="";renderRecents();return;}
      $("recents").innerHTML="";
      renderStops(searchStops(q));
    },160);
  });
}
$("tpGeo").onclick=()=>{
  if(!navigator.geolocation){$("stops").innerHTML='<div class="muted">Kee Standuert op dësem Apparat.</div>';return;}
  $("stops").innerHTML='<div class="muted">Standuert gëtt ugefrot…</div>';
  navigator.geolocation.getCurrentPosition(
    p=>renderStops(nearestStops(p.coords.latitude,p.coords.longitude,8)),
    ()=>{$("stops").innerHTML='<div class="muted">Kee Standuert — sich uewen en Arrêt.</div>';},
    {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
  );
};

/* Friendly "when" picker: one-tap relative chips (now / +15′ / +30′ / +1h /
   this evening / tomorrow) that write "YYYY-MM-DDTHH:MM" into a hidden input;
   the 🗓 chip reveals the custom calendar + scroll-wheel picker for an exact
   moment. onChange fires after every pick. */
function wireWhen(inputId, hostId, pickerId, onChange){
  const inp=$(inputId), host=$(hostId), phost=$(pickerId);
  const pad=(n)=>String(n).padStart(2,"0");
  const toLocal=(d)=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const setActive=(k)=>host.querySelectorAll(".wchip").forEach(b=>b.classList.toggle("on",b.dataset.k===k));
  const fire=()=>{ try{ onChange&&onChange(); }catch(e){ console.warn("[when]",e); } };
  let picker=null;
  const presets=[["now","Elo"],["m15","+15′"],["m30","+30′"],["h1","+1 St."],["eve","Owend"],["tmr","Muer"]];
  host.innerHTML=presets.map(([k,l])=>`<button type="button" class="wchip${k==="now"?" on":""}" data-k="${k}">${l}</button>`).join("")
    +`<button type="button" class="wchip wcal" data-k="cal" title="Datum &amp; Zäit wielen">🗓</button>`;
  const apply=(k)=>{
    const now=new Date();
    if(k==="now") inp.value="";
    else if(k==="m15") inp.value=toLocal(new Date(now.getTime()+15*60000));
    else if(k==="m30") inp.value=toLocal(new Date(now.getTime()+30*60000));
    else if(k==="h1")  inp.value=toLocal(new Date(now.getTime()+60*60000));
    else if(k==="eve"){ const d=new Date(now); d.setHours(18,0,0,0); if(d<=now)d.setDate(d.getDate()+1); inp.value=toLocal(d); }
    else if(k==="tmr"){ const d=new Date(now); d.setDate(d.getDate()+1); d.setHours(8,0,0,0); inp.value=toLocal(d); }
    setActive(k);
  };
  const closePicker=()=>{ phost.style.display="none"; };
  host.querySelectorAll(".wchip").forEach(b=>b.onclick=()=>{
    if(b.dataset.k==="cal"){
      if(phost.style.display!=="none"){ closePicker(); return; }
      phost.style.display="";   // show before mounting so the scroll wheels can measure
      const seed=inp.value?new Date(inp.value):null;
      if(!picker){
        picker=mountPicker(phost,{ value:seed, time:true, min:new Date(), lang:"lb", confirmLabel:"Auswielen",
          // pick freely; only OK / Enter applies + closes (avoids reloading on every scroll tick)
          onChange:(d)=>{ inp.value=d?toLocal(d):""; setActive("cal"); },
          onConfirm:(d)=>{ inp.value=d?toLocal(d):""; setActive("cal"); closePicker(); fire(); } });
      }else picker.set(seed);
      setActive("cal");
      return;
    }
    closePicker(); apply(b.dataset.k); fire();
  });
  // Enter confirms the open picker
  document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && picker && phost.style.display!=="none"){ e.preventDefault(); picker.confirm(); }
  });
}

async function initTransport(){
  try{
    const r=await fetch("moien-stops.json");
    STOPS=await r.json();
    NORMS=STOPS.map(s=>norm(s[1]));   // precompute normalized names for fast search
  }catch(e){ $("tpNote").innerHTML='<span class="muted">Arrêt-Lëscht net gelueden.</span>'; return; }
  $("tprow").style.display=""; $("depwhen").style.display="";
  wireSearch(); wireLineFilter();
  // departure board: look up a later moment (buses & trains). Empty = live "now".
  wireWhen("depTime","depWhenChips","depPicker",loadBoard);
  // route finder
  $("tproute").style.display=""; $("tpRouteNote").style.display="none";
  wireStopPicker("fromq","fromList",s=>{tripFrom=s;});
  wireStopPicker("toq","toList",s=>{tripTo=s;});
  $("tpFind").onclick=findTrip;
  renderRecentTrips();
  wireWhen("tpTime","tpWhenChips","tpPicker",null);
  $("tpSwap").onclick=()=>{
    const a=$("fromq").value; $("fromq").value=$("toq").value; $("toq").value=a;
    const t=tripFrom; tripFrom=tripTo; tripTo=t;
  };
  const saved=JSON.parse(localStorage.getItem("moienStop")||"null");
  if(saved&&saved.id){ selectStop(saved); }
  else $("tpNote").innerHTML='<span class="muted">Sich en Arrêt oder tipp 📍 fir déi no bei dir.</span>';
  renderRecents();
}
initTransport();

auth.mountAccountButton($("acctHost"));
