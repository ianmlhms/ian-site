<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brick Blitz - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(255,100,200,0.2)}
</style>
</head>
<body>
<canvas id="c" width="600" height="500"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let paddle,ball,bricks,score,lives,level,gameOver,particles=[];
const COLS=10,ROWS=6,BW=55,BH=20,BP=3;
const COLORS=['#ff4466','#ff8844','#ffcc00','#44ff88','#44aaff','#aa66ff'];

function genBricks(){
  bricks=[];
  for(let r=0;r<ROWS+Math.min(level,4);r++)for(let c=0;c<COLS;c++){
    bricks.push({x:c*(BW+BP)+20,y:r*(BH+BP)+40,w:BW,h:BH,color:COLORS[r%COLORS.length],hp:r<2?2:1,alive:true});
  }
}
function start(){
  paddle={x:250,y:460,w:80,h:12};
  ball={x:300,y:440,vx:3,vy:-4,r:6};
  score=0;lives=3;level=1;gameOver=false;particles=[];
  genBricks();
}
function addP(x,y,c,n){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*10,color:c})}}

function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,C.width,C.height);
  if(!gameOver){
    // Move paddle with mouse
    ball.x+=ball.vx;ball.y+=ball.vy;
    // Walls
    if(ball.x<ball.r||ball.x>C.width-ball.r)ball.vx*=-1;
    if(ball.y<ball.r)ball.vy*=-1;
    // Paddle
    if(ball.y+ball.r>paddle.y&&ball.y<paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
      ball.vy=-Math.abs(ball.vy);ball.vx+=(ball.x-paddle.x-paddle.w/2)*0.1;addP(ball.x,ball.y,'#fff',5);
    }
    // Bottom
    if(ball.y>C.height){lives--;if(lives<=0)gameOver=true;else{ball.x=paddle.x+paddle.w/2;ball.y=440;ball.vy=-4;ball.vx=3}}
    // Bricks
    for(let b of bricks){
      if(!b.alive)continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
        ball.vy*=-1;b.hp--;if(b.hp<=0){b.alive=false;score+=10;addP(b.x+b.w/2,b.y+b.h/2,b.color,12)}
      }
    }
    if(bricks.every(b=>!b.alive)){level++;genBricks();ball.x=300;ball.y=440;ball.vx=3;ball.vy=-4}
  }
  // Draw bricks
  for(let b of bricks){
    if(!b.alive)continue;
    X.fillStyle=b.color;X.shadowColor=b.color;X.shadowBlur=6;
    X.beginPath();X.roundRect(b.x,b.y,b.w,b.h,4);X.fill();
    if(b.hp>1){X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.roundRect(b.x,b.y,b.w,b.h/2,4);X.fill()}
    X.shadowBlur=0;
  }
  // Paddle
  X.fillStyle='#fff';X.shadowColor='#fff';X.shadowBlur=10;
  X.beginPath();X.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);X.fill();X.shadowBlur=0;
  // Ball
  X.fillStyle='#fff';X.shadowColor='#ff66aa';X.shadowBlur=15;
  X.beginPath();X.arc(ball.x,ball.y,ball.r,0,Math.PI*2);X.fill();X.shadowBlur=0;
  // Particles
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}X.globalAlpha=p.life/25;X.fillStyle=p.color;
    X.fillRect(p.x-2,p.y-2,4,4);X.globalAlpha=1}
  // HUD
  X.fillStyle='#fff';X.font='16px Segoe UI';X.textAlign='left';X.fillText('Score: '+score,15,25);
  X.textAlign='right';X.fillText('Lives: '+'❤️'.repeat(lives),C.width-15,25);
  X.textAlign='center';X.fillText('Level '+level,C.width/2,25);
  if(gameOver){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,C.width,C.height);
    X.fillStyle='#ff4466';X.font='bold 42px Segoe UI';X.fillText('GAME OVER',C.width/2,230);
    X.fillStyle='#fff';X.font='22px Segoe UI';X.fillText('Score: '+score,C.width/2,280);
    X.fillText('Press SPACE to retry',C.width/2,320);
  }
  requestAnimationFrame(draw);
}
C.addEventListener('mousemove',e=>{let r=C.getBoundingClientRect();paddle.x=Math.max(0,Math.min(C.width-paddle.w,(e.clientX-r.left)*(C.width/r.width)-paddle.w/2))});
document.addEventListener('keydown',e=>{if(e.key===' '&&gameOver)start();e.preventDefault()});
start();draw();   // kick the single draw loop once at boot (start() no longer calls it → no stacking on retry)
</script>
</body>
</html>
