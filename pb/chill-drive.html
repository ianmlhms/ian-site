<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chill Drive 3D - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#1a2a3a;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#hud{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;gap:22px;color:#fff;z-index:10;text-align:center;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.6)}
#hud .v{font-size:24px;font-weight:bold;color:#66ccff}
#hud .l{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:1px}
#hud .v.st{color:#ffcc66}
#hud .v.lv{color:#ff8888;letter-spacing:2px}
#mm{position:absolute;top:10px;left:12px;z-index:11;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:17px;width:36px;height:36px;border-radius:10px;cursor:pointer}
#mute{position:absolute;top:10px;right:12px;z-index:11;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:17px;width:36px;height:36px;border-radius:10px;cursor:pointer}
#pop{position:absolute;top:38%;left:0;right:0;text-align:center;font-size:min(5vw,30px);font-weight:bold;z-index:12;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.5);transition:opacity .2s}
#flash{position:absolute;inset:0;background:#ff5050;opacity:0;z-index:9;pointer-events:none}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(8,14,26,.82);z-index:20;color:#fff;text-align:center;padding:16px;overflow-y:auto}
#ov h1{font-size:min(10vw,40px);color:#66ccff;margin-bottom:8px}
#ov .sub{font-size:15px;opacity:.85;margin-bottom:16px;line-height:1.55}
#envs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
#envs button,#ov button.big{padding:13px 24px;font-size:16px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;color:#0e1a2a}
#envs button:active,#ov button.big:active{transform:scale(.96)}
#e0{background:#8fd67a}#e1{background:#ffb37a}#e2{background:#7ab8ff}
#ov button.big{font-size:19px;background:#66ccff}
#lvlt{font-size:13px;opacity:.7;margin:20px 0 10px}
#lvls{display:grid;grid-template-columns:repeat(5,52px);gap:8px}
#lvls button{width:52px;height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-size:15px;font-weight:bold;cursor:pointer}
#lvls button.done{background:rgba(102,204,255,.28);border-color:#66ccff}
#lvls button:disabled{opacity:.3;cursor:default}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
<div><div class="v" id="spd">0</div><div class="l">km/h</div></div>
<div><div class="v" id="dist">0</div><div class="l">meters</div></div>
<div><div class="v st" id="style">0</div><div class="l">style</div></div>
<div><div class="v lv" id="lives">♥♥♥♥♥</div><div class="l">crashes</div></div>
<div><div class="v" id="prog">—</div><div class="l" id="progl">mode</div></div>
</div>
<div id="pop"></div><div id="flash"></div>
<button id="mute" class="hidden">🔊</button>
<button id="mm" class="hidden" title="Menu">☰</button>
<div id="ov">
<h1 id="ovh">🛣️ Chill Drive 3D</h1>
<div class="sub" id="ovp">Cruise, overtake, survive — 5 crashes end your run.<br>Close overtakes earn style points. ↑↓ speed · ←→ steer</div>
<div id="envs">
<button id="e0">🌄 MEADOWS</button>
<button id="e1">🏜️ DESERT SUNSET</button>
<button id="e2">🌃 NEON NIGHT</button>
</div>
<button class="big" id="go" style="display:none">DRIVE AGAIN</button>
<button class="big" id="go2" style="margin-top:10px;background:#9be89b">🧘 ZEN DRIVE — no traffic</button>
<button class="big" id="goMenu" style="margin-top:10px;background:rgba(255,255,255,.18);color:#fff">🏠 MAIN MENU</button>
<div id="lvlt">— or race 20 levels (reach the finish, max 5 crashes) —</div>
<div id="lvls"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";
const $=(id)=>document.getElementById(id);
if(!window.THREE){
  $('ovp').innerHTML='Could not load the 3D engine — check your connection and reload.';
  $('envs').style.display='none';$('go2').style.display='none';$('lvlt').style.display='none';
  throw new Error('three.js failed to load');
}

/* ---------- world tuning (same simulation as the classic Chill Drive) ---------- */
const SEGL=200, DRAW=90;
const MAXV=320, ACCEL=0.8, BRAKE=3.5, COAST=0.985, GRASS_CAP=55, GRASS_DRAG=0.95;
const STEER_F=0.013, CENTRI=0.19, KMH=1.25, METER=50, GRADE_F=1.4, DOWN_MAX=1.12;
const CAR_W=0.42, NEAR_W=0.8, INVULN=150, CAR_LEN=110, MAX_CRASH=5, N_LEVELS=20;
const LANE_X=[-0.55,0,0.55], CAR_COLS=[0xd9534f,0x5bc0de,0xf0ad4e,0x9b8ce8,0x7ac47a,0xe8e8e8];
/* 3D world scale: one segment = 4 m of road. TS slows simulation time so the
 * classic arcade numbers translate to a believable, controllable 3D speed. */
const SEG_WLD=4, RH=7.6, CURVE_K=0.0075, Y_K=0.009, CHUNK=128, TS=0.22;

/* ---------- environments (the 3 endless worlds) ---------- */
const ENVS=[
 {name:'Meadows',sky:0x9fd8f0,fog:0xc4e6f2,ground:0x77c065,road:0x585d66,line:0xf2f2f2,rumble:0xc4485a,
  mount:0x4d7d59,trunk:0x6b4a26,leaf:0x3f9a45,leaf2:0x2f7d38,sunCol:0xfff2b0,hemi:[0xcfe8ff,0x7a9a6a,1.0],dir:1.0,
  night:false,clouds:true,deco:'pine',traffic:10,vmin:55,vspan:55},
 {name:'Desert Sunset',sky:0xffab72,fog:0xffc9a0,ground:0xdfae6e,road:0x6b5f57,line:0xffe9d0,rumble:0xa84a3a,
  mount:0xb0704e,trunk:0x7a5a34,leaf:0x5a9a50,leaf2:0x4a8442,sunCol:0xff6a3d,hemi:[0xffd2a8,0xa87a52,0.9],dir:0.85,
  night:false,clouds:true,deco:'cactus',traffic:12,vmin:60,vspan:60},
 {name:'Neon Night',sky:0x0a1030,fog:0x121a3e,ground:0x14301e,road:0x2b2e38,line:0x4de8ff,rumble:0x8858c8,
  mount:0x1a2848,trunk:0x1c2a20,leaf:0x1f4a2e,leaf2:0x173c24,sunCol:0xdfe8ff,hemi:[0x3a4a8a,0x101820,0.55],dir:0.25,
  night:true,clouds:false,deco:'pine',traffic:14,vmin:65,vspan:60},
];
let ENV=ENVS[0];

/* ---------- road generation (identical seeds/shape as before) ---------- */
let segs=[],roadW=2000,courseEnd=Infinity;
const rngFor=(seed)=>{let s=seed>>>0;return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};};
let genR=null,genCy=0;
function addSec(n,curve,dh){
  const base=segs.length,y0=genCy;
  for(let i=0;i<n;i++){
    const t=(i+1)/n;
    segs.push({curve:curve*Math.sin(Math.PI*Math.min(1,(i/n)*1.15)),
      y:y0+dh*(t*t*(3-2*t)),i:base+i,spr:null});
  }
  genCy=y0+dh;
}
function pickSec(cm,hm){
  const R=genR;
  const r=R();
  const dir=R()<0.5?-1:1, cdir=R()<0.5?-1:1;
  if(r<0.24)addSec(60+R()*40|0,0,dir*R()*900*hm);
  else if(r<0.46)addSec(45+R()*25|0,cdir*(1.6+R()*1.6)*cm,dir*R()*700*hm);
  else if(r<0.62)addSec(40+R()*18|0,cdir*(3.4+R()*1.4)*cm,0);
  else if(r<0.78)addSec(50+R()*30|0,cdir*R()*1.2*cm,(1800+R()*2200)*hm);
  else if(r<0.92)addSec(50+R()*30|0,cdir*R()*1.2*cm,-(1800+R()*2200)*hm);
  else {addSec(30+R()*10|0,0,(1400+R()*1200)*hm);addSec(26+R()*10|0,cdir*1.4*cm,-(1600+R()*1400)*hm);}
}
function decorate(from){
  for(let i=from;i<segs.length;i++)
    if(genR()<0.14)segs[i].spr={side:genR()<0.5?-1:1,off:1.6+genR()*2.4,size:0.8+genR()*0.9,type:genR()<0.5?0:1};
}
function genRoad(cfg){
  segs=[];genR=cfg.rand;genCy=0;roadW=cfg.roadW;
  addSec(30,0,0);
  const target=cfg.lenSegs||1400;
  while(segs.length<target)pickSec(cfg.curveMul,Math.min(cfg.hillMul,1.9));
  if(cfg.loop)addSec(50,0,0);            // endless: run-out, extended forever below
  else addSec(50,0,0);                   // level: run-out past the finish
  decorate(0);
  courseEnd=cfg.loop?Infinity:(target-8)*SEGL;
  buildCenterline(0);
}
function extendRoad(){
  const from=segs.length;
  while(segs.length<from+400)pickSec(cfgNow.curveMul,Math.min(cfgNow.hillMul,1.9));
  decorate(from);
  buildCenterline(from);
}
function segAt(z){
  return segs[Math.max(0,Math.min(segs.length-1,Math.floor(z/SEGL)))];
}

/* ---------- centerline: game segments -> 3D world path ---------- */
let cl=[];
function buildCenterline(from){
  if(from===0)cl=[{x:0,z:0,y:0,h:0}];
  let p=cl[cl.length-1];
  for(let i=cl.length-1;i<segs.length;i++){
    const h=p.h-segs[i].curve*CURVE_K;
    p={x:p.x+Math.sin(h)*SEG_WLD,z:p.z+Math.cos(h)*SEG_WLD,y:segs[i].y*Y_K,h:h};
    cl.push(p);
  }
}
function pointAt(s,lat){
  const f=Math.max(0,s/SEGL), i=Math.min(cl.length-2,Math.floor(f)), t=f-i;
  const a=cl[i],b=cl[i+1];
  const h=a.h+(b.h-a.h)*t;
  const x=a.x+(b.x-a.x)*t-Math.cos(h)*lat*RH;
  const z=a.z+(b.z-a.z)*t+Math.sin(h)*lat*RH;
  return {x:x,y:a.y+(b.y-a.y)*t,z:z,h:h};
}

/* ---------- modes ---------- */
const unlocked=()=>+(localStorage.getItem('pb_cd_lvl')||1);
function cdApply(sv){if(sv&&sv.v===1&&(sv.lvl||0)>unlocked())localStorage.setItem('pb_cd_lvl',Math.min(sv.lvl,N_LEVELS));}
function cdPush(){try{parent.postMessage({__pbSave:1,data:{v:1,lvl:unlocked()}},'*')}catch(e){}}
cdApply(window.__pbSave);
window.addEventListener('message',e=>{const d=e.data;if(d&&d.__pbLoadSave===1)cdApply(d.data)});
try{parent.postMessage({__pbWantSave:1},'*')}catch(e){}
function endlessCfg(env){
  return {rand:rngFor((Math.random()*1e9)|0),curveMul:1,hillMul:1,loop:true,roadW:2000,
    traffic:env.traffic,vmin:env.vmin,vspan:env.vspan};
}
function levelCfg(n){
  return {rand:rngFor(1234567+n*777),curveMul:1+n*0.025,hillMul:1+n*0.07,loop:false,
    lenSegs:900+n*60,roadW:2000-n*24,traffic:6+Math.floor(n*0.38),vmin:46-Math.floor(n*0.5),vspan:50};
}

/* ---------- state ---------- */
let keys={},speed=0,pos=0,playerX=0,time=0,steerS=0;
let cars=[],stylePts=0,combo=0,invuln=0,shake=0,muted=false;
let state='menu',mode='endless',lvl=0,crashes=0,cfgNow=null,zen=false,envIdx=0;
function spawnCar(ahead){
  return {z:pos+ahead,x:LANE_X[Math.floor(Math.random()*3)],v:cfgNow.vmin+Math.random()*cfgNow.vspan,
    col:CAR_COLS[Math.floor(Math.random()*CAR_COLS.length)],passed:false,mesh:null};
}
function initCars(){
  for(const c of cars)if(c.mesh){
    scene.remove(c.mesh);
    c.mesh.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});
  }
  cars=[];
  for(let i=0;i<cfgNow.traffic;i++){
    const c=spawnCar(2600+i*2100+Math.random()*900);
    c.mesh=makeCar(c.col,false);scene.add(c.mesh);
    cars.push(c);
  }
}

/* ---------- audio (unchanged) ---------- */
let AC=null,eng=null,engG=null,padG=null;
function audio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    eng=AC.createOscillator();eng.type='sawtooth';
    engG=AC.createGain();engG.gain.value=0;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;
    eng.connect(lp);lp.connect(engG);engG.connect(AC.destination);eng.start();
    padG=AC.createGain();padG.gain.value=0.05;padG.connect(AC.destination);
    const CHORDS=[[220,261.6,329.6,392],[174.6,220,261.6,349.2],[196,246.9,293.7,392],[164.8,220,261.6,329.6]];
    let ci=0;
    const playChord=()=>{
      if(!AC||muted)return;
      for(const f of CHORDS[ci%CHORDS.length]){
        const o=AC.createOscillator(),g=AC.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.0001,AC.currentTime);
        g.gain.linearRampToValueAtTime(0.028,AC.currentTime+1.4);
        g.gain.linearRampToValueAtTime(0.0001,AC.currentTime+4.4);
        o.connect(g);g.connect(padG);o.start();o.stop(AC.currentTime+4.5);
      }
      ci++;
    };
    playChord();setInterval(playChord,4200);
    $('mute').classList.remove('hidden');
  }catch(e){AC=null;}
}
function blip(freq,dur,vol,type){
  if(!AC||muted)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'triangle';o.frequency.setValueAtTime(freq,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(Math.max(30,freq*0.5),AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
const sfx={
  whoosh:()=>blip(900,0.25,0.1,'sine'),
  crash:()=>{blip(110,0.5,0.3,'sawtooth');blip(60,0.6,0.25,'square');},
  win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.22,0.14,'triangle'),i*110));},
  lose:()=>{[392,330,262,196].forEach((f,i)=>setTimeout(()=>blip(f,0.3,0.14,'triangle'),i*140));},
};
$('mute').onclick=()=>{muted=!muted;$('mute').textContent=muted?'🔇':'🔊';if(engG)engG.gain.value=0;if(padG)padG.gain.value=muted?0:0.05;};

/* ---------- three.js scene ---------- */
const C=$('c');
const renderer=new THREE.WebGLRenderer({canvas:C,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(74,1,1,1100);
let W=innerWidth,H=innerHeight;
function resize(){W=innerWidth;H=innerHeight;renderer.setSize(W,H,false);camera.aspect=W/H;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();
const hemi=new THREE.HemisphereLight(0xffffff,0x445544,1);scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffffff,1);sun.position.set(-140,180,80);scene.add(sun);
let sunBall=null,stars=null,clouds=[],headlight=null;

let mats=null;
function makeMats(){
  const DS=THREE.DoubleSide;
  return {
    road:new THREE.MeshLambertMaterial({color:ENV.road,side:DS}),
    line:new THREE.MeshBasicMaterial({color:ENV.line,side:DS}),
    rumble:new THREE.MeshBasicMaterial({color:ENV.rumble,side:DS}),
    ground:new THREE.MeshBasicMaterial({color:ENV.ground,side:DS}),
    mount:new THREE.MeshLambertMaterial({color:ENV.mount,flatShading:true}),
    trunk:new THREE.MeshLambertMaterial({color:ENV.trunk}),
    leaf:new THREE.MeshLambertMaterial({color:ENV.leaf,flatShading:true}),
    leaf2:new THREE.MeshLambertMaterial({color:ENV.leaf2,flatShading:true}),
    shadow:new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.28,depthWrite:false}),
  };
}
function applyEnv(){
  scene.background=new THREE.Color(ENV.sky);
  scene.fog=new THREE.Fog(ENV.fog,120,820);
  hemi.color.set(ENV.hemi[0]);hemi.groundColor.set(ENV.hemi[1]);hemi.intensity=ENV.hemi[2];
  sun.intensity=ENV.dir;sun.color.set(ENV.night?0x8898ff:0xfff4d8);
  if(sunBall){scene.remove(sunBall);sunBall=null;}
  const sb=new THREE.Mesh(new THREE.SphereGeometry(ENV.night?26:44,16,12),
    new THREE.MeshBasicMaterial({color:ENV.sunCol,fog:false}));
  sunBall=sb;scene.add(sb);
  if(stars){scene.remove(stars);stars=null;}
  if(ENV.night){
    const g=new THREE.BufferGeometry(),v=[];
    for(let i=0;i<420;i++){
      const a=Math.random()*Math.PI*2,e=Math.random()*Math.PI*0.42+0.06,r=1100;
      v.push(Math.cos(a)*Math.cos(e)*r,Math.sin(e)*r,Math.sin(a)*Math.cos(e)*r);
    }
    g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
    stars=new THREE.Points(g,new THREE.PointsMaterial({color:0xdfe8ff,size:2.4,sizeAttenuation:false,fog:false}));
    scene.add(stars);
  }
  for(const c of clouds)scene.remove(c);
  clouds=[];
  if(ENV.clouds)for(let i=0;i<8;i++){
    const c=new THREE.Mesh(new THREE.IcosahedronGeometry(14+Math.random()*16,0),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.8}));
    c.scale.y=0.42;c.userData.ph=Math.random()*Math.PI*2;
    clouds.push(c);scene.add(c);
  }
}

/* road/ground/deco chunks, built on demand and disposed behind */
const chunks=new Map();
function hash01(n){let x=Math.sin(n*127.1+311.7)*43758.5453;return x-Math.floor(x);}
function buildChunk(k){
  const g=new THREE.Group();
  const i0=k*CHUNK, i1=Math.min(segs.length-1,i0+CHUNK);
  if(i0>=i1)return g;
  const rw=(roadW/2000)*RH;
  const pos=[],posL=[],posR=[],posG=[],idx=[],idxE=[],idxG=[];
  const dashPos=[],dashIdx=[];
  let vi=0,vg=0,vd=0;
  const right=(i)=>{const h=cl[Math.min(cl.length-1,i)].h;return [Math.cos(h),-Math.sin(h)];};
  for(let i=i0;i<=i1;i++){
    const p=cl[Math.min(cl.length-1,i)],r=right(i);
    pos.push(p.x-r[0]*rw,p.y,p.z-r[1]*rw, p.x+r[0]*rw,p.y,p.z+r[1]*rw);
    posL.push(p.x-r[0]*rw*1.16,p.y+0.05,p.z-r[1]*rw*1.16, p.x-r[0]*rw*0.97,p.y+0.05,p.z-r[1]*rw*0.97,
              p.x+r[0]*rw*0.97,p.y+0.05,p.z+r[1]*rw*0.97, p.x+r[0]*rw*1.16,p.y+0.05,p.z+r[1]*rw*1.16);
    posG.push(p.x-r[0]*210,p.y-0.14,p.z-r[1]*210, p.x+r[0]*210,p.y-0.14,p.z+r[1]*210);
  }
  for(let i=0;i<i1-i0;i++){
    const a=vi+i*2;
    idx.push(a,a+1,a+2, a+1,a+3,a+2);
    const b=i*4;
    if(Math.floor((i0+i)/4)%2===0){idxE.push(b,b+1,b+4, b+1,b+5,b+4, b+2,b+3,b+6, b+3,b+7,b+6);}
    const gp=vg+i*2;
    idxG.push(gp,gp+1,gp+2, gp+1,gp+3,gp+2);
  }
  /* lane divider dashes at ±1/3 road width, every other pair of segments */
  for(let i=i0;i<i1;i++){
    if(i%4>=2)continue;
    const p=cl[i],q=cl[Math.min(cl.length-1,i+1)],r1=right(i),r2=right(i+1);
    for(const s of [-1,1]){
      const o1=[p.x+s*r1[0]*rw/3,p.y+0.03,p.z+s*r1[1]*rw/3];
      const o2=[q.x+s*r2[0]*rw/3,q.y+0.03,q.z+s*r2[1]*rw/3];
      const wv=[r1[0]*0.14,r1[1]*0.14];
      dashPos.push(o1[0]-wv[0],o1[1],o1[2]-wv[1], o1[0]+wv[0],o1[1],o1[2]+wv[1],
                   o2[0]-wv[0],o2[1],o2[2]-wv[1], o2[0]+wv[0],o2[1],o2[2]+wv[1]);
      dashIdx.push(vd,vd+1,vd+2, vd+1,vd+3,vd+2);vd+=4;
    }
  }
  const mk=(p,ix,mat)=>{
    const bg=new THREE.BufferGeometry();
    bg.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
    bg.setIndex(ix);bg.computeVertexNormals();
    g.add(new THREE.Mesh(bg,mat));
  };
  mk(posG,idxG,mats.ground);
  mk(pos,idx,mats.road);
  const rumGeo=new THREE.BufferGeometry();
  rumGeo.setAttribute('position',new THREE.Float32BufferAttribute(posL,3));
  rumGeo.setIndex(idxE);rumGeo.computeVertexNormals();
  const rum=new THREE.Mesh(rumGeo,mats.rumble);g.add(rum);
  /* white edge on the alternating quads */
  const rum2=new THREE.Mesh(rumGeo.clone(),mats.line);rum2.position.y=-0.005;
  const idxE2=[];
  for(let i=0;i<i1-i0;i++){
    if(Math.floor((i0+i)/4)%2!==0){const b=i*4;idxE2.push(b,b+1,b+4, b+1,b+5,b+4, b+2,b+3,b+6, b+3,b+7,b+6);}
  }
  rum2.geometry.setIndex(idxE2);g.add(rum2);
  mk(dashPos,dashIdx,mats.line);
  /* deco: trees / cacti from the deterministic spr field + far mountains */
  for(let i=i0;i<i1;i++){
    const s=segs[i];if(!s)continue;
    if(s.spr){
      const p=pointAt(i*SEGL,s.spr.side*(1.1+s.spr.off));
      g.add(makeDeco(s.spr.type,s.spr.size,p));
    }
    if(i%16===8){
      const side=hash01(i)<0.5?-1:1;
      const p=pointAt(i*SEGL,0);
      const d=110+hash01(i*3+1)*90, hgt=22+hash01(i*7+2)*44;
      const m=new THREE.Mesh(new THREE.ConeGeometry(hgt*0.9,hgt,5),mats.mount);
      const h=cl[Math.min(cl.length-1,i)].h;
      m.position.set(p.x+Math.cos(h)*side*d,p.y-2,p.z-Math.sin(h)*side*d);
      m.rotation.y=hash01(i*13)*Math.PI;
      g.add(m);
    }
  }
  scene.add(g);
  return g;
}
function makeDeco(type,size,p){
  const grp=new THREE.Group();
  if(ENV.deco==='cactus'){
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.5*size,0.6*size,5*size,6),mats.leaf);
    t.position.y=2.5*size;grp.add(t);
    const a=new THREE.Mesh(new THREE.CylinderGeometry(0.32*size,0.32*size,2.2*size,6),mats.leaf2);
    a.position.set(1.1*size,3.4*size,0);a.rotation.z=Math.PI/2.6;grp.add(a);
  }else if(type===0){
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.32*size,0.42*size,2.4*size,6),mats.trunk);
    t.position.y=1.2*size;grp.add(t);
    const c1=new THREE.Mesh(new THREE.ConeGeometry(2.4*size,4.6*size,7),mats.leaf);
    c1.position.y=4.4*size;grp.add(c1);
    const c2=new THREE.Mesh(new THREE.ConeGeometry(1.8*size,3.4*size,7),mats.leaf2);
    c2.position.y=6.2*size;grp.add(c2);
  }else{
    const t=new THREE.Mesh(new THREE.CylinderGeometry(0.34*size,0.44*size,2.8*size,6),mats.trunk);
    t.position.y=1.4*size;grp.add(t);
    const c=new THREE.Mesh(new THREE.IcosahedronGeometry(2.3*size,0),mats.leaf);
    c.position.y=4.4*size;grp.add(c);
  }
  grp.position.set(p.x,p.y-0.3,p.z);
  return grp;
}
function ensureChunks(){
  const kNow=Math.floor(pos/SEGL/CHUNK);
  const want=new Set([kNow-1,kNow,kNow+1,kNow+2]);
  for(const k of want){
    if(k<0||k*CHUNK>=segs.length)continue;
    if(!chunks.has(k))chunks.set(k,buildChunk(k));
  }
  for(const [k,g] of chunks){
    if(want.has(k))continue;
    scene.remove(g);
    g.traverse(o=>{if(o.geometry)o.geometry.dispose();});
    chunks.delete(k);
  }
}
function clearChunks(){
  for(const [,g] of chunks){scene.remove(g);g.traverse(o=>{if(o.geometry)o.geometry.dispose();});}
  chunks.clear();
}

/* low-poly car */
function makeCar(col,isPlayer){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.1,0.72,4.3),
    new THREE.MeshLambertMaterial({color:col,flatShading:true}));
  body.position.y=0.62;g.add(body);
  g.userData.body=body;
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.62,2.1),
    new THREE.MeshLambertMaterial({color:0x2b2f3a,flatShading:true}));
  cab.position.set(0,1.22,-0.25);g.add(cab);
  const glass=new THREE.Mesh(new THREE.BoxGeometry(1.55,0.4,0.06),
    new THREE.MeshLambertMaterial({color:0x9fd0e8}));
  glass.position.set(0,1.2,0.85);g.add(glass);
  const wg=new THREE.BoxGeometry(0.42,0.66,0.66);
  const wm=new THREE.MeshLambertMaterial({color:0x14161c});
  for(const [wx,wz] of [[-1.05,1.35],[1.05,1.35],[-1.05,-1.45],[1.05,-1.45]]){
    const w=new THREE.Mesh(wg,wm);w.position.set(wx,0.36,wz);g.add(w);
  }
  const hl=new THREE.Mesh(new THREE.BoxGeometry(0.44,0.2,0.06),
    new THREE.MeshBasicMaterial({color:ENV.night?0xfff6c8:0xd8d8c0}));
  hl.position.set(-0.62,0.62,2.16);g.add(hl.clone().translateX(1.24));g.add(hl);
  const tl=new THREE.Mesh(new THREE.BoxGeometry(0.44,0.18,0.06),
    new THREE.MeshBasicMaterial({color:ENV.night?0xff4040:0x8a2020}));
  tl.position.set(-0.62,0.62,-2.16);g.add(tl.clone().translateX(1.24));g.add(tl);
  const sh=new THREE.Mesh(new THREE.CircleGeometry(2.4,14),mats.shadow);
  sh.rotation.x=-Math.PI/2;sh.position.y=0.02;sh.scale.set(1,0.92,1);g.add(sh);
  if(isPlayer&&ENV.night){
    headlight=new THREE.SpotLight(0xfff2c0,180,90,0.5,0.5,1.4);
    headlight.position.set(0,1.2,2);
    const tgt=new THREE.Object3D();tgt.position.set(0,0,30);g.add(tgt);
    headlight.target=tgt;g.add(headlight);
  }
  return g;
}
let player=null,finish=null;
function makeFinish(){
  const g=new THREE.Group(),rw=(roadW/2000)*RH;
  const pm=new THREE.MeshLambertMaterial({color:0xcccccc});
  for(const s of [-1,1]){
    const post=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,7,8),pm);
    post.position.set(s*rw*1.1,3.5,0);g.add(post);
  }
  for(let q=0;q<10;q++)for(let r=0;r<2;r++){
    const b=new THREE.Mesh(new THREE.BoxGeometry(rw*2.2/10,0.55,0.12),
      new THREE.MeshBasicMaterial({color:(q+r)%2?0x111111:0xffffff}));
    b.position.set(-rw*1.1+rw*2.2/10*(q+0.5),6.6-r*0.55,0);g.add(b);
  }
  const p=pointAt(courseEnd,0);
  g.position.set(p.x,p.y,p.z);g.rotation.y=p.h;
  return g;
}

/* ---------- world (re)build for a run ---------- */
function buildWorld(){
  camInit=false;prevPX=playerX;
  clearChunks();
  if(player){scene.remove(player);player=null;}
  if(finish){scene.remove(finish);finish=null;}
  headlight=null;
  mats=makeMats();
  applyEnv();
  player=makeCar(0xe8734a,true);scene.add(player);
  if(mode==='level'){finish=makeFinish();scene.add(finish);}
  initCars();
  ensureChunks();
}

/* ---------- flow ---------- */
function resetRun(){speed=0;pos=0;playerX=0;stylePts=0;combo=0;invuln=0;crashes=0;shake=0;steerS=0;yawS=0;}
function startEndless(e,z){
  mode='endless';zen=!!z;envIdx=e;ENV=ENVS[e];cfgNow=endlessCfg(ENV);
  if(zen)cfgNow.traffic=0;
  genRoad(cfgNow);resetRun();buildWorld();
  state='play';$('ov').classList.add('hidden');$('mm').classList.remove('hidden');
  $('progl').textContent=(zen?'zen · ':'')+ENV.name.toLowerCase();$('prog').textContent='∞';
  audio();
}
function startLevel(n){
  mode='level';lvl=n;envIdx=(n-1)%3;ENV=ENVS[envIdx];cfgNow=levelCfg(n);
  genRoad(cfgNow);resetRun();buildWorld();
  state='play';$('ov').classList.add('hidden');$('mm').classList.remove('hidden');
  $('progl').textContent='level '+n;
  audio();
}
function overlay(h,p,btn,menuMode){
  $('ovh').textContent=h;$('ovp').innerHTML=p;
  $('envs').style.display=menuMode?'':'none';
  $('go').style.display=menuMode?'none':'';
  if(btn)$('go').textContent=btn;
  $('go2').style.display=menuMode?'':'none';
  $('goMenu').style.display=menuMode?'none':'';
  $('mm').classList.add('hidden');
  $('ov').classList.remove('hidden');
}
function menu(){
  state='menu';
  paintZen();
  overlay('🛣️ Chill Drive 3D',
    'Cruise, overtake, survive — 5 crashes end your run.<br>Pick your endless world · close overtakes earn style · ↑↓ speed · ←→ steer',
    null,true);
  $('lvlt').style.display='';$('lvls').style.display='';
  const u=unlocked(), box=$('lvls');
  let html='';
  for(let i=1;i<=N_LEVELS;i++)
    html+=`<button data-l="${i}" ${i>u?'disabled':''} class="${i<u?'done':''}">${i}</button>`;
  box.innerHTML=html;
}
function endRun(won){
  state='over';
  $('lvlt').style.display='none';$('lvls').style.display='none';
  if(mode==='endless'){
    sfx.lose();
    overlay('🔚 Run over!',
      `Five crashes — the cruise is done.<br>Distance <b>${Math.floor(pos/METER)} m</b> · Style <b>${stylePts}</b> · Score <b>${Math.floor(pos/METER)+stylePts}</b>`,
      'DRIVE AGAIN');
  }else if(won){
    sfx.win();
    if(lvl+1>unlocked()&&lvl<N_LEVELS){localStorage.setItem('pb_cd_lvl',lvl+1);cdPush();}
    overlay('🏁 Level '+lvl+' done!',
      `Crashes used: <b>${crashes}/${MAX_CRASH}</b> · Style <b>${stylePts}</b>`,
      lvl<N_LEVELS?'NEXT LEVEL ▶':'BACK TO MENU');
    state='won';
  }else{
    sfx.lose();
    overlay('💥 Wrecked!',
      `Five crashes before the finish of level ${lvl}.`,
      'RETRY LEVEL');
    state='failed';
  }
}
$('go').onclick=()=>{
  if(state==='won')lvl<N_LEVELS?startLevel(lvl+1):menu();
  else if(state==='failed')startLevel(lvl);
  else startEndless(envIdx,zen);
};
let zenSel=false;
function paintZen(){
  $('go2').textContent=zenSel?'🧘 ZEN ON — pick a world above':'🧘 ZEN DRIVE — no traffic';
  $('go2').style.background=zenSel?'#5dd18a':'#9be89b';
  $('go2').style.boxShadow=zenSel?'0 0 0 3px #fff inset':'none';
}
$('go2').onclick=()=>{zenSel=!zenSel;paintZen();};
$('goMenu').onclick=()=>menu();
$('mm').onclick=()=>menu();
$('e0').onclick=()=>startEndless(0,zenSel);
$('e1').onclick=()=>startEndless(1,zenSel);
$('e2').onclick=()=>startEndless(2,zenSel);
$('lvls').addEventListener('click',(e)=>{
  const l=e.target&&e.target.dataset?e.target.dataset.l:null;
  if(l)startLevel(+l);
});

/* ---------- input ---------- */
const KEY={ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'};
document.addEventListener('keydown',(e)=>{
  if(KEY[e.key])keys[KEY[e.key]]=true;
  if((e.key===' '||e.key==='Enter')&&state!=='play'&&state!=='menu')$('go').click();
  if(e.key==='Escape'&&state==='play'){menu();return;}
  if(e.key!=='Escape')e.preventDefault();
});
document.addEventListener('keyup',(e)=>{if(KEY[e.key])keys[KEY[e.key]]=false;});

/* ---------- simulation (identical rules to the classic version) ---------- */
let popT=0;
function pop(txt,col){$('pop').textContent=txt;$('pop').style.color=col;$('pop').style.opacity=1;popT=70;}
function update(){
  if(state!=='play')return;
  time++;
  const grade=Math.max(-0.9,Math.min(0.9,(segAt(pos+400).y-segAt(pos).y)/400));
  if(keys.up)speed=Math.min(speed+ACCEL,MAXV);
  else if(keys.down)speed=Math.max(speed-BRAKE,0);
  else speed*=COAST;
  speed=Math.max(0,Math.min(speed-grade*GRADE_F,MAXV*DOWN_MAX));
  const sp=speed/MAXV;
  const steerT=(keys.right?1:0)-(keys.left?1:0);
  steerS+=(steerT-steerS)*0.14;
  playerX+=STEER_F*sp*3.6*steerS;
  playerX=Math.max(-2.4,Math.min(2.4,playerX));
  const offRoad=Math.abs(playerX)>1.05;
  if(offRoad){
    if(speed>GRASS_CAP)speed*=GRASS_DRAG;
    shake=Math.max(shake,Math.min(5,sp*8));
    combo=0;
  }
  pos+=speed*TS;
  if(mode==='endless'&&pos/SEGL>segs.length-450)extendRoad();
  if(invuln>0)invuln--;
  for(const car of cars){
    car.z+=car.v*TS;
    if(car.z<pos-3000||car.z>pos+SEGL*DRAW*1.6){
      const m=car.mesh;
      Object.assign(car,spawnCar(0));car.mesh=m;
      car.z=pos+SEGL*DRAW+Math.random()*SEGL*DRAW*0.5;
      for(let tries=0;tries<8&&cars.some(o=>o!==car&&Math.abs(o.z-car.z)<1700);tries++)
        car.z+=1400+Math.random()*900;
      if(car.mesh.userData.body)car.mesh.userData.body.material.color.set(car.col);
    }
    const ahead=car.z-pos;
    if(!car.passed&&ahead<0){
      car.passed=true;
      const gap=Math.abs(car.x-playerX);
      if(gap<NEAR_W&&speed>118&&!offRoad&&invuln===0){
        combo++;const pts=25*combo;stylePts+=pts;
        pop('+'+pts+(combo>1?'  x'+combo:''),'#ffcc66');
        sfx.whoosh();
      }
    }
    if(car.passed&&ahead>SEGL)car.passed=false;
    if(invuln===0&&ahead>0&&ahead<CAR_LEN&&Math.abs(car.x-playerX)<CAR_W){
      speed=Math.min(speed,18);car.v=Math.max(car.v,80);
      invuln=INVULN;combo=0;shake=12;
      $('flash').style.opacity=0.35;
      sfx.crash();
      crashes++;
      pop(crashes>=MAX_CRASH?'WRECKED!':'CRASH!','#ff6b6b');
      if(crashes>=MAX_CRASH){endRun(false);break;}
    }
  }
  if(state==='play'&&mode==='level'&&pos>=courseEnd)endRun(true);
  window.score=Math.max(window.score||0,Math.floor(pos/METER)+stylePts);
  $('spd').textContent=Math.floor(speed*KMH);
  $('dist').textContent=Math.floor(pos/METER);
  $('style').textContent=stylePts;
  const left=Math.max(0,MAX_CRASH-crashes);
  $('lives').textContent=zen?'∞':'♥'.repeat(left)+'♡'.repeat(MAX_CRASH-left);
  if(mode==='level')$('prog').textContent=Math.min(100,Math.floor(pos/courseEnd*100))+'%';
}

/* ---------- 3D frame sync ---------- */
const camPos=new THREE.Vector3(0,6,-14),camLook=new THREE.Vector3();
let camInit=false,prevPX=0,yawS=0;
function sync(){
  ensureChunks();
  const lean=steerS, sp=speed/MAXV;
  const pp=pointAt(pos,playerX);
  const dPX=playerX-prevPX;prevPX=playerX;
  if(player){
    player.position.set(pp.x,pp.y,pp.z);
    yawS+=(Math.max(-0.42,Math.min(0.42,-dPX*9))-yawS)*0.22;
    player.rotation.y=pp.h+yawS;
    player.rotation.z=lean*0.06*sp;
    player.visible=!(invuln>0&&Math.floor(time/5)%2===1);
  }
  for(const car of cars){
    if(!car.mesh)continue;
    const cp=pointAt(car.z,car.x);
    car.mesh.position.set(cp.x,cp.y,cp.z);
    car.mesh.rotation.y=cp.h;
  }
  const back=pointAt(Math.max(0,pos-560),playerX*0.8);
  const tx=back.x,ty=back.y+4.6,tz=back.z;
  if(!camInit){camPos.set(tx,ty,tz);camInit=true;}
  camPos.lerp(new THREE.Vector3(tx,ty,tz),0.5);
  let sx=0,sy=0;
  if(shake>0.3){sx=(Math.random()-0.5)*shake*0.09;sy=(Math.random()-0.5)*shake*0.09;shake*=0.86;}
  camera.position.set(camPos.x+sx,camPos.y+sy,camPos.z);
  const ahead=pointAt(pos+240,playerX*0.5);
  camLook.set(ahead.x,ahead.y+1.8,ahead.z);
  camera.lookAt(camLook);
  camera.fov=74+sp*8;camera.updateProjectionMatrix();
  if(sunBall){
    sunBall.position.set(camera.position.x-500,ENV.night?330:210,camera.position.z+620);
  }
  if(stars)stars.position.copy(camera.position);
  for(let i=0;i<clouds.length;i++){
    const c=clouds[i],a=c.userData.ph+time*0.0004+i*0.8;
    c.position.set(camera.position.x+Math.cos(a)*420,140+Math.sin(i*3.3)*40,camera.position.z+Math.sin(a)*420);
  }
  const f=parseFloat($('flash').style.opacity)||0;
  if(f>0.01)$('flash').style.opacity=f*0.88;else $('flash').style.opacity=0;
  if(popT>0){popT--;$('pop').style.opacity=Math.min(1,popT/35);}
}

/* ---------- loop ---------- */
function loop(){
  requestAnimationFrame(loop);
  if(state==='play')update();
  else if(state==='menu'){pos+=3.2;time++;if(pos/SEGL>segs.length-450)extendRoad();}
  sync();
  renderer.render(scene,camera);
  if(AC&&engG&&!muted)engG.gain.value=state==='play'?0.018+(speed/MAXV)*0.03:0;
  if(AC&&eng)eng.frequency.value=50+(speed/MAXV)*175;
}
window.score=0;
/* menu backdrop: a slow meadow cruise behind the overlay */
mode='endless';ENV=ENVS[0];cfgNow=endlessCfg(ENV);cfgNow.traffic=0;
genRoad(cfgNow);resetRun();buildWorld();
menu();loop();
</script>
