<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Wars - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(255,100,50,0.3);max-width:100vw;max-height:100vh}
#info{position:absolute;top:15px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;z-index:10;text-align:center;background:rgba(0,0,0,0.4);padding:6px 16px;border-radius:15px}
#menu{position:fixed;inset:0;background:rgba(10,10,26,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:30;color:#fff}
#menu h1{font-size:34px;letter-spacing:2px;color:#ff8844;text-shadow:0 0 18px rgba(255,136,68,0.6)}
#menu button{width:280px;padding:13px;font-size:17px;font-weight:bold;border:none;border-radius:12px;cursor:pointer;background:#3a2820;color:#fff}
#menu button:hover{background:#553a2c}
#menu .join{display:flex;gap:8px;width:280px}
#menu .join input{flex:1;min-width:0;padding:12px;border-radius:12px;border:1px solid #6a4a2a;background:#281a0e;color:#fff;font-size:17px;text-transform:lowercase;text-align:center}
#menu .join button{width:auto;padding:12px 20px}
#mStatus{min-height:24px;font-size:16px;color:#e8b07f;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="info">🔴 P1: WASD + Space shoot · 🔵 P2: Arrows + Enter shoot</div>
<canvas id="c" width="900" height="550"></canvas>
<div id="menu">
  <h1>TANK WARS</h1>
  <button id="mLocal">👥 2 Players — one device</button>
  <button id="mAI">🤖 vs Computer</button>
  <button id="mHost">🌐 Host online game</button>
  <div class="join"><input id="mCode" maxlength="5" placeholder="code" autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false"><button id="mJoin">Join</button></div>
  <div id="mStatus"></div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let keys={},bullets=[],walls=[],particles=[];
let p1={x:100,y:275,angle:0,color:'#ff4444',hp:5,score:0,cooldown:0,name:'P1'};
let p2={x:800,y:275,angle:Math.PI,color:'#4488ff',hp:5,score:0,cooldown:0,name:'P2'};

function genWalls(){
  walls=[];
  for(let i=0;i<12;i++){
    let w=20+Math.random()*60,h=20+Math.random()*60;
    let x=150+Math.random()*(C.width-300),y=50+Math.random()*(C.height-100);
    walls.push({x,y,w,h});
  }
}
genWalls();

/* ---------- modes + online ---------- */
let mode=null,running=false,netFrame=0,lastT=0,resetPending=false;
const remoteKeys={u:0,d:0,l:0,r:0,f:0};
let guestState=null;
const NET={open(code,role){parent.postMessage({__pbNet:{op:'open',code,role}},'*')},
 send(d){parent.postMessage({__pbNet:{op:'send',d}},'*')},
 onMsg:null,onPeers:null,onErr:null};
window.addEventListener('message',e=>{const d=e.data;if(!d)return;
 if(d.__pbNetMsg&&NET.onMsg)NET.onMsg(d.__pbNetMsg.r,d.__pbNetMsg.d);
 if(d.__pbNetPeers&&NET.onPeers)NET.onPeers(d.__pbNetPeers);
 if(d.__pbNetErr&&NET.onErr)NET.onErr(d.__pbNetErr)});
const menu=document.getElementById('menu'),mStatus=document.getElementById('mStatus');
const status=(t)=>mStatus.textContent=t;
const randCode=()=>Math.random().toString(36).replace(/[^a-z0-9]/g,'').slice(0,5).padEnd(5,'x');
function begin(){
  p1.score=0;p2.score=0;resetRoundNow();running=true;menu.classList.add('hidden');
  if(mode==='host')NET.send({t:'w',w:walls});
  document.getElementById('info').textContent=
    mode==='local'?'🔴 P1: WASD + Space · 🔵 P2: Arrows + Enter':
    mode==='ai'?'🔴 You: WASD/Arrows + Space to shoot':
    'You are '+(mode==='host'?'🔴 RED':'🔵 BLUE')+' · WASD/Arrows + Space to shoot';}
function backToMenu(msg){running=false;mode=null;parent.postMessage({__pbNet:{op:'close'}},'*');
  menu.classList.remove('hidden');status(msg||'')}
document.getElementById('mLocal').onclick=()=>{mode='local';begin()};
document.getElementById('mAI').onclick=()=>{mode='ai';begin()};
document.getElementById('mHost').onclick=()=>{mode='host';const c=randCode();NET.open(c,'host');
  status('Room code: '+c.toUpperCase()+' — waiting for the other iPad…')};
document.getElementById('mJoin').onclick=()=>{const c=(document.getElementById('mCode').value||'').trim().toLowerCase();
  if(!/^[a-z0-9]{4,6}$/.test(c)){status('Enter the 4-6 letter code from the host');return}
  mode='guest';NET.open(c,'guest');status('Joining '+c.toUpperCase()+'…')};
NET.onPeers=(p)=>{
  if(!running&&(mode==='host'||mode==='guest')&&p.n>=2)begin();
  if(running&&(mode==='host'||mode==='guest')&&p.n<2)backToMenu('Opponent left the game.')};
NET.onErr=(e)=>{if(mode==='host'||mode==='guest')backToMenu(e==='offline'?'Online play needs the internet.':'Connection problem — try again.')};
NET.onMsg=(r,d)=>{
  if(mode==='host'&&d&&d.t==='k')Object.assign(remoteKeys,d.k);
  if(mode==='guest'&&d&&d.t==='s')guestState=d;
  if(mode==='guest'&&d&&d.t==='w')walls=d.w;
};
const meU=()=>keys['w']||keys['W']||keys['ArrowUp'],meD=()=>keys['s']||keys['S']||keys['ArrowDown'],
      meL=()=>keys['a']||keys['A']||keys['ArrowLeft'],meR=()=>keys['d']||keys['D']||keys['ArrowRight'],
      meF=()=>keys[' ']||keys['Enter'];
function sendKeys(){NET.send({t:'k',k:{u:+!!meU(),d:+!!meD(),l:+!!meL(),r:+!!meR(),f:+!!meF()}})}

/* ---------- AI tank ---------- */
let aiWander=0;
function aiKeys(){
  const dx=p1.x-p2.x,dy=p1.y-p2.y,dist=Math.hypot(dx,dy);
  let want=Math.atan2(dy,dx);
  if(Math.random()<0.01)aiWander=(Math.random()-0.5)*1.2;
  if(dist>220)want+=aiWander*0.4;                    // approach loosely
  let da=want-p2.angle;
  while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
  const aligned=Math.abs(da)<0.12;
  // stuck against a wall? reverse and turn
  const nx=p2.x+Math.cos(p2.angle)*3,ny=p2.y+Math.sin(p2.angle)*3;
  let blocked=false;
  for(let w of walls)if(nx>w.x-18&&nx<w.x+w.w+18&&ny>w.y-14&&ny<w.y+w.h+14)blocked=true;
  return{l:+(da<-0.06),r:+(da>0.06),u:+(!blocked&&dist>140),d:+blocked,
    f:+(aligned&&dist<420&&Math.random()<0.5)};
}

function drawTank(t){
  X.save();X.translate(t.x,t.y);X.rotate(t.angle);
  X.fillStyle=t.color;X.shadowColor=t.color;X.shadowBlur=10;
  X.fillRect(-18,-14,36,28);
  X.fillStyle=t.color;X.fillRect(-4,-4,30,8);
  X.beginPath();X.arc(0,0,10,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,0.3)';X.beginPath();X.arc(-2,-2,5,0,Math.PI*2);X.fill();
  X.shadowBlur=0;X.restore();
  X.fillStyle='#333';X.fillRect(t.x-20,t.y-25,40,5);
  X.fillStyle=t.hp>2?'#4f4':'#f44';X.fillRect(t.x-20,t.y-25,40*(t.hp/5),5);
}

function moveTank(t,fwd,back,left,right,m){
  let spd=0;
  if(fwd)spd=2.5*m;if(back)spd=-1.5*m;
  if(left)t.angle-=0.04*m;if(right)t.angle+=0.04*m;
  let nx=t.x+Math.cos(t.angle)*spd,ny=t.y+Math.sin(t.angle)*spd;
  let blocked=false;
  for(let w of walls){if(nx>w.x-18&&nx<w.x+w.w+18&&ny>w.y-14&&ny<w.y+w.h+14)blocked=true}
  if(nx<20||nx>C.width-20||ny<20||ny>C.height-20)blocked=true;
  if(!blocked){t.x=nx;t.y=ny}
  if(t.cooldown>0)t.cooldown-=m;
}

function shoot(t,firing){
  if(firing&&t.cooldown<=0){
    t.cooldown=20;
    bullets.push({x:t.x+Math.cos(t.angle)*25,y:t.y+Math.sin(t.angle)*25,
      vx:Math.cos(t.angle)*6,vy:Math.sin(t.angle)*6,owner:t,life:80,bounces:1});
  }
}

function addParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*15,color});
  }
}

function resetRoundNow(){
  p1.x=100;p1.y=275;p1.angle=0;p1.hp=5;p1.cooldown=0;
  p2.x=800;p2.y=275;p2.angle=Math.PI;p2.hp=5;p2.cooldown=0;
  bullets=[];particles=[];genWalls();resetPending=false;
  if(mode==='host')NET.send({t:'w',w:walls});
}

const lerpAngle=(a,b,f)=>{let d=b-a;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return a+d*f};

function loop(ts){
  requestAnimationFrame(loop);
  const m=lastT?Math.min(2.5,Math.max(0.4,(ts-lastT)/16.667)):1;lastT=ts;
  X.fillStyle='#1a1a2e';X.fillRect(0,0,C.width,C.height);
  X.strokeStyle='rgba(255,255,255,0.03)';X.lineWidth=1;
  for(let i=0;i<C.width;i+=40){X.beginPath();X.moveTo(i,0);X.lineTo(i,C.height);X.stroke()}
  for(let i=0;i<C.height;i+=40){X.beginPath();X.moveTo(0,i);X.lineTo(C.width,i);X.stroke()}

  if(running){
    if(mode==='guest'){
      if(guestState){
        const a=guestState.a,b=guestState.b;
        p1.x+=(a.x-p1.x)*0.4;p1.y+=(a.y-p1.y)*0.4;p1.angle=lerpAngle(p1.angle,a.an,0.4);p1.hp=a.hp;p1.score=a.sc;
        p2.x+=(b.x-p2.x)*0.4;p2.y+=(b.y-p2.y)*0.4;p2.angle=lerpAngle(p2.angle,b.an,0.4);p2.hp=b.hp;p2.score=b.sc;
        bullets=guestState.bl.map(q=>({x:q[0],y:q[1],vx:0,vy:0,life:1,bounces:0,owner:null}));
      }
      if(++netFrame%5===0)sendKeys();
    }else{
      if(mode==='local'){
        moveTank(p1,keys['w']||keys['W'],keys['s']||keys['S'],keys['a']||keys['A'],keys['d']||keys['D'],m);
        moveTank(p2,keys['ArrowUp'],keys['ArrowDown'],keys['ArrowLeft'],keys['ArrowRight'],m);
        shoot(p1,keys[' ']);shoot(p2,keys['Enter']);
      }else{
        moveTank(p1,meU(),meD(),meL(),meR(),m);
        shoot(p1,meF());
        const k=mode==='ai'?aiKeys():remoteKeys;
        moveTank(p2,k.u,k.d,k.l,k.r,m);
        shoot(p2,k.f);
      }
      // bullets
      for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];b.x+=b.vx*m;b.y+=b.vy*m;b.life-=m;
        let dead=false;
        for(let w of walls){
          if(b.x>w.x&&b.x<w.x+w.w&&b.y>w.y&&b.y<w.y+w.h){
            if(b.bounces>0){b.bounces--;b.vx*=-1;b.vy*=-1;addParticles(b.x,b.y,'#ff8',5)}
            else{dead=true;addParticles(b.x,b.y,'#ff8',8)}
          }
        }
        if(b.x<0||b.x>C.width){if(b.bounces>0){b.bounces--;b.vx*=-1}else dead=true}
        if(b.y<0||b.y>C.height){if(b.bounces>0){b.bounces--;b.vy*=-1}else dead=true}
        if(b.life<=0)dead=true;
        if(!dead&&!resetPending){
          let target=b.owner===p1?p2:p1;
          if(Math.hypot(b.x-target.x,b.y-target.y)<20){
            target.hp--;addParticles(b.x,b.y,target.color,15);dead=true;
            if(target.hp<=0){b.owner.score++;addParticles(target.x,target.y,target.color,40);
              if(mode==='ai'&&b.owner===p1)window.score=Math.max(window.score||0,p1.score);
              resetPending=true;setTimeout(resetRoundNow,1000)}
          }
        }
        if(dead)bullets.splice(i,1);
      }
      if(mode==='host'&&++netFrame%5===0)
        NET.send({t:'s',a:{x:Math.round(p1.x),y:Math.round(p1.y),an:+p1.angle.toFixed(2),hp:p1.hp,sc:p1.score},
                        b:{x:Math.round(p2.x),y:Math.round(p2.y),an:+p2.angle.toFixed(2),hp:p2.hp,sc:p2.score},
                        bl:bullets.map(b=>[Math.round(b.x),Math.round(b.y)])});
    }
  }

  for(let w of walls){
    X.fillStyle='#3a3a5a';X.shadowColor='#5a5a8a';X.shadowBlur=5;
    X.fillRect(w.x,w.y,w.w,w.h);X.shadowBlur=0;
    X.strokeStyle='#5a5a7a';X.lineWidth=1;X.strokeRect(w.x,w.y,w.w,w.h);
  }
  for(let b of bullets){
    X.fillStyle='#ffcc00';X.shadowColor='#ffcc00';X.shadowBlur=8;
    X.beginPath();X.arc(b.x,b.y,4,0,Math.PI*2);X.fill();X.shadowBlur=0;
  }
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}
    X.globalAlpha=p.life/30;X.fillStyle=p.color;
    X.fillRect(p.x-2,p.y-2,4,4);X.globalAlpha=1;
  }
  drawTank(p1);drawTank(p2);
  X.font='bold 22px Segoe UI';X.textAlign='left';
  const n1=mode==='ai'?'You':(mode==='host'?'You':mode==='guest'?'Them':'P1');
  const n2=mode==='ai'?'CPU':(mode==='guest'?'You':mode==='host'?'Them':'P2');
  X.fillStyle='#ff4444';X.fillText(n1+': '+p1.score,20,C.height-15);
  X.textAlign='right';X.fillStyle='#4488ff';X.fillText(n2+': '+p2.score,C.width-20,C.height-15);
}
document.addEventListener('keydown',e=>{keys[e.key]=true;
  if(running&&(e.key==='m'||e.key==='M'))backToMenu();
  if(mode==='guest')sendKeys();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false;if(mode==='guest')sendKeys()});
requestAnimationFrame(loop);
</script>
</body>
</html>
