<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asteroid Storm - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{border-radius:12px}
</style>
</head>
<body>
<canvas id="c" width="700" height="500"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let ship,asteroids,bullets,particles,score,lives,gameOver,keys={},frame=0;
function start(){
  ship={x:350,y:250,angle:0,vx:0,vy:0,invuln:60};
  asteroids=[];bullets=[];particles=[];score=0;lives=3;gameOver=false;
  for(let i=0;i<5;i++)spawnAsteroid(3);
}
function spawnAsteroid(size,x,y){
  x=x||Math.random()*C.width;y=y||Math.random()*C.height;
  if(Math.hypot(x-ship.x,y-ship.y)<100){x=(x+300)%C.width}
  let a=Math.random()*Math.PI*2,s=0.5+Math.random()*1.5;
  let verts=[];for(let i=0;i<8;i++){let ang=i/8*Math.PI*2;verts.push({r:size*12+Math.random()*size*8,a:ang})}
  asteroids.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size,verts,rot:0,rv:(Math.random()-0.5)*0.02});
}
function addP(x,y,c,n){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*3;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*10,color:c})}}

function loop(){
  frame++;
  X.fillStyle='#000';X.fillRect(0,0,C.width,C.height);
  X.fillStyle='#fff';for(let i=0;i<50;i++){X.globalAlpha=0.15;X.fillRect((i*137)%C.width,(i*97)%C.height,1,1)}X.globalAlpha=1;

  if(!gameOver){
    if(keys['ArrowLeft']||keys['a'])ship.angle-=0.05;
    if(keys['ArrowRight']||keys['d'])ship.angle+=0.05;
    if(keys['ArrowUp']||keys['w']){ship.vx+=Math.cos(ship.angle)*0.12;ship.vy+=Math.sin(ship.angle)*0.12;
      addP(ship.x-Math.cos(ship.angle)*15,ship.y-Math.sin(ship.angle)*15,'#ff8800',1)}
    if(keys[' ']&&frame%8===0)bullets.push({x:ship.x+Math.cos(ship.angle)*18,y:ship.y+Math.sin(ship.angle)*18,vx:Math.cos(ship.angle)*7,vy:Math.sin(ship.angle)*7,life:50});
    ship.vx*=0.99;ship.vy*=0.99;ship.x=(ship.x+ship.vx+C.width)%C.width;ship.y=(ship.y+ship.vy+C.height)%C.height;
    if(ship.invuln>0)ship.invuln--;
  }

  // Asteroids
  for(let a of asteroids){
    a.x=(a.x+a.vx+C.width)%C.width;a.y=(a.y+a.vy+C.height)%C.height;a.rot+=a.rv;
    X.strokeStyle='#aaa';X.lineWidth=1.5;X.beginPath();
    for(let j=0;j<a.verts.length;j++){
      let v=a.verts[j],px=a.x+Math.cos(v.a+a.rot)*v.r,py=a.y+Math.sin(v.a+a.rot)*v.r;
      j===0?X.moveTo(px,py):X.lineTo(px,py);
    }X.closePath();X.stroke();
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<0||b.x>C.width||b.y<0||b.y>C.height){bullets.splice(i,1);continue}
    let hit=false;
    for(let j=asteroids.length-1;j>=0;j--){
      if(Math.hypot(b.x-asteroids[j].x,b.y-asteroids[j].y)<asteroids[j].size*14){
        let a=asteroids[j];addP(a.x,a.y,'#ffcc00',10);
        score+=a.size===3?20:a.size===2?50:100;
        if(a.size>1){spawnAsteroid(a.size-1,a.x,a.y);spawnAsteroid(a.size-1,a.x,a.y)}
        asteroids.splice(j,1);hit=true;break;
      }
    }
    if(hit){bullets.splice(i,1);continue}
    X.fillStyle='#0ff';X.shadowColor='#0ff';X.shadowBlur=6;
    X.beginPath();X.arc(b.x,b.y,2.5,0,Math.PI*2);X.fill();X.shadowBlur=0;
  }

  // Ship-asteroid collision
  if(ship.invuln<=0&&!gameOver){
    for(let a of asteroids){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.size*12+10){
        lives--;addP(ship.x,ship.y,'#ff4444',20);ship.invuln=90;
        if(lives<=0){gameOver=true}break;
      }
    }
  }

  // Respawn asteroids
  if(asteroids.length===0&&!gameOver){for(let i=0;i<5+Math.floor(score/500);i++)spawnAsteroid(3)}

  // Draw ship
  if(!gameOver&&(ship.invuln<=0||frame%4<2)){
    X.save();X.translate(ship.x,ship.y);X.rotate(ship.angle);
    X.strokeStyle='#0ff';X.lineWidth=2;X.shadowColor='#0ff';X.shadowBlur=8;
    X.beginPath();X.moveTo(18,0);X.lineTo(-12,-10);X.lineTo(-8,0);X.lineTo(-12,10);X.closePath();X.stroke();
    X.shadowBlur=0;X.restore();
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}X.globalAlpha=p.life/25;X.fillStyle=p.color;
    X.fillRect(p.x-1.5,p.y-1.5,3,3)}X.globalAlpha=1;

  // HUD
  X.fillStyle='#fff';X.font='18px Segoe UI';X.textAlign='left';X.fillText('Score: '+score,15,30);
  X.textAlign='right';X.fillText('❤️'.repeat(lives),C.width-15,30);

  if(gameOver){
    X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,C.width,C.height);
    X.textAlign='center';X.fillStyle='#0ff';X.font='bold 42px Segoe UI';X.fillText('GAME OVER',C.width/2,220);
    X.fillStyle='#fff';X.font='22px Segoe UI';X.fillText('Score: '+score,C.width/2,270);
    X.fillText('Press SPACE',C.width/2,310);
  }
  requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){if(gameOver)start();e.preventDefault()}});
document.addEventListener('keyup',e=>{keys[e.key]=false});
start();loop();
</script>
</body>
</html>
