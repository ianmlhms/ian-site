<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2048 - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff}
#hud{margin-bottom:15px;display:flex;gap:20px;font-size:18px}
.stat{background:#1a1a2e;padding:8px 18px;border-radius:10px}
.stat b{color:#ffcc00}
#board{display:grid;grid-template-columns:repeat(4,80px);gap:8px;background:#1a1a2e;padding:10px;border-radius:14px;box-shadow:0 0 30px rgba(255,200,0,0.15)}
.cell{width:80px;height:80px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:24px;transition:all 0.1s}
#msg{margin-top:15px;font-size:20px;min-height:30px}
button{margin-top:10px;padding:8px 24px;background:#ffcc00;color:#0a0a1a;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px}
</style>
</head>
<body>
<div id="hud"><div class="stat">Score: <b id="sc">0</b></div><div class="stat">Best: <b id="best">0</b></div></div>
<div id="board"></div>
<div id="msg"></div>
<button onclick="init()">New Game</button>
<script>
const COLORS={0:'#2a2a3a',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
const TXTC={0:'transparent',2:'#776e65',4:'#776e65',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#fff',256:'#fff',512:'#fff',1024:'#fff',2048:'#fff'};
let grid,score,best=0,over;
function init(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;over=false;document.getElementById('msg').textContent='';
  addTile();addTile();render();
}
function addTile(){
  let empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  let[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}
function slide(row){
  let a=row.filter(v=>v),merged=[];
  for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);merged.push(i)}}
  while(a.length<4)a.push(0);
  return a;
}
function move(dir){
  if(over)return;
  let moved=false,prev=JSON.stringify(grid);
  if(dir==='left')for(let r=0;r<4;r++)grid[r]=slide(grid[r]);
  if(dir==='right')for(let r=0;r<4;r++)grid[r]=slide(grid[r].reverse()).reverse();
  if(dir==='up'){for(let c=0;c<4;c++){let col=slide([grid[0][c],grid[1][c],grid[2][c],grid[3][c]]);for(let r=0;r<4;r++)grid[r][c]=col[r]}}
  if(dir==='down'){for(let c=0;c<4;c++){let col=slide([grid[3][c],grid[2][c],grid[1][c],grid[0][c]]).reverse();for(let r=0;r<4;r++)grid[r][c]=col[r]}}
  if(JSON.stringify(grid)!==prev){addTile();if(score>best)best=score;checkOver();render()}
}
function checkOver(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return;
    if(grid[r][c]===2048){document.getElementById('msg').textContent='🎉 You reached 2048!';return}
    if(c<3&&grid[r][c]===grid[r][c+1])return;
    if(r<3&&grid[r][c]===grid[r+1][c])return;
  }
  over=true;document.getElementById('msg').textContent='Game Over! Press New Game';
}
function render(){
  let h='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    let v=grid[r][c],bg=COLORS[v]||'#3c3a32',tc=TXTC[v]||'#fff';
    let fs=v>=1024?'18px':v>=128?'22px':'24px';
    h+=`<div class="cell" style="background:${bg};color:${tc};font-size:${fs};${v>=128?'text-shadow:0 0 10px rgba(255,200,0,0.5)':''}">${v||''}</div>`;
  }
  document.getElementById('board').innerHTML=h;
  document.getElementById('sc').textContent=score;
  document.getElementById('best').textContent=best;
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')move('left');
  if(e.key==='ArrowRight'||e.key==='d')move('right');
  if(e.key==='ArrowUp'||e.key==='w')move('up');
  if(e.key==='ArrowDown'||e.key==='s')move('down');
  e.preventDefault();
});
init();
</script>
</body>
</html>
