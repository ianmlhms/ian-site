<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Blaster - PixelBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(0,200,255,0.2)}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let player,aliens,bullets,alienBullets,score,lives,wave,dir,dropTimer,gameOver,particles=[];
const ALIEN_TYPES=['👾','👽','🛸'];
function start(){
  player={x:300,y:560,w:40};score=0;lives=3;wave=1;gameOver=false;
  bullets=[];alienBullets=[];particles=[];spawnAliens();
}
function spawnAliens(){
  aliens=[];dir=1;dropTimer=0;
  let rows=3+Math.min(wave,4),cols=8;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    aliens.push({x:60+c*60,y:40+r*45,w:35,h:30,type:r%3,alive:true,frame:0});
  }
}
function addP(x,y,c,n){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*10,color:c})}}
let keys={};
function loop(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,C.width,C.height);
  // Stars
  X.fillStyle='#fff';
  for(let i=0;i<60;i++){X.globalAlpha=0.1+Math.sin(Date.now()/800+i)*0.15;
    X.fillRect((i*97)%C.width,(i*53+Date.now()*0.02)%C.height,1.5,1.5)}
  X.globalAlpha=1;

  if(!gameOver){
    if(keys['ArrowLeft']||keys['a'])player.x=Math.max(20,player.x-5);
    if(keys['ArrowRight']||keys['d'])player.x=Math.min(C.width-20,player.x+5);
    if(keys[' ']&&bullets.length<3)bullets.push({x:player.x,y:player.y-15,vy:-8});

    // Move aliens
    let edge=false;
    for(let a of aliens){if(!a.alive)continue;a.x+=dir*0.8*(1+wave*0.2);a.frame++;
      if(a.x<15||a.x>C.width-15)edge=true}
    if(edge){dir*=-1;for(let a of aliens)a.y+=15}
    // Alien shooting
    if(Math.random()<0.01+wave*0.005){
      let alive=aliens.filter(a=>a.alive);
      if(alive.length){let a=alive[Math.floor(Math.random()*alive.length)];
        alienBullets.push({x:a.x,y:a.y+20,vy:3+wave*0.3})}
    }
    // Bullets
    for(let i=bullets.length-1;i>=0;i--){
      bullets[i].y+=bullets[i].vy;if(bullets[i].y<0){bullets.splice(i,1);continue}
      for(let a of aliens){if(!a.alive)continue;
        if(Math.abs(bullets[i].x-a.x)<20&&Math.abs(bullets[i].y-a.y)<18){
          a.alive=false;score+=10*(a.type+1);addP(a.x,a.y,['#ff4466','#44ff88','#44aaff'][a.type],15);
          bullets.splice(i,1);break}}
    }
    for(let i=alienBullets.length-1;i>=0;i--){
      alienBullets[i].y+=alienBullets[i].vy;
      if(alienBullets[i].y>C.height){alienBullets.splice(i,1);continue}
      if(Math.abs(alienBullets[i].x-player.x)<20&&Math.abs(alienBullets[i].y-player.y)<15){
        lives--;addP(player.x,player.y,'#ff4444',20);alienBullets.splice(i,1);
        if(lives<=0)gameOver=true}
    }
    // Check aliens reaching bottom
    for(let a of aliens){if(a.alive&&a.y>520)gameOver=true}
    // Wave complete
    if(aliens.every(a=>!a.alive)){wave++;spawnAliens()}
  }

  // Draw aliens
  X.font='28px serif';X.textAlign='center';
  for(let a of aliens){if(!a.alive)continue;
    X.fillText(ALIEN_TYPES[a.type],a.x,a.y+10);
  }
  // Player ship
  X.fillStyle='#00ccff';X.shadowColor='#00ccff';X.shadowBlur=10;
  X.beginPath();X.moveTo(player.x,player.y-15);X.lineTo(player.x-18,player.y+10);X.lineTo(player.x+18,player.y+10);X.closePath();X.fill();
  X.fillStyle='#0088cc';X.fillRect(player.x-4,player.y-5,8,12);X.shadowBlur=0;
  // Bullets
  X.fillStyle='#00ffcc';X.shadowColor='#00ffcc';X.shadowBlur=8;
  for(let b of bullets){X.fillRect(b.x-2,b.y,4,12)}
  X.fillStyle='#ff4444';X.shadowColor='#ff4444';
  for(let b of alienBullets){X.fillRect(b.x-2,b.y,4,10)}
  X.shadowBlur=0;
  // Particles
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){particles.splice(i,1);continue}X.globalAlpha=p.life/25;X.fillStyle=p.color;
    X.fillRect(p.x-2,p.y-2,4,4)}X.globalAlpha=1;
  // HUD
  X.fillStyle='#fff';X.font='16px Segoe UI';X.textAlign='left';X.fillText('Score: '+score,15,25);
  X.textAlign='right';X.fillText('Lives: '+'❤️'.repeat(lives)+'  Wave: '+wave,C.width-15,25);
  if(gameOver){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,C.width,C.height);
    X.textAlign='center';X.fillStyle='#ff4466';X.font='bold 42px Segoe UI';X.fillText('GAME OVER',C.width/2,270);
    X.fillStyle='#fff';X.font='22px Segoe UI';X.fillText('Score: '+score,C.width/2,320);
    X.fillText('Press SPACE',C.width/2,360);
  }
  requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){if(gameOver)start();e.preventDefault()}});
document.addEventListener('keyup',e=>{keys[e.key]=false});
start();loop();
</script>
</body>
</html>
