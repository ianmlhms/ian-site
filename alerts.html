<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neiegkeeten — ian.lu</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=9"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--warn:#f87171}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:560px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:10px}
  .gate{text-align:center;color:var(--muted);padding:50px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px}
  .a{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
  .a.unseen{border-color:var(--accent)}
  .a .ic{font-size:22px}
  .a .t{font-weight:800;font-size:15px}
  .a .b{color:var(--muted);font-size:13.5px;margin-top:2px;word-break:break-word}
  .a .w{color:var(--muted);font-size:11.5px;margin-top:5px}
  .a .go{margin-left:auto;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
  .del:hover{color:var(--warn)}
  .clear{align-self:flex-end;background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:12.5px;cursor:pointer}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>🔔 Neiegkeeten</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Lueden…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=4";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let sb=null;
const ICON={mention:"💬",exam:"⏳",homework:"📋",friend:"👋",game:"🎮"};

function ago(ts){
  const s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60)return "elo grad";
  if(s<3600)return Math.floor(s/60)+" min";
  if(s<86400)return Math.floor(s/3600)+" St.";
  return Math.floor(s/86400)+" Deeg";
}

async function boot(){
  sb=await auth.client();
  auth.mountAccountButton($("acctHost"));
  if(!auth.session()){
    $("wrap").innerHTML=`<div class="gate">Mell dech un fir deng Neiegkeeten.<br><br><button class="btn" id="si">Umellen</button></div>`;
    $("si").onclick=auth.openAuthModal;return;
  }
  await render();
  try{await sb.rpc("mark_notifs_seen");}catch(e){console.warn(e);}
}

async function render(){
  const {data,error}=await sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(100);
  if(error){$("wrap").innerHTML='<div class="gate">Feeler beim Lueden (Migratioun gelaf?).</div>';return;}
  if(!(data||[]).length){$("wrap").innerHTML='<div class="gate">Näischt Neies 🎉</div>';return;}
  $("wrap").innerHTML=
    `<button class="clear" id="clr">Alles läschen</button>`+
    data.map(n=>`<div class="a${n.seen?"":" unseen"}">
      <div class="ic">${ICON[n.kind]||"🔔"}</div>
      <div style="flex:1">
        <div class="t">${esc(n.title)}</div>
        ${n.body?`<div class="b">${esc(n.body)}</div>`:""}
        <div class="w">${ago(n.created_at)}</div>
      </div>
      <div class="go">
        ${n.url?`<a href="${esc(n.url)}">Opmaachen ›</a>`:""}
        <button class="del" data-del="${n.id}" title="Läschen">✕</button>
      </div></div>`).join("");
  $("clr").onclick=async()=>{await sb.from("notifications").delete().neq("id","00000000-0000-0000-0000-000000000000");render();};
  $("wrap").querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{await sb.from("notifications").delete().eq("id",b.dataset.del);render();});
}

auth.onAuth(boot);
boot();
</script>
  <script type="module" src="rtc-ring.js?v=1"></script>
  <script type="module" src="class-gate.js?v=3"></script>
</body>
</html>
