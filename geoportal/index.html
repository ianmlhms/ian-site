<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Geoportal Luxemburg — topografische Karten, Luftbilder ab 1967, Kataster, Gebäude, Geländemodell und alle Wander- und Mountainbike-Wege auf einer Karte. Mit LUREF-Koordinaten und Entfernungsmessung." />
  <meta property="og:title" content="Geoportal Luxemburg — Karten, Luftbilder, Kataster" />
  <meta property="og:description" content="Amtliche Karten und Luftbilder Luxemburgs, kombiniert mit allen Wander- und MTB-Wegen." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://ian.lu/apple-touch-icon.png" />
  <link rel="canonical" href="https://ian.lu/geoportal/" />
  <title>Geoportal Luxemburg · ian.lu</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="geo.css?v=1" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../apple-touch-icon.png" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script data-goatcounter="https://ianm.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<header class="site">
  <button class="menu-toggle" type="button" aria-label="Menu">☰</button>
  <a class="brand" href="../kaart/">
    <span id="title">Geoportal Luxemburg</span>
    <small id="subtitle">Karten, Luftbilder, Kataster und Wanderwege</small>
  </a>
  <span class="head-spacer"></span>
  <nav class="langs" aria-label="Sprache">
    <button type="button" data-lang="de" class="on">DE</button>
    <button type="button" data-lang="fr">FR</button>
    <button type="button" data-lang="en">EN</button>
  </nav>
</header>

<aside class="panel">

  <div class="section">
    <input id="search" class="search" type="search" autocomplete="off" placeholder="Weg oder Haltestelle suchen …" />
    <div class="results" id="results"></div>
  </div>

  <div class="section">
    <h2 id="h-basemap">Hintergrundkarte</h2>
    <div id="basemaps"></div>
  </div>

  <div class="section">
    <h2 id="h-trails">Wege</h2>
    <label class="opt">
      <input type="checkbox" id="ov-hiking" />
      <span class="sw" style="background:#2e7d4f"></span>
      <span data-i18n="ovHiking">Auto-Pédestres (Wandern)</span>
    </label>
    <label class="opt">
      <input type="checkbox" id="ov-mtb" />
      <span class="sw" style="background:#d2691e"></span>
      <span data-i18n="ovMtb">Mountainbike-Runden</span>
    </label>
    <label class="opt">
      <input type="checkbox" id="ov-bus" />
      <span class="sw" style="background:#1d6fce"></span>
      <span data-i18n="ovBus">Bushaltestellen</span>
    </label>
  </div>

  <div class="section">
    <h2 id="h-overlays">Ebenen</h2>
    <div id="overlays"></div>
    <div class="opacity-row">
      <span id="opacity-label">Deckkraft</span>
      <input id="opacity" type="range" min="10" max="100" step="5" value="75" />
    </div>
  </div>

  <div class="section">
    <h2 id="h-tools">Werkzeuge</h2>
    <div class="tools">
      <button class="tool" type="button" id="btn-measure" aria-pressed="false">📏 Entfernung messen</button>
      <button class="tool" type="button" id="btn-clear">✕ Löschen</button>
    </div>
    <p class="hint" id="measure-hint" hidden>Punkte anklicken · Doppelklick beendet</p>
    <p class="hint total" id="measure-total"></p>
  </div>

  <div class="section">
    <h2 id="h-coords">Koordinaten</h2>
    <div class="coords">
      <div><span class="lbl">WGS84 lat</span><b id="c-lat">—</b></div>
      <div><span class="lbl">WGS84 lon</span><b id="c-lon">—</b></div>
      <div><span class="lbl">LUREF E</span><b id="c-e">—</b></div>
      <div><span class="lbl">LUREF N</span><b id="c-n">—</b></div>
      <div><span class="lbl">Zoom</span><b id="c-zoom">—</b></div>
    </div>
  </div>

</aside>

<div id="map">
  <div class="loading" id="loading">Wird geladen …</div>
  <div class="busnote" id="busnote" hidden>Zum Anzeigen der Haltestellen weiter hineinzoomen</div>
</div>

<script src="i18n.js?v=1"></script>
<script src="luref.js?v=1"></script>
<script src="layers.js?v=1"></script>
<script src="geo.js?v=1"></script>
</body>
</html>
