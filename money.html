<script type="module">
import * as auth from "./auth.js?v=4";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const cfg=window.PB_CONFIG||{};
let sb=null,me=null,tx=[],subs=[],kind="out";
const CUR="€";
const CATS={out:["🍔 Iessen","🎮 Fräizäit","🚌 Transport","👕 Kleeder","🎁 Kaddoen","📱 Abo","📚 Schoul","⭐ Aneres"],
            in:["💼 Aarbecht","🎁 Kaddo","💰 Spuergeld","⭐ Aneres"]};

  $("wrap").innerHTML=`
    <div class="card">

    <h2>Buchung bäisetzen</h2>

    <h2 style="display:flex;align-items:center;gap:10px">Buchungen
      <button class="ghost" id="importBtn" style="margin-left:auto">📥 Kontoscritt importéieren</button>

        <select id="sCycle"><option value="monthly">Mount</option><option value="yearly">Joer</option><option value="weekly">Woch</option></select>
      </div>
      <div class="field">
        <input id="sNext" type="date" style="flex:1">
        <button class="btn" id="addSub">Bäisetzen</button>

  $("kindSeg").querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{
    kind=b.dataset.k;$("kindSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.k===kind));fillCats();
  });
  fillCats();

/* ---------------- statement import (CSV + BDL PDF) ----------------
 * Parses a bank export in the browser, shows a preview, and only inserts what you
 * confirm — skipping rows you already have. No third party, no bank login. */
function decodeBytes(buf){
  const b=new Uint8Array(buf);
  if(b[0]===0xff&&b[1]===0xfe)return new TextDecoder("utf-16le").decode(b);
  if(b[0]===0xfe&&b[1]===0xff)return new TextDecoder("utf-16be").decode(b);
  const n=Math.min(b.length,400);let even=0,odd=0;
  for(let i=0;i<n;i++)if(b[i]===0)(i%2?odd++:even++);
  if(even+odd>n*0.25)return new TextDecoder(odd>=even?"utf-16le":"utf-16be").decode(b);
  return new TextDecoder("utf-8").decode(b);
}
// quote-aware CSV field split (handles "…,…" and "" escapes); works for any delim
function splitCSV(line,delim){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;}else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===delim){out.push(cur);cur="";} else cur+=ch; }
  }
  out.push(cur);return out;
}
// robust amount: handles 1.234,56 · 800.00 · -2,00 · 1 284,01 (auto decimal sep)
const impMoney=(s)=>{
  s=String(s).replace(/[^\d.,-]/g,"");if(!s||s==="-")return null;
  const lc=s.lastIndexOf(","),ld=s.lastIndexOf(".");
  const dec=lc>ld?",":(ld>lc?".":"");
  if(dec){const thou=dec===","?".":",";s=s.split(thou).join("").replace(dec,".");}
  const n=parseFloat(s);return Number.isFinite(n)?n:null;
};
const impDate=(d)=>{
  d=String(d).trim();
  let m=d.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;
  m=d.match(/^(\d{2})[\/.-](\d{2})[\/.-](\d{2,4})$/);if(m){let[,dd,mm,yy]=m;if(yy.length===2)yy="20"+yy;return`${yy}-${mm}-${dd}`;}
  return null;
};
function parseCSVstmt(text){
  let lines=text.split(/\r?\n/).filter(l=>l.trim());
  lines=lines.filter(l=>!/^"?sep=.{1,3}"?$/i.test(l.trim()));   // Excel "sep=;" hint
  if(!lines.length)return[];
  let hi=lines.findIndex(l=>/(date|datum)/i.test(l)&&/(montant|betrag|debit|credit|description|transaktion|libell)/i.test(l));
  if(hi<0)hi=0;
  const delim=(lines[hi].match(/;/g)||[]).length>=(lines[hi].match(/,/g)||[]).length?";":",";
  const H=splitCSV(lines[hi],delim).map(h=>h.trim().toLowerCase());
  const find=(names,ex=[])=>{for(const n of names){const i=H.indexOf(n);if(i>=0&&!ex.includes(i))return i;}for(const n of names){const i=H.findIndex((h,idx)=>!ex.includes(idx)&&h.includes(n));if(i>=0)return i;}return-1;};
  const iDate=find(["transaction date","transaktionsdatum","date transaction","date valeur","date"]);
  const iAmt=find(["betrag in eur","montant en eur","montant","betrag"],[iDate]);
  const iDeb=find(["debit (eur)","débit","debit"],[iDate,iAmt]);
  const iCred=find(["credit (eur)","crédit","credit"],[iDate,iAmt,iDeb]);
  const iDesc=find(["transaktion","description","libellé","libelle"],[iDate,iAmt,iDeb,iCred]);
  const iComm=find(["payment details","communication 1","communication","nom de la contrepartie"],[iDate,iAmt,iDeb,iCred,iDesc]);
  const iCtry=find(["land","localité de la contrepartie","localité"],[iDate,iAmt,iDeb,iCred,iDesc,iComm]);
  if(iDate<0||(iAmt<0&&iDeb<0&&iCred<0))return[];
  const out=[];
  for(const line of lines.slice(hi+1)){
    const c=splitCSV(line,delim);const at=impDate(c[iDate]);if(!at)continue;
    let amount=null,kind=null;
    if(iAmt>=0&&c[iAmt]&&c[iAmt].trim()){const a=impMoney(c[iAmt]);if(a){amount=Math.abs(a);kind=a<0?"out":"in";}}
    if(amount===null&&(iCred>=0||iDeb>=0)){
      const cr=iCred>=0?impMoney(c[iCred]):null,db=iDeb>=0?impMoney(c[iDeb]):null;
      if(cr){amount=Math.abs(cr);kind="in";}else if(db){amount=Math.abs(db);kind="out";}
    }
    if(amount===null||amount===0)continue;
    let desc=(c[iDesc]||"").trim();
    if(iComm>=0&&c[iComm]&&c[iComm].trim()&&c[iComm].trim()!==desc)desc+=" · "+c[iComm].trim();
    if(iCtry>=0&&c[iCtry]&&c[iCtry].trim())desc+=" ("+c[iCtry].trim()+")";
    out.push({at,amount,kind,note:desc.slice(0,180)});
  }
  return out;
}
// Trade Republic export: quoted CSV, signed `amount`, investment + card + cash rows
function parseTR(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const H=splitCSV(lines[0],",").map(h=>h.trim().toLowerCase());
  const ix=(n)=>H.indexOf(n);
  const iDate=ix("date")>=0?ix("date"):ix("datetime");
  const iType=ix("type"),iName=ix("name"),iAmt=ix("amount"),iDesc=ix("description");
  const iCp=ix("counterparty_name"),iOc=ix("original_currency");
  if(iDate<0||iAmt<0)return[];
  const clean=(s)=>String(s||"").replace(/\s+/g," ").trim();
  const out=[];
  for(const line of lines.slice(1)){
    const c=splitCSV(line,",");
    const at=impDate(clean(c[iDate]).slice(0,10));if(!at)continue;
    const a=impMoney(c[iAmt]);if(a===null||a===0)continue;
    const kind=a<0?"out":"in";
    const type=clean(c[iType]).toUpperCase();
    const name=clean(c[iName]),desc=clean(c[iDesc]),cp=clean(c[iCp]);
    let category="",note="";
    if(/BUY/.test(type)){category="📈 Investéieren";note="Kaf · "+(name||desc);}
    else if(/SELL/.test(type)){category="📈 Investéieren";note="Verkaf · "+(name||desc);}
    else if(type==="DIVIDEND"){category="💰 Dividend";note=name||desc;}
    else if(/INTEREST|BONUS|SAVEBACK/.test(type)){category="💰 Zënsen";note=desc||name||"Zënsen";}
    else if(/ORDERING_FEE|_FEE/.test(type)){category="💳 Gebür";note=desc||"Kaartegebür";}
    else if(/CARD_TRANSACTION/.test(type)){note=name||desc;}   // merchant → CATRULES emoji
    else if(/INBOUND|INPAYMENT|OUTBOUND|OUTPAYMENT|TRANSFER/.test(type)){category="💸 Iwwerweisung";note=cp||name||desc;}
    else{note=name||desc||type;}
    if(/INTERNATIONAL/.test(type)&&iOc>=0&&clean(c[iOc]))note+=" ("+clean(c[iOc])+")";
    out.push({at,amount:Math.abs(a),kind,category:category||undefined,note:(note||"Trade Republic").slice(0,180)});
  }
  return out;
}
function parseBDL(text){
  const lines=text.split(/\r?\n/).map(l=>l.replace(/(\d)\s+,\s+(\d)/g,"$1,$2").replace(/,\s+(\d{2})\b/g,",$1").replace(/([+-])\s+(?=[\d.])/g,"$1"));
  const out=[];const re=/(\d{2}-\d{2}-\d{2})\s+.*?([+-][\d.\s]*\d,\d{2})\s*$/;
  for(let i=0;i<lines.length;i++){
    const L=lines[i];if(/SOLDE|ANCIEN|NOUVEAU|REPORT/i.test(L))continue;
    const m=L.match(re);if(!m)continue;
    const amt=impMoney(m[2]);if(amt===null||amt===0)continue;
    const[dd,mm,yy]=m[1].split("-");const at=`20${yy}-${mm}-${dd}`;
    let label="",comm="";
    for(let j=i+1;j<Math.min(i+14,lines.length);j++){
      const t=lines[j].trim();if(re.test(lines[j])||/SOLDE/i.test(t))break;
      if(!label&&/(Virement|Achat|Paiement|Retrait|Domiciliation|Ordre|Frais|Intérêts|Remboursement)/i.test(t))label=t.replace(/\s*\|\s*n°\S+/i,"").trim();
      const cm=t.match(/^(?:COMMUNICATION|REMARQUE)\s*:?\s*(.*)$/i);
      if(cm&&cm[1])comm=cm[1].trim();else if(/^(COMMUNICATION|REMARQUE)\s*:?\s*$/i.test(t)&&lines[j+1])comm=lines[j+1].trim();
    }
    out.push({at,amount:Math.abs(amt),kind:amt<0?"out":"in",note:([label,comm].filter(Boolean).join(" · ")||"BDL").slice(0,180)});
  }
  return out;
}
async function pdfToLines(buf){
  const pdfjs=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/build/pdf.min.mjs");
  pdfjs.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/build/pdf.worker.min.mjs";
  const doc=await pdfjs.getDocument({data:buf}).promise;const lines=[];
  for(let p=1;p<=doc.numPages;p++){
    const tc=await(await doc.getPage(p)).getTextContent();const rows={};
    for(const it of tc.items){const y=Math.round(it.transform[5]);(rows[y]=rows[y]||[]).push({x:it.transform[4],s:it.str});}
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const l=rows[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(" ").replace(/\s+/g," ").trim();if(l)lines.push(l);
    });
  }
  return lines.join("\n");
}
async function onImportFile(file){
  $("impMsg").textContent="Liesen…";$("impMsg").style.color="var(--muted)";
  try{
    const buf=await file.arrayBuffer();
    let rows;
    if(/\.pdf$/i.test(file.name)||file.type==="application/pdf")rows=parseBDL(await pdfToLines(buf));
    else{const text=decodeBytes(buf);rows=/transaction_id|counterparty_iban|asset_class/i.test(text.slice(0,400))?parseTR(text):parseCSVstmt(text);}
    if(!rows.length){$("impMsg").textContent="Keng Buchungen an där Datei fonnt.";$("impMsg").style.color="var(--warn)";return;}
    previewImport(rows);
  }catch(e){console.warn("[import]",e);$("impMsg").textContent="Import feelgeschloen — kuck d'Datei.";$("impMsg").style.color="var(--warn)";}
}
async function previewImport(rows){
  // skip rows already present (match date+amount+kind+start of note)
  const {data:existing}=await sb.from("finance_tx").select("at,amount,kind,note").limit(5000);
  const key=(r)=>`${String(r.at).slice(0,10)}|${(+r.amount).toFixed(2)}|${r.kind}|${(r.note||"").slice(0,30)}`;
  const have=new Set((existing||[]).map(key));
  const fresh=rows.filter(r=>!have.has(key(r)));
  const dupes=rows.length-fresh.length;
  const inSum=fresh.filter(r=>r.kind==="in").reduce((a,r)=>a+r.amount,0);
  const outSum=fresh.filter(r=>r.kind==="out").reduce((a,r)=>a+r.amount,0);
  const list=fresh.slice(0,300).map(r=>`<div class="tx"><span style="font-size:15px">${r.kind==="in"?"➕":"➖"}</span><div><div class="t" style="font-size:13px">${esc(r.note)}</div><div class="s">${r.at}</div></div><div class="amt ${r.kind}">${r.kind==="in"?"+":"−"}${CUR}${r.amount.toFixed(2)}</div></div>`).join("");
  $("impModalBody").innerHTML=`
    <div class="hint" style="margin-bottom:8px">${fresh.length} nei Buchungen${dupes?` · ${dupes} scho present (iwwersprongen)`:""}<br>
      <span style="color:var(--ok)">+${CUR}${inSum.toFixed(2)}</span> · <span style="color:var(--warn)">−${CUR}${outSum.toFixed(2)}</span></div>
    ${list||'<div class="hint">Alles scho importéiert 👍</div>'}
    ${fresh.length>300?'<div class="hint">…n, just déi éischt 300 gewisen; all ginn importéiert.</div>':""}`;
  $("impModalGo").textContent=`${fresh.length} importéieren`;
  $("impModalGo").disabled=!fresh.length;
  $("impModalGo").onclick=()=>doImport(fresh);
  $("impModal").classList.add("open");
}
async function doImport(fresh){
  $("impModalGo").disabled=true;$("impModalGo").textContent="Importéieren…";
  try{
    for(let i=0;i<fresh.length;i+=200){
      const batch=fresh.slice(i,i+200).map(r=>({amount:r.amount,kind:r.kind,note:r.note,category:r.category||null,at:r.at+"T12:00:00Z",currency:"EUR"}));
      const {error}=await sb.from("finance_tx").insert(batch);if(error)throw error;
    }
    $("impModal").classList.remove("open");
    $("impMsg").textContent=`✓ ${fresh.length} Buchungen importéiert`;$("impMsg").style.color="var(--ok)";
    setTimeout(()=>$("impMsg").textContent="",2500);loadTx();
  }catch(e){console.warn(e);$("impModalGo").disabled=false;$("impModalGo").textContent="Nach eng Kéier";$("impMsg").textContent="Import feelgeschloen.";}
}

function fillCats(){ $("tCat").innerHTML=CATS[kind].map(c=>`<option>${c}</option>`).join(""); }

/* ---------------- transactions ---------------- */
async function loadTx(){
  const {data,error}=await sb.from("finance_tx").select("*").order("at",{ascending:false}).limit(80);
  if(error){$("txList").innerHTML='<div class="gate">Feeler beim Lueden.</div>';return;}
  tx=data||[];renderTx();paintBalance();
}
function paintBalance(){
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  let inc=0,out=0;
  for(const t of tx){const d=new Date(t.at);if(d.getMonth()!==m||d.getFullYear()!==y)continue;t.kind==="in"?inc+=+t.amount:out+=+t.amount;}
  $("mIn").textContent=CUR+inc.toFixed(2);
  $("mOut").textContent=CUR+out.toFixed(2);
  $("mNet").textContent=CUR+(inc-out).toFixed(2);
}
// Guess an emoji + short category label from a merchant/description (for imports
// with no manual category). Keyword-based; falls back to 💳.
const CATRULES=[
  [/youtube|spotify|netflix|disney|icloud|apple\.com|itunes|google\s*\*|patreon|twitch|steam|playstation|xbox|nintendo|openai|chatgpt|anthropic|claude|adobe|notion|discord|whoop|navigraph/i,"📱","Abo/Digital"],
  [/restaurant|pizza|kebab|sushi|mcdo|mcdonald|burger|kfc|bistro|café|cafe|coffee|starbucks|bakery|boulangerie|glace|seoul|grill|dallmayr/i,"🍔","Iessen"],
  [/cactus|auchan|delhaize|cora|aldi|lidl|colruyt|supermarch|alima|proxy|panier/i,"🛒","Akaf"],
  [/amazon|zalando|temu|shein|decathlon|nike|adidas|zara|h&m|action|fnac|mediamarkt|paddle|apple store/i,"🛍️","Shopping"],
  [/cfl|bus|mobilit|uber|bolt|parking|aral|shell|esso|total|tank|station|kinepolis|cinema|kino/i,"🎬","Fräizäit/Transport"],
  [/pharmacie|apotheke|dokter|dokteur|medic|hospital|clinique|benedikt/i,"💊","Gesondheet"],
  [/virement|payconiq|iban|retrait|atm|cash|distributeur|mulheims|wiwinius|epargne|spuerkeess/i,"💸","Iwwerweisung"],
];
function guessTx(t){
  if(t.category)return {ic:(t.category.split(" ")[0]||"⭐"),title:esc(t.category.split(" ").slice(1).join(" ")||"Aneres"),sub:t.note?esc(t.note):""};
  const s=t.note||"";
  for(const[re,ic]of CATRULES)if(re.test(s))return {ic,title:esc(s||"Buchung"),sub:""};
  return {ic:"💳",title:esc(s||"Buchung"),sub:""};
}
function renderTx(){
  if(!tx.length){$("txList").innerHTML='<div class="gate">Nach keng Buchungen.</div>';return;}
  $("txList").innerHTML=tx.map(t=>{
    const g=guessTx(t);
    const when=new Date(t.at).toLocaleDateString("de-DE",{day:"numeric",month:"short"});
    return `<div class="tx"><span style="font-size:18px">${g.ic}</span>
      <div><div class="t">${g.title}</div>
        <div class="s">${when}${g.sub?" · "+g.sub:""}</div></div>
      <div class="amt ${t.kind}">${t.kind==="in"?"+":"−"}${CUR}${(+t.amount).toFixed(2)}</div>
      <button class="del" data-del="${t.id}">✕</button></div>`;
  }).join("");
  $("txList").querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    await sb.from("finance_tx").delete().eq("id",b.dataset.del);loadTx();
  });
}
async function addTx(){
  const amt=$("tAmt").value;
  if(!amt||+amt<=0){$("txMsg").textContent="Betrag uginn.";return;}
  $("txMsg").textContent="…";
  try{
    const {error}=await sb.from("finance_tx").insert({amount:+amt,kind,category:$("tCat").value,note:$("tNote").value.trim()||null,at:new Date().toISOString(),currency:"EUR"});
    if(error)throw error;
    $("tAmt").value="";$("tNote").value="";$("txMsg").textContent="Gespäichert ✓";
    setTimeout(()=>$("txMsg").textContent="",1300);loadTx();
  }catch(e){console.warn(e);$("txMsg").textContent="Feeler beim Späicheren.";}
}

/* ---------------- subscriptions ---------------- */
async function loadSubs(){
  const {data,error}=await sb.from("subscriptions").select("*").order("next_at");
  if(error){$("subList").innerHTML="";return;}
  subs=data||[];renderSubs();
}
const DAY=86400000;
function renderSubs(){
  if(!subs.length){$("subList").innerHTML='<div class="hint">Nach keng Abonnementer.</div>';return;}
  const perMonth=subs.reduce((a,s)=>a+(s.cycle==="yearly"?s.amount/12:s.cycle==="weekly"?s.amount*4.33:+s.amount),0);
  $("subList").innerHTML=subs.map(s=>{
    const days=Math.ceil((new Date(s.next_at).getTime()-Date.now())/DAY);
    const due=isNaN(days)?"":days<0?"iwwerfälleg":days===0?"haut":`an ${days} Deeg`;
    const cyc={monthly:"/Mount",yearly:"/Joer",weekly:"/Woch"}[s.cycle]||"";
    return `<div class="sub"><span style="font-size:18px">📱</span>
      <div><div class="t">${esc(s.name)}</div><div class="s">${CUR}${(+s.amount).toFixed(2)}${cyc}</div></div>
      <div class="due${days<=5?" soon":""}">${esc(due)}<br><span class="s">${new Date(s.next_at).toLocaleDateString("de-DE",{day:"numeric",month:"short"})}</span></div>
      <button class="del" data-del="${s.id}">✕</button></div>`;
  }).join("")+`<div class="hint" style="margin-top:8px">≈ ${CUR}${perMonth.toFixed(2)} / Mount total</div>`;
  $("subList").querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    await sb.from("subscriptions").delete().eq("id",b.dataset.del);loadSubs();
  });
}
async function addSub(){
  const name=$("sName").value.trim(),amt=$("sAmt").value,next=$("sNext").value;
  if(!name||!amt||!next){$("subMsg").textContent="Numm, Betrag an Datum uginn.";return;}
  $("subMsg").textContent="…";
  try{
    const {error}=await sb.from("subscriptions").insert({name,amount:+amt,cycle:$("sCycle").value,next_at:next,currency:"EUR"});
    if(error)throw error;
    $("sName").value="";$("sAmt").value="";$("subMsg").textContent="Gespäichert ✓";
    setTimeout(()=>$("subMsg").textContent="",1300);loadSubs();
  }catch(e){console.warn(e);$("subMsg").textContent="Feeler beim Späicheren.";}
}

auth.onAuth(boot);
boot();
