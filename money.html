const TAX={
  food:["🍔","Iessen"], groceries:["🛒","Akaf"], transport:["🚌","Transport"],
  shopping:["🛍️","Shopping"], subscription:["📱","Abo"], leisure:["🎮","Fräizäit"],

  cash:["🏧","Boergeld"], transfer:["🔁","Transfer"], other:["⭐","Aneres"],
};

const catLbl=(c)=>(TAX[c]||TAX.other)[1];
// spending buckets (what counts as "Ausginn"): everything out except transfers/investment

               in:["income","dividend","other"]};

// first-pass keyword categoriser (free) — anything unmatched goes to the AI
const KWRULES=[
  [/youtube|spotify|netflix|disney|icloud|apple\.com|itunes|google\s*\*|patreon|twitch|steam|playstation|xbox|nintendo|openai|chatgpt|anthropic|claude|adobe|notion|discord|whoop|navigraph|paddle|inibuilds|flight1/i,"subscription"],
  [/restaurant|pizza|kebab|sushi|mcdo|mcdonald|burger|kfc|bistro|caf[eé]|coffee|starbucks|bakery|boulangerie|glace|seoul|grill|dallmayr|snack|\bfood\b|enterta/i,"food"],
  [/cactus|auchan|delhaize|cora|aldi|lidl|colruyt|supermarch|alima|proxy|panier|carrefour/i,"groceries"],
  [/amazon|zalando|temu|shein|decathlon|nike|adidas|zara|h&m|action|fnac|mediamarkt|apple store|aliexpress/i,"shopping"],
  [/\bcfl\b|\bbus\b|mobilit|uber|bolt|parking|aral|shell|esso|\btotal\b|tankstell|station|flixbus|ryanair|luxair|sncf/i,"transport"],
  [/kinepolis|cinema|\bkino\b|utopolis/i,"leisure"],
  [/pharmacie|apotheke|dokter|dokteur|m[eé]dic|hospital|clinique|dentist/i,"health"],
  [/retrait|withdrawal|geldautomat|\batm\b|distributeur/i,"cash"],
];
const OLD_EMOJI={"🍔":"food","🛒":"groceries","🚌":"transport","👕":"shopping","🛍️":"shopping","📱":"subscription","🎮":"leisure","🎬":"leisure","💊":"health","📚":"education","💼":"income","🎁":"other","📈":"investment","💰":"dividend","💳":"fees","🏧":"cash","🔁":"transfer","⭐":"other"};
// resolve a category slug for a row, or null if it needs the AI
function seedCat(t){
  if(t.cat)return t.cat;
  const lbl=t.category||"";
  if(/Investéieren/i.test(lbl))return "investment";
  if(/Dividend|Zënsen/i.test(lbl))return "dividend";
  if(/Gebür/i.test(lbl))return "fees";
  if(/Spuergeld/i.test(lbl))return "income";
  if(/Iwwerweisung/i.test(lbl))return null;   // transfer-detect or AI decides
  const em=(lbl.split(" ")[0]||"");if(OLD_EMOJI[em])return OLD_EMOJI[em];
  const s=t.note||"";for(const[re,slug]of KWRULES)if(re.test(s))return slug;
  return null;
}
const effCat=(t)=>t.is_transfer?"transfer":(t._cat||"other");

  $("delImp").onclick=delImported;

function fillCats(){ $("tCat").innerHTML=ADDCATS[addKind].map(c=>`<option value="${c}">${catIc(c)} ${catLbl(c)}</option>`).join(""); }

/* ---------------- load + derive ---------------- */
async function loadAll(){
  const [{data:txData},{data:subData}]=await Promise.all([
    sb.from("finance_tx").select("*").order("at",{ascending:false}).limit(5000),
    sb.from("subscriptions").select("*").order("next_at"),
  ]);
  tx=txData||[];subs=subData||[];
  // One-time repair (Jul 2026): the old categoriser truncated its replies, so many
  // imported rows got stuck as "other". Clear those once so the fixed AI re-runs.
  if(!localStorage.getItem("money-recat-v2")){
    tx.forEach(t=>{if(t.cat==="other"&&isImported(t))t.cat=null;});
    localStorage.setItem("money-recat-v2","1");
  }
  tx.forEach(t=>{t._cat=seedCat(t);});
  await detectTransfers();
  render();
  loadSubsRender();
  aiCategorise();   // background: fill the rows the keyword rules missed
}

// Internal-transfer detection: same amount leaving one account and arriving on
// another within 4 days (Ian's rule), PLUS label-based flagging of the many
// single-sided Trade Republic top-ups. Both sides are excluded from
// income/spending. Manual overrides (pair_id manual-*) are respected; a wrong guess
// is undone with the 🔁/↩︎ button. No re-import needed — pairing only rejects a match
// when both rows carry a known, identical account tag.
// A note that clearly names another of Ian's own accounts → internal move even
// without a matching partner row (many TR top-ups only show as one line).
function labelTransfer(t){
  const s=t.note||"";
  if(/apple pay top|card top up|\btop\s*up\b|virement interne|internal transfer|between (my )?accounts?/i.test(s))return true;
  if(/trade republic/i.test(s)&&t.account!=="Trade Republic")return true;
  return false;
}
// A real internal transfer names Ian himself or an own-account target; a card
// purchase that just happens to match an amount never does. These two gates keep
// the amount+date pairing from hiding real spending/income.
const TR_SIGNAL=/\bian\b|trade republic|apple pay top|card top up|\btop\s*up\b|compte courant|virement interne|\bepargne\b|spuerkonto|alimentation|standing order|ordre permanent/i;
const TR_CARD=/\((germany|netherlands|belgium|luxembourg|france|spain|italy|austria|ireland|usa|united)\b|paiement |payments|pay\*|paypal|\bcarte\b|\.com\b/i;
async function detectTransfers(){
  const MAXD=4*86400000;
  const active=(t)=>!String(t.pair_id||"").startsWith("manual");
  const sig=(t)=>TR_SIGNAL.test(t.note||"");
  const card=(t)=>TR_CARD.test(t.note||"");
  const flagged=new Map();   // id -> pair_id
  // (1) label-based: unambiguous transfers to/from Trade Republic (no partner needed)
  for(const t of tx){if(active(t)&&labelTransfer(t))flagged.set(t.id,"label-"+t.id);}
  // (2) amount+direction pairing: same amount out of one account & into another within
  //     4 days, on rows that look like a real transfer (self/own-account label, never a
  //     card purchase). Works even if accounts aren't tagged (only rejects a match when
  //     BOTH sides carry a known identical account) — so no re-import is needed.
  const outs=tx.filter(t=>t.kind==="out"&&active(t)&&!flagged.has(t.id)&&!card(t));
  const ins =tx.filter(t=>t.kind==="in" &&active(t)&&!flagged.has(t.id));
  const byAmt=new Map();
  for(const t of ins){const k=(+t.amount).toFixed(2);if(!byAmt.has(k))byAmt.set(k,[]);byAmt.get(k).push(t);}
  const used=new Set();
  for(const o of outs){
    const cands=byAmt.get((+o.amount).toFixed(2))||[];
    let best=null,bd=Infinity;
    for(const i of cands){
      if(used.has(i.id)||card(i))continue;
      if(i.account&&o.account&&i.account===o.account)continue;   // same known account ≠ transfer
      if(!sig(o)&&!sig(i))continue;                              // needs a real-transfer signal
      const dd=Math.abs(new Date(i.at)-new Date(o.at));if(dd>MAXD)continue;
      if(dd<bd){bd=dd;best=i;}
    }
    if(best){used.add(best.id);used.add(o.id);const pid=`${o.id}~${best.id}`;flagged.set(o.id,pid);flagged.set(best.id,pid);}
  }
  // apply in-memory + collect DB changes (skip manual overrides)
  const ups=[];
  for(const t of tx){
    if(String(t.pair_id||"").startsWith("manual")){t.is_transfer=t.pair_id==="manual-on";continue;}
    const want=flagged.has(t.id);const pid=want?flagged.get(t.id):null;
    if(!!t.is_transfer!==want||(t.pair_id||null)!==pid){
      t.is_transfer=want;t.pair_id=pid;ups.push({id:t.id,is_transfer:want,pair_id:pid});
    }else t.is_transfer=want;
  }
  await persistFlags(ups);
}
async function persistFlags(ups){
  for(let i=0;i<ups.length;i+=20){
    await Promise.all(ups.slice(i,i+20).map(u=>
      sb.from("finance_tx").update({is_transfer:u.is_transfer,pair_id:u.pair_id}).eq("id",u.id)));
  }
}

/* ---------------- period + stats ---------------- */
function periodRange(){
  const now=new Date();
  if(period==="all")return [new Date(0),new Date(8.64e15)];
  if(period==="year")return [new Date(now.getFullYear(),0,1),new Date(now.getFullYear()+1,0,1)];
  if(period==="last"){const m=now.getMonth();return [new Date(now.getFullYear(),m-1,1),new Date(now.getFullYear(),m,1)];}
  return [new Date(now.getFullYear(),now.getMonth(),1),new Date(now.getFullYear(),now.getMonth()+1,1)];
}
function inPeriod(t){const d=new Date(t.at);const[a,b]=periodRange();return d>=a&&d<b;}
function stats(){
  let inc=0,out=0,inv=0;const byCat={};
  for(const t of tx){
    if(!inPeriod(t)||t.is_transfer)continue;
    const c=effCat(t),amt=+t.amount;
    if(c==="investment"){inv+=t.kind==="out"?amt:-amt;continue;}
    if(t.kind==="in"){inc+=amt;}
    else{out+=amt;byCat[c]=(byCat[c]||0)+amt;}
  }
  return {inc,out,inv,net:inc-out,byCat};
}

/* ---------------- render ---------------- */
function render(){
  const s=stats();
  $("mIn").textContent=CUR+s.inc.toFixed(2);
  $("mOut").textContent=CUR+s.out.toFixed(2);
  $("mNet").textContent=(s.net<0?"−"+CUR+Math.abs(s.net).toFixed(2):CUR+s.net.toFixed(2));
  $("mInv").textContent=CUR+s.inv.toFixed(2);
  renderCats(s);renderAccounts();renderInvest();renderTransfers();renderChips();renderList();
}
function renderCats(s){
  const entries=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){$("catCard").innerHTML='<div class="hint">Keng Ausginn an dëser Period.</div>';return;}
  const max=entries[0][1];
  $("catCard").innerHTML=entries.map(([c,v])=>{
    const pct=Math.round(v/s.out*100);const w=Math.max(3,Math.round(v/max*100));
    return `<div class="catbar pick" data-cat="${c}">

/* ================= statement import (CSV + BDL PDF) =================
 * Parses a bank export in the browser, shows a preview, and only inserts what you
 * confirm — skipping rows you already have. No third party, no bank login. */
function decodeBytes(buf){
  const b=new Uint8Array(buf);
  if(b[0]===0xff&&b[1]===0xfe)return new TextDecoder("utf-16le").decode(b);
  if(b[0]===0xfe&&b[1]===0xff)return new TextDecoder("utf-16be").decode(b);
  const n=Math.min(b.length,400);let even=0,odd=0;
  for(let i=0;i<n;i++)if(b[i]===0)(i%2?odd++:even++);
  if(even+odd>n*0.25)return new TextDecoder(odd>=even?"utf-16le":"utf-16be").decode(b);
  return new TextDecoder("utf-8").decode(b);
}
function splitCSV(line,delim){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;}else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===delim){out.push(cur);cur="";} else cur+=ch; }
  }
  out.push(cur);return out;
}
const impMoney=(s)=>{
  s=String(s).replace(/[^\d.,-]/g,"");if(!s||s==="-")return null;
  const lc=s.lastIndexOf(","),ld=s.lastIndexOf(".");
  const dec=lc>ld?",":(ld>lc?".":"");
  if(dec){const thou=dec===","?".":",";s=s.split(thou).join("").replace(dec,".");}
  const n=parseFloat(s);return Number.isFinite(n)?n:null;
};
const impDate=(d)=>{
  d=String(d).trim();
  let m=d.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;
  m=d.match(/^(\d{2})[\/.-](\d{2})[\/.-](\d{2,4})$/);if(m){let[,dd,mm,yy]=m;if(yy.length===2)yy="20"+yy;return`${yy}-${mm}-${dd}`;}
  return null;
};
function parseCSVstmt(text){
  let lines=text.split(/\r?\n/).filter(l=>l.trim());
  lines=lines.filter(l=>!/^"?sep=.{1,3}"?$/i.test(l.trim()));
  if(!lines.length)return[];
  let hi=lines.findIndex(l=>/(date|datum)/i.test(l)&&/(montant|betrag|debit|credit|description|transaktion|libell)/i.test(l));
  if(hi<0)hi=0;
  const delim=(lines[hi].match(/;/g)||[]).length>=(lines[hi].match(/,/g)||[]).length?";":",";
  const H=splitCSV(lines[hi],delim).map(h=>h.trim().toLowerCase());
  const find=(names,ex=[])=>{for(const n of names){const i=H.indexOf(n);if(i>=0&&!ex.includes(i))return i;}for(const n of names){const i=H.findIndex((h,idx)=>!ex.includes(idx)&&h.includes(n));if(i>=0)return i;}return-1;};
  const iDate=find(["transaction date","transaktionsdatum","date transaction","date valeur","date"]);
  const iAmt=find(["betrag in eur","montant en eur","montant","betrag"],[iDate]);
  const iDeb=find(["debit (eur)","débit","debit"],[iDate,iAmt]);
  const iCred=find(["credit (eur)","crédit","credit"],[iDate,iAmt,iDeb]);
  const iDesc=find(["transaktion","description","libellé","libelle"],[iDate,iAmt,iDeb,iCred]);
  const iComm=find(["payment details","communication 1","communication","nom de la contrepartie"],[iDate,iAmt,iDeb,iCred,iDesc]);
  const iCtry=find(["land","localité de la contrepartie","localité"],[iDate,iAmt,iDeb,iCred,iDesc,iComm]);
  if(iDate<0||(iAmt<0&&iDeb<0&&iCred<0))return[];
  const out=[];
  for(const line of lines.slice(hi+1)){
    const c=splitCSV(line,delim);const at=impDate(c[iDate]);if(!at)continue;
    let amount=null,kind=null;
    if(iAmt>=0&&c[iAmt]&&c[iAmt].trim()){const a=impMoney(c[iAmt]);if(a){amount=Math.abs(a);kind=a<0?"out":"in";}}
    if(amount===null&&(iCred>=0||iDeb>=0)){
      const cr=iCred>=0?impMoney(c[iCred]):null,db=iDeb>=0?impMoney(c[iDeb]):null;
      if(cr){amount=Math.abs(cr);kind="in";}else if(db){amount=Math.abs(db);kind="out";}
    }
    if(amount===null||amount===0)continue;
    let desc=(c[iDesc]||"").trim();
    if(iComm>=0&&c[iComm]&&c[iComm].trim()&&c[iComm].trim()!==desc)desc+=" · "+c[iComm].trim();
    if(iCtry>=0&&c[iCtry]&&c[iCtry].trim())desc+=" ("+c[iCtry].trim()+")";
    out.push({at,amount,kind,note:desc.slice(0,180)});
  }
  return out;
}
// Trade Republic export: quoted CSV, signed `amount`, investment + card + cash rows
function parseTR(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return[];
  const H=splitCSV(lines[0],",").map(h=>h.trim().toLowerCase());
  const ix=(n)=>H.indexOf(n);
  const iDate=ix("date")>=0?ix("date"):ix("datetime");
  const iType=ix("type"),iName=ix("name"),iAmt=ix("amount"),iDesc=ix("description");
  const iCp=ix("counterparty_name"),iOc=ix("original_currency");
  if(iDate<0||iAmt<0)return[];
  const clean=(s)=>String(s||"").replace(/\s+/g," ").trim();
  const out=[];
  for(const line of lines.slice(1)){
    const c=splitCSV(line,",");
    const at=impDate(clean(c[iDate]).slice(0,10));if(!at)continue;
    const a=impMoney(c[iAmt]);if(a===null||a===0)continue;
    const kind=a<0?"out":"in";
    const type=clean(c[iType]).toUpperCase();
    const name=clean(c[iName]),desc=clean(c[iDesc]),cp=clean(c[iCp]);
    let cat=null,note="";
    if(/BUY/.test(type)){cat="investment";note="Kaf · "+(name||desc);}
    else if(/SELL/.test(type)){cat="investment";note="Verkaf · "+(name||desc);}
    else if(type==="DIVIDEND"){cat="dividend";note=name||desc;}
    else if(/INTEREST|BONUS|SAVEBACK/.test(type)){cat="dividend";note=desc||name||"Zënsen";}
    else if(/ORDERING_FEE|_FEE/.test(type)){cat="fees";note=desc||"Kaartegebür";}
    else if(/CARD_TRANSACTION/.test(type)){note=name||desc;}   // merchant → keyword/AI
    else if(/INBOUND|INPAYMENT|OUTBOUND|OUTPAYMENT|TRANSFER/.test(type)){note=cp||name||desc;}
    else{note=name||desc||type;}
    if(/INTERNATIONAL/.test(type)&&iOc>=0&&clean(c[iOc]))note+=" ("+clean(c[iOc])+")";
    out.push({at,amount:Math.abs(a),kind,cat,note:(note||"Trade Republic").slice(0,180)});
  }
  return out;
}
function parseBDL(text){
  const lines=text.split(/\r?\n/).map(l=>l.replace(/(\d)\s+,\s+(\d)/g,"$1,$2").replace(/,\s+(\d{2})\b/g,",$1").replace(/([+-])\s+(?=[\d.])/g,"$1"));
  const out=[];const re=/(\d{2}-\d{2}-\d{2})\s+.*?([+-][\d.\s]*\d,\d{2})\s*$/;
  for(let i=0;i<lines.length;i++){
    const L=lines[i];if(/SOLDE|ANCIEN|NOUVEAU|REPORT/i.test(L))continue;
    const m=L.match(re);if(!m)continue;
    const amt=impMoney(m[2]);if(amt===null||amt===0)continue;
    const[dd,mm,yy]=m[1].split("-");const at=`20${yy}-${mm}-${dd}`;
    let label="",comm="";
    for(let j=i+1;j<Math.min(i+14,lines.length);j++){
      const t=lines[j].trim();if(re.test(lines[j])||/SOLDE/i.test(t))break;
      if(!label&&/(Virement|Achat|Paiement|Retrait|Domiciliation|Ordre|Frais|Intérêts|Remboursement)/i.test(t))label=t.replace(/\s*\|\s*n°\S+/i,"").trim();
      const cm=t.match(/^(?:COMMUNICATION|REMARQUE)\s*:?\s*(.*)$/i);
      if(cm&&cm[1])comm=cm[1].trim();else if(/^(COMMUNICATION|REMARQUE)\s*:?\s*$/i.test(t)&&lines[j+1])comm=lines[j+1].trim();
    }
    out.push({at,amount:Math.abs(amt),kind:amt<0?"out":"in",note:([label,comm].filter(Boolean).join(" · ")||"BDL").slice(0,180)});
  }
  return out;
}
async function pdfToLines(buf){
  const pdfjs=await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/build/pdf.min.mjs");
  pdfjs.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.2.67/build/pdf.worker.min.mjs";
  const doc=await pdfjs.getDocument({data:buf}).promise;const lines=[];
  for(let p=1;p<=doc.numPages;p++){
    const tc=await(await doc.getPage(p)).getTextContent();const rows={};
    for(const it of tc.items){const y=Math.round(it.transform[5]);(rows[y]=rows[y]||[]).push({x:it.transform[4],s:it.str});}
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const l=rows[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(" ").replace(/\s+/g," ").trim();if(l)lines.push(l);
    });
  }
  return lines.join("\n");
}
// Which account a file belongs to (drives transfer detection).
function accountFromFile(fn,isTR,isPdf){
  if(isTR)return "Trade Republic";
  const m=(fn||"").match(/LU\d{18,}/i);const ib=m?m[0].toUpperCase():"";
  if(/^LU94/.test(ib))return "Spuerkeess";
  if(/^LU05/.test(ib))return "Spuerkeess Kaart";
  if(/^LU13/.test(ib))return "BDL";
  if(isPdf||/bdl/i.test(fn))return "BDL";
  return "Bank";
}
// Imported rows all carry an exact 12:00:00 UTC timestamp (doImport writes
// at:<date>+"T12:00:00Z"); manual entries use the real time. So this cleanly
// tells the two apart without touching anything you typed by hand.
function isImported(t){
  const d=new Date(t.at);
  return d.getUTCHours()===12&&d.getUTCMinutes()===0&&d.getUTCSeconds()===0&&d.getUTCMilliseconds()===0;
}
async function delImported(){
  const b=$("delImp");
  const imp=tx.filter(isImported);
  if(!imp.length){$("impMsg").textContent="Keng importéiert Buchungen fonnt.";$("impMsg").style.color="var(--muted)";b.dataset.armed="";b.textContent="🗑️ Importéiert Buchungen läschen";return;}
  if(b.dataset.armed!=="1"){
    b.dataset.armed="1";b.textContent=`⚠️ Sécher? ${imp.length} läschen`;b.style.color="var(--warn)";b.style.borderColor="var(--warn)";
    setTimeout(()=>{if(b.dataset.armed==="1"){b.dataset.armed="";b.textContent="🗑️ Importéiert Buchungen läschen";b.style.color="";b.style.borderColor="";}},4500);
    return;
  }
  b.dataset.armed="";b.style.color="";b.style.borderColor="";b.disabled=true;b.textContent="Läschen…";
  const ids=imp.map(t=>t.id);
  try{
    for(let i=0;i<ids.length;i+=200){
      const {error}=await sb.from("finance_tx").delete().in("id",ids.slice(i,i+200));if(error)throw error;
    }
    $("impMsg").textContent=`✓ ${ids.length} importéiert Buchungen geläscht`;$("impMsg").style.color="var(--ok)";
    tx=tx.filter(t=>!isImported(t));render();await loadAll();
  }catch(e){console.warn(e);$("impMsg").textContent="Läsche feelgeschloen.";$("impMsg").style.color="var(--warn)";}
  b.disabled=false;b.textContent="🗑️ Importéiert Buchungen läschen";
}
async function onImportFile(file){
  $("impMsg").textContent="Liesen…";$("impMsg").style.color="var(--muted)";
  try{
    const buf=await file.arrayBuffer();
    const isPdf=/\.pdf$/i.test(file.name)||file.type==="application/pdf";
    let rows,isTR=false;
    if(isPdf)rows=parseBDL(await pdfToLines(buf));
    else{const text=decodeBytes(buf);isTR=/transaction_id|counterparty_iban|asset_class/i.test(text.slice(0,400));rows=isTR?parseTR(text):parseCSVstmt(text);}
    const account=accountFromFile(file.name,isTR,isPdf);
    rows.forEach(r=>{r.account=account;});
    if(!rows.length){$("impMsg").textContent="Keng Buchungen an där Datei fonnt.";$("impMsg").style.color="var(--warn)";return;}
    previewImport(rows,account);
  }catch(e){console.warn("[import]",e);$("impMsg").textContent="Import feelgeschloen — kuck d'Datei.";$("impMsg").style.color="var(--warn)";}
}
async function previewImport(rows,account){
  const {data:existing}=await sb.from("finance_tx").select("id,at,amount,kind,note,account,cat").limit(8000);
  const key=(r)=>`${String(r.at).slice(0,10)}|${(+r.amount).toFixed(2)}|${r.kind}|${(r.note||"").slice(0,30)}`;
  const have=new Map((existing||[]).map(r=>[key(r),r]));
  const fresh=[],backfill=[];
  for(const r of rows){
    const ex=have.get(key(r));
    if(!ex){fresh.push(r);continue;}
    // already present → backfill account / deterministic category if missing
    const patch={};
    if(!ex.account&&r.account)patch.account=r.account;
    if(!ex.cat&&r.cat)patch.cat=r.cat;
    if(Object.keys(patch).length)backfill.push({id:ex.id,...patch});
  }
  const untouched=rows.length-fresh.length-backfill.length;
  const inSum=fresh.filter(r=>r.kind==="in").reduce((a,r)=>a+r.amount,0);
  const outSum=fresh.filter(r=>r.kind==="out").reduce((a,r)=>a+r.amount,0);
  const list=fresh.slice(0,300).map(r=>`<div class="row"><span class="ic">${r.kind==="in"?"➕":"➖"}</span><div><div class="t" style="font-size:13px">${esc(r.note)}</div><div class="s">${r.at}</div></div><div class="amt ${r.kind}">${r.kind==="in"?"+":"−"}${CUR}${r.amount.toFixed(2)}</div></div>`).join("");
  $("impModalBody").innerHTML=`
    <div class="hint" style="margin-bottom:8px">Konto: <b style="color:var(--text)">${esc(account)}</b><br>
      ${fresh.length} nei Buchungen${backfill.length?` · <span style="color:var(--accent2)">${backfill.length} kréien Konto/Kategorie</span>`:""}${untouched?` · ${untouched} onverännert`:""}<br>
      <span style="color:var(--ok)">+${CUR}${inSum.toFixed(2)}</span> · <span style="color:var(--warn)">−${CUR}${outSum.toFixed(2)}</span></div>
    ${list||'<div class="hint">Keng nei Buchungen — mä existéierend kréien elo hiert Konto. 👍</div>'}
    ${fresh.length>300?'<div class="hint">…just déi éischt 300 gewisen; all ginn importéiert.</div>':""}`;
  const total=fresh.length+backfill.length;
  $("impModalGo").textContent=backfill.length&&!fresh.length?`${backfill.length} aktualiséieren`:`${total} uwennen`;
  $("impModalGo").disabled=!total;
  $("impModalGo").onclick=()=>doImport(fresh,backfill);
  $("impModal").classList.add("open");
}
async function doImport(fresh,backfill=[]){
  $("impModalGo").disabled=true;$("impModalGo").textContent="Uwennen…";
  try{
    for(let i=0;i<fresh.length;i+=200){
      const batch=fresh.slice(i,i+200).map(r=>({amount:r.amount,kind:r.kind,note:r.note,cat:r.cat||null,account:r.account||null,at:r.at+"T12:00:00Z",currency:"EUR"}));
      const {error}=await sb.from("finance_tx").insert(batch);if(error)throw error;
    }
    for(let i=0;i<backfill.length;i+=20){
      await Promise.all(backfill.slice(i,i+20).map(u=>{const{id,...p}=u;return sb.from("finance_tx").update(p).eq("id",id);}));
    }
    $("impModal").classList.remove("open");
    const parts=[];if(fresh.length)parts.push(`${fresh.length} nei`);if(backfill.length)parts.push(`${backfill.length} aktualiséiert`);
    $("impMsg").textContent=`✓ ${parts.join(" · ")||"näischt ze änneren"}`;$("impMsg").style.color="var(--ok)";
    setTimeout(()=>$("impMsg").textContent="",2500);await loadAll();
  }catch(e){console.warn(e);$("impModalGo").disabled=false;$("impModalGo").textContent="Nach eng Kéier";$("impMsg").textContent="Import feelgeschloen.";}
}

auth.onAuth(boot);
boot();
</script>
