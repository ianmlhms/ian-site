<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Countdowns — ian.lu</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0d0d1a">
<script src="theme.js?v=9"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#6ea8fe;--accent2:#4de8ff;--warn:#f87171}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
  a{color:var(--accent2);text-decoration:none}
  .bar{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
  .bar .home{color:var(--muted);font-weight:700}.bar h1{font-size:18px;margin:0}.bar .spacer{flex:1}
  .wrap{flex:1;width:100%;max-width:640px;margin:0 auto;padding:18px 14px 40px;display:flex;flex-direction:column;gap:14px}
  .gate{text-align:center;color:var(--muted);padding:50px 16px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px}
  .ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:13px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  input{padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:16px;font-family:inherit;width:100%}
  .newx{display:flex;flex-direction:column;gap:8px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .cd{display:flex;align-items:center;gap:14px}
  .cd .emoji{font-size:30px;flex:none}
  .cd .title{font-weight:800;font-size:16px}
  .cd .when{color:var(--muted);font-size:12.5px;margin-top:2px}
  .cd .big{margin-left:auto;text-align:right;font-variant-numeric:tabular-nums}
  .cd .big b{font-size:22px;display:block;line-height:1.1}
  .cd .big.soon b{color:var(--warn)}
  .cd .big small{color:var(--muted);font-size:11px}
  .cd.past{opacity:.5}
  .del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;flex:none}
  .del:hover{color:var(--warn)}
  .msg{min-height:16px;color:var(--accent2);font-weight:700;font-size:13px}
  .emopick{display:flex;gap:4px;flex-wrap:wrap}
  .emopick button{background:var(--card2);border:1px solid var(--border);border-radius:9px;font-size:18px;width:38px;height:38px;cursor:pointer}
  .emopick button.on{border-color:var(--accent);background:rgba(110,168,254,.14)}
</style>
</head>
<body>
<header class="bar">
  <a class="home" href="index.html">‹ Heem</a>
  <h1>⏳ Countdowns</h1>
  <div class="spacer"></div>
  <span id="acctHost"></span>
</header>

<div class="wrap" id="wrap"><div class="gate">Lueden…</div></div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import * as auth from "./auth.js?v=5";
const $=(id)=>document.getElementById(id);
const esc=(s)=>(""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EMOJIS=["🎉","🎂","✈️","🏝️","🎄","🎁","🏁","🎓","⚽","🎸","🎮","❤️","🍕","🎇"];
let sb=null,me=null,items=[],timer=null,pickEmoji=EMOJIS[0];

async function boot(){
  sb=await auth.client();
  auth.mountAccountButton($("acctHost"));
  if(!auth.session()){
    $("wrap").innerHTML=`<div class="gate">Mell dech un fir deng Countdowns.<br><br><button class="btn" id="si">Umellen</button></div>`;
    $("si").onclick=auth.openAuthModal;return;
  }
  me=auth.session().user.id;
  $("wrap").innerHTML=`
    <div class="card newx">
      <input id="nTitle" maxlength="80" placeholder="Op wat waards du? (z.B. Vakanz a Spuenien)">
      <div class="emopick" id="emo"></div>
      <div class="row">
        <input id="nDate" type="date" style="flex:1;min-width:150px">
        <input id="nTime" type="time" value="00:00" style="flex:1;min-width:120px">
      </div>
      <button class="btn" id="add">Countdown bäisetzen</button>
      <div class="msg" id="msg"></div>
    </div>
    <div id="list"><div class="gate">Lueden…</div></div>`;
  const emo=$("emo");
  EMOJIS.forEach((e,i)=>{const b=document.createElement("button");b.textContent=e;if(i===0)b.classList.add("on");
    b.onclick=()=>{pickEmoji=e;emo.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.textContent===e));};emo.appendChild(b);});
  $("add").onclick=add;
  $("nTitle").addEventListener("keydown",e=>{if(e.key==="Enter")add();});
  await refresh();
}

async function refresh(){
  const {data,error}=await sb.from("countdowns").select("*").order("at");
  if(error){$("list").innerHTML='<div class="gate">Feeler beim Lueden.</div>';return;}
  items=data||[];
  render();
  if(!timer)timer=setInterval(paint,1000);
}

const pad=(n)=>String(n).padStart(2,"0");
function parts(ms){
  const past=ms<0; ms=Math.abs(ms);
  const s=Math.floor(ms/1000),d=Math.floor(s/86400);
  return {past,d,h:Math.floor(s/3600)%24,m:Math.floor(s/60)%60,s:s%60};
}
function big(ms){
  const p=parts(ms);
  if(p.d>0)return `${p.d}<small>d</small> ${pad(p.h)}<small>h</small> ${pad(p.m)}<small>m</small>`;
  return `${pad(p.h)}:${pad(p.m)}:${pad(p.s)}`;
}
function paint(){
  for(const it of items){
    const el=document.querySelector(`.big[data-cd="${it.id}"]`);
    if(!el)continue;
    const left=new Date(it.at).getTime()-Date.now();
    el.querySelector("b").innerHTML=left<0?"🎉 do!":big(left);
    el.classList.toggle("soon",left<3*86400000&&left>0);
  }
}
function render(){
  if(!items.length){$("list").innerHTML='<div class="gate">Nach keng Countdowns — setz deen éischten bäi 👆</div>';return;}
  $("list").innerHTML=items.map(it=>{
    const t=new Date(it.at),left=t.getTime()-Date.now();
    const when=t.toLocaleString("de-DE",{weekday:"short",day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
    return `<div class="card"><div class="cd${left<0?" past":""}">
      <span class="emoji">${esc(it.emoji||"⏳")}</span>
      <div><div class="title">${esc(it.title)}</div><div class="when">${when}</div></div>
      <div class="big${left<3*86400000&&left>0?" soon":""}" data-cd="${it.id}"><b>${left<0?"🎉 do!":big(left)}</b></div>
      <button class="del" data-del="${it.id}" title="Läschen">✕</button>
    </div></div>`;
  }).join("");
  $("list").querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Countdown läschen?"))return;
    await sb.from("countdowns").delete().eq("id",b.dataset.del);refresh();
  });
}

async function add(){
  const title=$("nTitle").value.trim(),date=$("nDate").value,time=$("nTime").value||"00:00";
  if(!title||!date){$("msg").textContent="Titel an Datum uginn.";return;}
  $("msg").textContent="…";
  try{
    const {error}=await sb.from("countdowns").insert({title,emoji:pickEmoji,at:new Date(date+"T"+time).toISOString()});
    if(error)throw error;
    $("nTitle").value="";$("msg").textContent="Gespäichert ✓";
    setTimeout(()=>$("msg").textContent="",1400);
    refresh();
  }catch(e){console.warn(e);$("msg").textContent="Feeler beim Späicheren.";}
}

auth.onAuth(boot);
boot();
</script>
</body>
</html>
