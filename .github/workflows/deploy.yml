name: Deploy to ian.lu (Plesk FTP)

# Uploads the site to Plesk httpdocs on every push to main.
# Repo secrets required: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two FTP mirrors at once — concurrent `mirror --delete` runs
# against the same httpdocs collide and one fails. Queue instead.
concurrency:
  group: plesk-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A normal deploy takes 2-3 min. Without this, a stalled FTP connection
    # hangs until GitHub's 6-hour limit — and because the concurrency group
    # queues with cancel-in-progress:false, that one hang blocks every later
    # deploy for hours (happened 23 Jul 2026). Fail fast instead.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7

      - name: Stage site files (web assets only)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='scripts' --exclude='supabase' \
            --exclude='README.md' --exclude='HANDOFF.md' --exclude='.gitignore' --exclude='.DS_Store' \
            --exclude='_site' \
            ./ _site/

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy to Plesk httpdocs over FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set cmd:fail-exit yes;
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:timeout 20;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\";
            mirror -R --delete --verbose --parallel=4 _site/ httpdocs/;
          "
