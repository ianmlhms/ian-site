name: Deploy to GitHub Pages

# Modern GitHub Actions Pages deploy — replaces the legacy "deploy from a branch"
# Jekyll build (which was intermittently flaky and pinned to the deprecated Node 20).
# Requires the repo's Pages source to be set to "GitHub Actions" (build_type=workflow).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Stage site files (web assets only)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='scripts' --exclude='supabase' \
            --exclude='README.md' --exclude='HANDOFF.md' --exclude='.gitignore' --exclude='.DS_Store' \
            --exclude='_site' \
            ./ _site/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
