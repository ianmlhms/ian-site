<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Messenger</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#0d0d1a;--card:#161625;--card2:#1e1e35;--border:#2a2a4a;--text:#e8e8f0;--muted:#8888aa;--accent:#ffcc00;--accent2:#4de8ff;--dm:#ff6b9d}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--accent2);text-decoration:none}
  header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);flex:none}
  header .home{color:var(--muted);font-weight:700}
  header h1{font-size:18px;margin:0}
  header h1 .b{color:var(--accent)}
  header .spacer{flex:1}
  #msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:20px}
  .auth-go{background:var(--dm);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px}
  #panel{flex:1;display:none;min-height:0}
  .side{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex:none}
  .side-h{padding:12px 14px;border-bottom:1px solid var(--border)}
  .side-h input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 11px;font-size:13px}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{flex:1;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px;font-size:13px;font-weight:700;cursor:pointer}
  .tab.active{background:var(--card2);color:var(--text);border-color:var(--accent2)}
  .uinfo{display:flex;flex-direction:column;gap:6px;font-size:13.5px;margin-top:10px}
  .uinfo .k{color:var(--muted);font-size:12px}
  .uact{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
  .uact h4{margin:0 0 8px;font-size:13px}
  .pwrow{display:flex;gap:8px}
  .pwrow input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 11px;font-size:14px;font-family:ui-monospace,monospace}
  .pwrow button{background:var(--accent2);color:#06121a;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer}
  .pwgen{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 11px;cursor:pointer}
  .pwresult{margin-top:10px;font-size:13.5px;color:var(--posted,#3fb950)}
  .pwresult code{background:var(--card2);padding:2px 8px;border-radius:6px;color:#ffcc00;font-size:15px;user-select:all}
  .hint{color:var(--muted);font-size:12px;margin-top:4px}
  .glist{list-style:none;margin:0;padding:8px;overflow-y:auto;flex:1}
  .grow{padding:10px 12px;border-radius:10px;cursor:pointer}
  .grow:hover{background:var(--card)}
  .grow.active{background:var(--card2)}
  .grow .n{font-weight:700;font-size:14px}
  .grow .tag{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--dm);color:#fff;margin-left:6px;vertical-align:middle}
  .grow .meta{font-size:11px;color:var(--muted);margin-top:3px}
  .detail{flex:1;display:flex;flex-direction:column;min-width:0}
  .detail-h{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px}
  .dh-top{display:flex;align-items:center;gap:10px}
  .tag.dm{background:var(--dm);color:#fff;padding:1px 6px;border-radius:6px;font-size:10px}
  .danger{margin-left:auto;background:#3a1620;border:1px solid #ff6b6b;color:#ff8888;border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer;font-weight:700}
  .danger:hover{background:#ff6b6b;color:#fff}
  .members{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 6px 3px 11px;font-size:12.5px}
  .chip-x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:0 2px}
  .chip-x:hover{color:#ff6b6b}
  .muted{color:var(--muted);font-size:12.5px}
  .addmem{display:flex;gap:8px;margin-top:10px}
  .addmem input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 11px;font-size:13px}
  .addmem button{background:var(--accent2);color:#06121a;border:none;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer}
  .mlist{flex:1;overflow-y:auto;padding:14px 18px}
  .am{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;display:flex;gap:10px;align-items:flex-start}
  .am .who{color:var(--accent2);font-weight:700;flex:none}
  .am .txt{flex:1;min-width:0}
  .msg-del{background:none;border:none;cursor:pointer;font-size:13px;opacity:.5;flex:none}
  .msg-del:hover{opacity:1}
  .am .when{color:var(--muted);font-size:11px;flex:none}
  .am .media{display:block;max-width:200px;max-height:200px;border-radius:8px;margin-top:4px}
  .empty{color:var(--muted);text-align:center;padding:40px}
</style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
<header>
  <a class="home" href="index.html">‹ Home</a>
  <h1>🛡 <span class="b">Admin</span> · Messenger</h1>
  <div class="spacer"></div>
  <a href="messenger.html" style="margin-right:14px;color:var(--muted)">Messenger</a>
  <span id="acctHost"></span>
</header>

<div id="msg">Loading…</div>

<div id="panel">
  <aside class="side">
    <div class="side-h">
      <div class="tabs"><button id="tabGroups" class="tab active">Groups</button><button id="tabUsers" class="tab">Users</button></div>
      <input id="search" placeholder="Search…">
    </div>
    <ul class="glist" id="glist"></ul>
  </aside>
  <section class="detail">
    <div class="detail-h" id="detailH">Select a group to inspect</div>
    <div class="mlist" id="mlist"></div>
  </section>
</div>

<script src="pixelbreak-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="admin.js?v=4"></script>
</body>
</html>
